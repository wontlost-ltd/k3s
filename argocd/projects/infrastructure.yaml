# Infrastructure Project
# Core ArgoCD self-management and shared platform components
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
spec:
  description: "ArgoCD self-management and platform orchestration"
  sourceRepos:
    - 'https://github.com/wontlost-ltd/k3s.git'
    # ArgoCD official repo for self-management
    - 'https://github.com/argoproj/argo-cd.git'
    - 'https://argoproj.github.io/argo-helm'
    # Ingress
    - 'https://traefik.github.io/charts'
    # Monitoring
    - 'https://prometheus-community.github.io/helm-charts'
  destinations:
    # ArgoCD namespace for self-management
    - namespace: argocd
      server: https://kubernetes.default.svc
    # Traefik namespace
    - namespace: traefik
      server: https://kubernetes.default.svc
    # Monitoring namespace
    - namespace: monitoring
      server: https://kubernetes.default.svc
    # Cloudflare namespace for tunnel
    - namespace: cloudflare
      server: https://kubernetes.default.svc
    # kube-system for K3s system components (Traefik, CoreDNS, etc.)
    # WARNING: Use prune: false on Applications targeting this namespace
    - namespace: kube-system
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    # Namespace creation (for CreateNamespace=true)
    - group: ''
      kind: Namespace
    # ArgoCD CRDs for self-management
    # AppProject is allowed here because argocd-config needs to manage other projects
    - group: argoproj.io
      kind: Application
    - group: argoproj.io
      kind: ApplicationSet
    - group: argoproj.io
      kind: AppProject
    # Prometheus Operator cluster-scoped CRDs (specific kinds only)
    - group: monitoring.coreos.com
      kind: Alertmanager
    - group: monitoring.coreos.com
      kind: Prometheus
    - group: monitoring.coreos.com
      kind: ThanosRuler
    - group: monitoring.coreos.com
      kind: PrometheusAgent
    # Ingress resources
    - group: networking.k8s.io
      kind: IngressClass
    - group: networking.k8s.io
      kind: Ingress
    # Traefik CRDs (specific kinds only)
    - group: traefik.io
      kind: IngressRoute
    - group: traefik.io
      kind: IngressRouteTCP
    - group: traefik.io
      kind: IngressRouteUDP
    - group: traefik.io
      kind: Middleware
    - group: traefik.io
      kind: MiddlewareTCP
    - group: traefik.io
      kind: TLSOption
    - group: traefik.io
      kind: TLSStore
    - group: traefik.io
      kind: ServersTransport
    - group: traefik.io
      kind: TraefikService
    # Legacy Traefik CRDs (containo.us group - deprecated but may still be used)
    - group: traefik.containo.us
      kind: IngressRoute
    - group: traefik.containo.us
      kind: Middleware
    # Webhook configurations
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    # CRDs - Required for operator installations (CNPG, cert-manager, etc.)
    # SECURITY NOTE: CRD creation is restricted by sourceRepos whitelist.
    # Only trusted Helm charts from official repos can create CRDs.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    # ClusterRoles for RBAC - Required for operator service accounts
    # SECURITY NOTE: Restricted by sourceRepos. Only infrastructure operators
    # from trusted repos (argoproj, prometheus-community, traefik) can create
    # cluster-scoped RBAC. Business apps use separate projects with no
    # ClusterRole permissions.
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  # Explicit namespaced resource allowlist for security
  namespaceResourceWhitelist:
    # Core workloads
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: ''
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: ReplicaSet
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    # Networking
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    # Autoscaling
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    # RBAC (namespaced)
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    # Monitoring
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    # Policy
    - group: policy
      kind: PodDisruptionBudget
    # External Secrets (for monitoring auth)
    - group: external-secrets.io
      kind: ExternalSecret
    # Traefik Middleware (for auth)
    - group: traefik.io
      kind: Middleware
    # ArgoCD resources for self-management
    # These are namespace-scoped resources in the argocd namespace
    # SECURITY NOTE: Only infrastructure project can manage AppProjects
    # and ApplicationSets, restricted by sourceRepos and destinations
    - group: argoproj.io
      kind: Application
    - group: argoproj.io
      kind: ApplicationSet
    - group: argoproj.io
      kind: AppProject
