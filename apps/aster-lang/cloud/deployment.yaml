# Aster API Deployment
# Aster API - Aster Lang CNL Evaluation Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aster-api
  namespace: aster-cloud
  labels:
    app: aster-api
    app.kubernetes.io/name: aster-api
    app.kubernetes.io/part-of: aster-lang
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aster-api
  template:
    metadata:
      labels:
        app: aster-api
        app.kubernetes.io/name: aster-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aster-api
          # Native GraalVM image - 毫秒级启动，低内存占用
          image: docker.io/wontlost/aster-api:native-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            # 数据库连接（从 ExternalSecret 注入）
            - name: QUARKUS_DATASOURCE_JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: jdbc-url
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: username
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: password
            # Reactive datasource URL (for Flyway/Hibernate)
            - name: QUARKUS_DATASOURCE_REACTIVE_URL
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: reactive-url
            # Redis Sentinel 连接配置
            - name: QUARKUS_REDIS_HOSTS
              valueFrom:
                secretKeyRef:
                  name: aster-api-redis-credentials
                  key: redis-hosts
            - name: QUARKUS_REDIS_CLIENT_TYPE
              value: "sentinel"
            - name: QUARKUS_REDIS_MASTER_NAME
              valueFrom:
                secretKeyRef:
                  name: aster-api-redis-credentials
                  key: master-name
            # CORS 配置
            - name: QUARKUS_HTTP_CORS_ORIGINS
              value: "https://aster-lang.cloud,https://www.aster-lang.cloud,https://policy.aster-lang.cloud"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            # Native 镜像资源需求更低
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            # Native 镜像启动更快，减少初始延迟
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /q/health/started
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 15
      volumes:
        - name: tmp
          emptyDir: {}
