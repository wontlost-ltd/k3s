# ExternalSecrets for PostgreSQL Cluster Credentials
---
# Superuser credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-superuser-credentials
  namespace: data-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-superuser-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: data-services/postgres-superuser
        property: username
    - secretKey: password
      remoteRef:
        key: data-services/postgres-superuser
        property: password

