# EmberStack Reflector
# Automatically replicates secrets and configmaps across namespaces
# Used for wildcard TLS certificates and shared configuration

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reflector
  namespace: argocd
  annotations:
    # Deploy after cert-manager, before vault
    argocd.argoproj.io/sync-wave: "-6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tls-management
  source:
    repoURL: https://emberstack.github.io/helm-charts
    chart: reflector
    targetRevision: 9.1.44
    helm:
      releaseName: reflector
      values: |
        # HA configuration
        replicaCount: 2

        # Resource limits (production values)
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

        # Configuration
        configuration:
          logging:
            minimumLevel: Information

        # RBAC
        rbac:
          enabled: true

        # Service account
        serviceAccount:
          create: true

  destination:
    server: https://kubernetes.default.svc
    namespace: reflector
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
