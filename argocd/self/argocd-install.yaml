apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 7.9.0
    helm:
      releaseName: argocd
      valuesObject:
        # Global settings
        global:
          domain: argocd.aster-lang.cloud

        # Server configuration (2 replicas for HA)
        server:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # Repo server (2 replicas for HA)
        repoServer:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # Application controller (HA with sharding)
        controller:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi

        # Redis HA
        redis:
          enabled: false  # Disable standalone redis
        redis-ha:
          enabled: true
          haproxy:
            enabled: true
            replicas: 3
          redis:
            replicas: 3

        # Notifications controller
        notifications:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # ApplicationSet controller
        applicationSet:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # Dex (OIDC)
        dex:
          enabled: false  # Using Authentik instead

        # Configs
        configs:
          cm:
            admin.enabled: "true"
          params:
            # Run ArgoCD server without TLS (Traefik terminates TLS)
            server.insecure: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false  # Don't prune ArgoCD resources automatically (safety)
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
