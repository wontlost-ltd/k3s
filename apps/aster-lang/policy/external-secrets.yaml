# ExternalSecrets for aster-policy namespace
# Pulls database and Redis credentials from Vault
---
# PostgreSQL Credentials for Policy API
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: policy-api-db-credentials
  namespace: aster-policy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: policy-api-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: POSTGRES_HOST
      remoteRef:
        key: data-services/postgres
        property: host
    - secretKey: POSTGRES_PORT
      remoteRef:
        key: data-services/postgres
        property: port
    - secretKey: POSTGRES_DB
      remoteRef:
        key: data-services/policy-api-db
        property: database
    - secretKey: POSTGRES_USER
      remoteRef:
        key: data-services/policy-api-db
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: data-services/policy-api-db
        property: password

---
# Redis Credentials for Policy API
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: policy-api-redis-credentials
  namespace: aster-policy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: policy-api-redis-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: REDIS_HOST
      remoteRef:
        key: data-services/redis
        property: host
    - secretKey: REDIS_PORT
      remoteRef:
        key: data-services/redis
        property: port
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: data-services/redis
        property: password
