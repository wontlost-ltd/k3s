# cert-manager Configuration Application
# Deploys ClusterIssuers and Certificates AFTER:
# 1. cert-manager controller is installed (wave -10)
# 2. Vault and External Secrets are ready (wave 0-2)
# 3. Cloudflare API token ExternalSecret is created (wave 3)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-config
  namespace: argocd
  annotations:
    # Deploy after bootstrap-secrets creates cloudflare-api-token
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tls-management
  source:
    repoURL: https://github.com/wontlost-ltd/k3s.git
    targetRevision: main
    path: apps/infrastructure/cert-manager
    # Only include ClusterIssuers and Certificates, not the Applications
    directory:
      include: '{cluster-issuers.yaml,wildcard-certificates.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
