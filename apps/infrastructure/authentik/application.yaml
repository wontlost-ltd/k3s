# Authentik SSO/Identity Provider
# Uses shared PostgreSQL and Redis data layer
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    # Deploy after shared data services are ready (PostgreSQL at wave 4, Redis at wave 4)
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: identity
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2025.2.1
    helm:
      releaseName: authentik
      valuesObject:
        # Authentik configuration
        authentik:
          error_reporting:
            enabled: false

        # Disable bundled PostgreSQL - using shared cluster
        postgresql:
          enabled: false

        # Disable bundled Redis - using shared cluster
        redis:
          enabled: false

        # Load configuration from secret (includes shared DB/Redis connection)
        global:
          envFrom:
            - secretRef:
                name: authentik-secrets
          env:
            # Redis host pointing to shared Redis master (Sentinel handles failover)
            - name: AUTHENTIK_REDIS__HOST
              value: shared-redis-master.data-services.svc.cluster.local
            # Redis port (default Redis port, not Sentinel)
            - name: AUTHENTIK_REDIS__PORT
              value: "6379"

        # Server configuration (production HA)
        server:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          resources:
            requests:
              memory: 1Gi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: 1000m

          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - auth.aster-lang.cloud
            tls:
              - secretName: authentik-tls
                hosts:
                  - auth.aster-lang.cloud

        # Worker configuration (production HA)
        worker:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m

        # Service account
        serviceAccount:
          create: true

        # Prometheus metrics
        prometheus:
          serviceMonitor:
            enabled: true
            labels:
              release: prometheus
          rules:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
