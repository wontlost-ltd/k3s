# Secrets Management Project
# Manages Vault and External Secrets Operator
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: secrets-management
  namespace: argocd
spec:
  description: "Secrets management - Vault and External Secrets Operator"
  sourceRepos:
    - 'https://github.com/wontlost-ltd/k3s.git'
    - 'https://helm.releases.hashicorp.com'
    - 'https://charts.external-secrets.io'
  destinations:
    # Core secrets infrastructure namespaces ONLY
    # These namespaces require full workload management (Vault, ESO deployments)
    - namespace: vault
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    # ArgoCD namespace for app-of-apps pattern
    - namespace: argocd
      server: https://kubernetes.default.svc
  # Cluster-scoped resources - minimal set for secrets infrastructure
  clusterResourceWhitelist:
    # Namespace creation (for CreateNamespace=true)
    - group: ''
      kind: Namespace
    # External Secrets cluster-scoped resources
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: external-secrets.io
      kind: ClusterExternalSecret
    # Webhook configurations (required by ESO and Vault)
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    # CRDs (required for Helm chart installations)
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    # ClusterRoles for Vault/ESO service accounts (required by Helm charts)
    # Risk mitigated by restricting destinations to vault/external-secrets only
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  # Namespaced resource allowlist for vault and external-secrets namespaces
  # Since destinations are now restricted to only these two namespaces,
  # full workload management here is acceptable and required for Helm charts
  namespaceResourceWhitelist:
    # Core workloads (required for Vault/ESO Helm deployments)
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: ''
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: ReplicaSet
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    # Networking (for vault/external-secrets only)
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    # RBAC (for vault/external-secrets only)
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    # Monitoring
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    # External Secrets - the main purpose of this project
    - group: external-secrets.io
      kind: ExternalSecret
    - group: external-secrets.io
      kind: SecretStore
    # cert-manager namespaced resources (for Vault TLS only)
    - group: cert-manager.io
      kind: Certificate
    - group: cert-manager.io
      kind: Issuer
    # Policy
    - group: policy
      kind: PodDisruptionBudget
    # ArgoCD Application for app-of-apps pattern
    - group: argoproj.io
      kind: Application
