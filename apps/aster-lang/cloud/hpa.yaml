# P1-R21 (audit): HorizontalPodAutoscaler for aster-api.
#
# Why: aster-api 现在是 2 replica HA 配置, 但稳态流量可能远超 2 pod 容量,
# 或者长尾静默时浪费节点资源. HPA 在 [2, 6] 之间根据 CPU 和内存使用率
# 自动扩缩.
#
# Targets:
#   - CPU 70%: Quarkus + JVM 起步约 30-40%, 流量上来后 70% 是健康 scale-up 触发点
#   - Memory 80%: 384m maxHeap + native overhead 接近 limit 时扩容
#
# Bounds:
#   - min=2: 保持 R21 HA 决策的下限
#   - max=6: k3s 节点 ephemeral-storage (lexicon-hotplug 3Gi/pod) 上限约束;
#     超过 6 个 pod 需要先做共享 PVC (见 docs/runbooks/lexicon-recovery.md)
#
# Behavior:
#   - scaleDown.stabilizationWindowSeconds=300: 防抖, 避免 traffic spike 后立即缩容
#   - scaleUp policies: 60s 内最多翻倍, 应对突发负载
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aster-api
  namespace: aster-cloud
  labels:
    app: aster-api
    app.kubernetes.io/name: aster-api
    app.kubernetes.io/part-of: aster-lang
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aster-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
