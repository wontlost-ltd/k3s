# Aster Runner 命名空间 + launcher 微服务（S2-1a-2 Slice-2b-launch）
# 由 ApplicationSet aster-lang-apps 自动发现并部署（apps/aster-lang/*/kustomization.yaml）。
# 2b-seed 只建 namespace；2b-launch 先部署脚手架 SA/Role/RoleBinding/Service。
# ★network-policy.yaml 默认注释禁用（k3s kube-router caveat），故不列入 resources——
#   待确认集群 CNI 支持 NetworkPolicy enforce 后再解注释并加入。
#
# ★★deployment.yaml + external-secrets.yaml **已解门上线**（go-live，走 runner-topology lane 校验）：
#   前置全就绪——launcher 镜像真签 digest 已 pin（images 段 + image-lock，ad84d70b）+ Vault path
#   apps/aster-runner-launcher（hmac-key）已 provision。kustomize images transformer 用真 digest 覆写
#   Deployment 占位 → sigstore admission 过（有 cosign 签名）；ExternalSecret 从 Vault 拉 hmac-key。
#   本变更由 verify-image-pin 的 runner-topology lane（verify-runner-topology.sh 闭世界 render-equality）
#   校验：pin 数据不变 + 仅激活已固定 launcher workload（deployment/external-secrets 入 resources +
#   replicas 0→1 + 删 deploy-policy launcher deferred，三项授权迁移之外任何改动 fail-closed）。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: aster-runner
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
  - service.yaml
  - deployment.yaml
  - external-secrets.yaml
# ★launcher 镜像 digest（部署真相）：image-pin 脚本改写此段的 digest，k3s verify 校验 == image-lock。
#   image-pin 脚本 kcount 校验此段恰 1 条（open-image-pin-pr.sh:65-66）——故 deployment.yaml 暂不部署
#   期间**保留**本 images 条（脚本按 .images[].name 计数，不依赖 deployment 在 resources 里；kustomize
#   容忍未被引用的 images 条）。launcher 首个 CI PR 写真 digest 到此 + image-lock。
images:
  - name: docker.io/wontlost/aster-runner-launcher
    digest: sha256:ad84d70bd41a4b1fcd5930159e01ddeca8323418e0f5deeee79be11b39219a6c
