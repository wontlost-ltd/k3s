apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: aster-lang
  namespace: argocd
spec:
  description: "aster-lang.cloud and aster-lang.dev domain applications"
  sourceRepos:
    # Only allow specific repositories (no wildcards for security)
    - 'https://github.com/wontlost-ltd/k3s.git'
    - 'https://github.com/aster-cloud/aster-api.git'
  destinations:
    # Explicit namespace list (no wildcards for security)
    - namespace: aster-cloud
      server: https://kubernetes.default.svc
    - namespace: aster-lsp
      server: https://kubernetes.default.svc
    - namespace: aster-observability
      server: https://kubernetes.default.svc
    # aster-runner：in-cluster runner-launcher 服务与其临时 runner Job 的命名空间
    # （S2-1a-2 Slice-2b）。★目录名须是短名 runner（apps/aster-lang/runner/）——ApplicationSet
    # 模板 namespace='aster-{{segments 2}}' 会自动加 aster- 前缀派生 App dest ns=aster-runner
    # （与 cloud→aster-cloud/lsp→aster-lsp 同约定）。目录若命名 aster-runner 会派生双前缀
    # aster-aster-runner 与本白名单不符 → ArgoCD 拒 sync。
    - namespace: aster-runner
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  # Explicit namespaced resource allowlist for security
  namespaceResourceWhitelist:
    # Core workloads
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: ''
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: ReplicaSet
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    # Networking
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    # RBAC (namespaced)
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    # Monitoring
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule
    # Policy
    - group: policy
      kind: PodDisruptionBudget
    # Autoscaling
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    # External Secrets
    - group: external-secrets.io
      kind: ExternalSecret
    # Traefik routing (per-route auth + path-based blocks for cloud / api)
    - group: traefik.io
      kind: IngressRoute
    - group: traefik.io
      kind: IngressRouteTCP
    - group: traefik.io
      kind: Middleware
    # NOTE: argoproj.io/Application removed to prevent project boundary escape
    # App-of-apps pattern is managed by infrastructure project only
