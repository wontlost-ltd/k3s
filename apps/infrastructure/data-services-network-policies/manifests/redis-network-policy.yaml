# NetworkPolicy for Shared Redis
# Restricts access to Redis to only authorized namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shared-redis-network-policy
  namespace: data-services
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
  ingress:
    # Allow Redis connections from authentik (server and worker)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
          podSelector:
            matchLabels:
              app.kubernetes.io/name: authentik
      ports:
        - protocol: TCP
          port: 6379
    # Allow Redis connections from policy-api (caching)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aster-policy
          podSelector:
            matchLabels:
              app: policy-api
      ports:
        - protocol: TCP
          port: 6379
    # Allow Redis connections from data-service
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wontlost-data
          podSelector:
            matchLabels:
              app: data-service
      ports:
        - protocol: TCP
          port: 6379
    # Allow Sentinel connections for failover coordination
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
          podSelector:
            matchLabels:
              app.kubernetes.io/name: authentik
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aster-policy
          podSelector:
            matchLabels:
              app: policy-api
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wontlost-data
          podSelector:
            matchLabels:
              app: data-service
      ports:
        - protocol: TCP
          port: 26379
    # Allow metrics scraping from Prometheus
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9121  # Redis exporter metrics
    # Allow intra-cluster communication between Redis pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
