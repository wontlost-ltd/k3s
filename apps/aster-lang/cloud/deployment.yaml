# Aster API Deployment
# Aster API - Aster Lang CNL Evaluation Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aster-api
  namespace: aster-cloud
  labels:
    app: aster-api
    app.kubernetes.io/name: aster-api
    app.kubernetes.io/part-of: aster-lang
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aster-api
  template:
    metadata:
      labels:
        app: aster-api
        app.kubernetes.io/name: aster-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aster-api
          image: docker.io/wontlost/aster-api:jvm-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            # 数据库连接（从 ExternalSecret 注入）
            - name: QUARKUS_DATASOURCE_JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: jdbc-url
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: username
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: password
            # Reactive datasource URL (for Flyway/Hibernate)
            - name: QUARKUS_DATASOURCE_REACTIVE_URL
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: reactive-url
            # Redis Standalone 连接配置
            - name: QUARKUS_REDIS_HOSTS
              valueFrom:
                secretKeyRef:
                  name: aster-api-redis-credentials
                  key: redis-hosts
            - name: QUARKUS_REDIS_CLIENT_TYPE
              value: "standalone"
            # CORS 配置
            - name: QUARKUS_HTTP_CORS_ORIGINS
              value: "https://aster-lang.cloud,https://www.aster-lang.cloud,https://policy.aster-lang.dev,https://aster-lang.dev"
            # LLM AI Assistant（从 Vault 注入）
            - name: ASTER_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aster-api-llm-credentials
                  key: api-key
            - name: ASTER_LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: aster-api-llm-credentials
                  key: base-url
            - name: ASTER_LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: aster-api-llm-credentials
                  key: provider
            - name: ASTER_LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: aster-api-llm-credentials
                  key: model
            # 安全配置：禁用 HMAC 签名验证（内部网络访问）
            - name: ASTER_SECURITY_SIGNATURE_ENABLED
              value: "false"
            # JVM 调优（缩减堆内存）
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /q/health/started
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: tmp
          emptyDir: {}
