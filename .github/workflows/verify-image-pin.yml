# verify-image-pin —— image-lock PR 验签闸门（统一 digest pin 设计 A′ Phase 1）
#
# 见 wontlost-ltd/k3s#4、blocker1/blocker2 spike、Codex 对抗式审查修正。
# ★ 本 workflow **只提供** required check + 纵深校验；真正的合并强制在 k3s ruleset。
# ★ 用 `pull_request`（**绝不** pull_request_target），只读 PR 数据，**不 checkout/运行 PR 代码**。
#
# ★ Codex 审查修正（Critical 1/4）：**不加 `paths` 过滤**。因为 `verify-image-pin` 是 main
#   全局 required check，若只在 image-lock 变更时触发，则改别的文件的人工 PR 永远产生不了该
#   check → 死锁。故本 workflow 对**所有** PR 运行：
#     - 未改 image-lock/kustomization/deployment 受控路径 → 发 verify-image-pin success(no-op)，
#       人工 PR 正常走其它 review 规则。
#     - 改了受控路径但 base 侧验签脚本缺失 → fail-closed（Task A4 Blocker 3；不再 no-op）。
#     - 只改 image-lock  → 严格 shape + cosign + freshness，仅验证变更 entry(base vs head)。
#     - image-lock + 其它 → shape 检查拒 → 发 failure check。

name: verify-image-pin

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read          # 读本仓 allowed-images（base 可信侧）
  pull-requests: read      # 读 PR 元数据（fork/author/head-ref/changed files）

concurrency:
  group: verify-image-pin-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  # cloud（静态部署镜像）路径：aster-api/aster-cloud-migrate 的 kustomization-bound pin。
  CLOUD_LOCK_PATH: apps/aster-lang/cloud/image-lock.yaml
  CLOUD_KUST_PATH: apps/aster-lang/cloud/kustomization.yaml
  # runner（env-bound + launcher kustomization-bound 共用同一 image-lock 文件）路径。
  #   runner image-lock 含两 entry（aster-replay-runner=env / aster-runner-launcher=kustomization）；
  #   env-bound 的部署真相载体是 runner/deployment.yaml 的 RUNNER_IMAGE_DIGEST env。
  RUNNER_LOCK_PATH: apps/aster-lang/runner/image-lock.yaml
  RUNNER_DEPLOY_PATH: apps/aster-lang/runner/deployment.yaml
  RUNNER_KUST_PATH: apps/aster-lang/runner/kustomization.yaml
  # 部署策略文件（deferredImages 显式豁免列表）——**不在** image-pin 门控 pin 路径，故改本文件的
  #   人工 PR 判 pin_flavor=none → no-op。render-guard 从**可信 base 侧**读它决定 render 豁免。
  RUNNER_DEPLOY_POLICY_PATH: apps/aster-lang/runner/deploy-policy.yaml

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # 可信侧：checkout PR base 的代码（本仓受控脚本 + allowed-images 白名单）。
      # PR head 的 image-lock 仅作**数据**取用（见下），不 checkout head、不跑其脚本。
      - name: Checkout base (trusted side)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Compute changed files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/pr
          # ★Task A4 Blocker 2 修正：GitHub PR files API 对 renamed 文件只把新路径放进
          #   `.filename`，旧路径在 `.previous_filename`。若只取 `.filename`，把受控路径（如
          #   runner/image-lock.yaml）重命名走会让 detection 漏检该 rename-away 动作
          #   （旧路径消失、新路径非受控 → pin_flavor=none → no-op）。故 changed-files 必须
          #   同时收纳 `.filename` 与 `.previous_filename`（rename 场景下两者都要能命中受控路径判定，
          #   使 rename-away 仍进 strict path，由 check-pr-shape 的 whitelist 拒掉多余/异常路径）。
          # ★Codex 抓 Critical：PR files API 硬上限 3000 文件（--paginate 不能突破）。若 PR 改 >3000 文件，
          #   某受控文件可能落在未返回部分 → detection 漏检 → 假绿绕过。故须**完整性校验**：取 PR 元数据的
          #   changed_files 计数，与 files API 实际返回的**对象数**比对，不一致或 >3000 → fail-closed。
          declared_changed="$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" --jq '.changed_files')"
          if [[ "$declared_changed" -gt 3000 ]]; then
            echo "::error::PR 改动文件数 ${declared_changed} > 3000（GitHub files API 硬上限，detection 无法完整枚举）→ fail-closed。请拆分 PR。"
            exit 1
          fi
          # 取 files API 全量为**每对象一行 JSON**（jq -c）——★不用裸 TAB TSV（Codex 抓 Critical：
          #   git 文件名可含 TAB/换行，裸 TSV 会被 awk 拆错，攻击者可让越界路径重构成授权路径绕过）。
          #   计数用 JSON 对象行数；派生 changed-files/status 全程 jq 提字段（不按分隔符切不可信文件名）。
          gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[] | {status, filename, previous_filename}' | jq -c '.' > /tmp/pr/files.jsonl
          returned_count="$(jq -s 'length' /tmp/pr/files.jsonl)"
          if [[ "$returned_count" != "$declared_changed" ]]; then
            echo "::error::files API 返回对象数 ${returned_count} != PR 元数据 changed_files ${declared_changed}（截断/不一致）→ fail-closed"
            exit 1
          fi
          # ★Codex 抓 Critical：git 文件名可含换行/TAB/控制字符 → 逐行 grep/awk 消费者会被「记录边界注入」
          #   （一个恶意文件名含 \n 被拆成多个「授权路径」行绕过）。故**前置**拒绝任何 filename/previous_filename
          #   含控制字符（\x00-\x1f 含 \t\n\r）。合法 runner manifest 路径绝无控制字符；有即 fail-closed。
          #   这使下游所有逐行 grep -qxF/awk/while-read 消费者恢复安全（无文件名可跨行或含分隔符）。
          if jq -e '[.filename, .previous_filename // empty] | .[] | select(test("[\\x00-\\x1f]"))' /tmp/pr/files.jsonl >/dev/null 2>&1; then
            echo "::error::PR 改动文件名含控制字符（换行/TAB 等）→ fail-closed（防逐行消费者记录边界注入）"
            jq -r '[.filename, .previous_filename // empty] | .[] | select(test("[\\x00-\\x1f]")) | @json' /tmp/pr/files.jsonl >&2 || true
            exit 1
          fi
          # 从 JSONL 派生：changed-files（filename + rename 的 previous_filename，各一行）；changed-status
          #   （status + filename）。★逐行消费者的注入安全**由上方前置控制字符拒绝提供**（通过本关的文件名
          #   保证无换行/TAB/控制字符，故不能跨行或含分隔符）——非 jq -r 本身（jq -r 会原样输出文件名内的
          #   控制字符）。changed-status 的 filename 列不参与安全判定（安全判定全走 changed-files 的
          #   grep -qxF 全行精确匹配 + awk 只读 status 枚举列）。
          jq -r '.filename, (.previous_filename // empty)' /tmp/pr/files.jsonl > /tmp/pr/changed-files.txt
          # changed-status：仅供 awk 判 renamed/removed status（第一列枚举），filename 列不参与安全判定
          #   （安全判定全走 changed-files.txt 的 grep -qxF）。status 是 GitHub 受控枚举，无注入面。
          jq -r '[.status, .filename] | @tsv' /tmp/pr/files.jsonl > /tmp/pr/changed-status.txt
          echo "改动文件（含 rename previous_filename，完整性校验 ${returned_count}==${declared_changed}）："; cat /tmp/pr/changed-files.txt
          # 验签脚本只从**可信 base 侧**运行（不信 PR 改动的验签器代码）。若 base 尚无这些
          # 脚本（引入本机制的 bootstrap PR 自身），则无法在此 PR 上验签。
          if [[ -f scripts/image-pin/verify-image-pin.sh && -f scripts/image-pin/check-pr-shape.sh ]]; then
            scripts_present=true
          else
            scripts_present=false
            echo "::notice::base 侧无 image-pin 验签脚本（bootstrap PR）"
          fi
          # ★★detection 泛化（信任洞闭合）：识别 cloud 路径**或** runner 路径。
          #   任一 image-lock 被改 → strict path。改 kustomization/deployment 而不改对应 image-lock
          #   的 PR 也进 strict（由 check-pr-shape 拒），防绕过。
          #   互斥：一个 image-pin PR 只 pin 一个镜像（per-image 分支），不会跨 cloud/runner 同时改。
          pin_flavor=none
          if grep -qxF "$CLOUD_LOCK_PATH" /tmp/pr/changed-files.txt \
             || grep -qxF "$CLOUD_KUST_PATH" /tmp/pr/changed-files.txt; then
            pin_flavor=cloud
          fi
          # ★deploy-policy 也是 runner 触发路径（Codex 抓跨 PR 绕过）：strict render-guard 从可信 base 读
          #   deploy-policy 的 deferredImages 作 render 豁免依据。若 deploy-policy 单独改能走 no-op（不触发），
          #   攻击者可 PR-A 单独加恶意豁免（no-op success）→合入成可信 base→PR-B 的 render-guard 读该 base
          #   豁免跳过 render。故 deploy-policy 必须触发 runner lane：单独改它→invalid（分派后 topology 候选
          #   要求恰 3 授权文件全在，deploy-policy 单独→非全→invalid）；与 3 文件同现→runner-topology。
          if grep -qxF "$RUNNER_LOCK_PATH" /tmp/pr/changed-files.txt \
             || grep -qxF "$RUNNER_DEPLOY_PATH" /tmp/pr/changed-files.txt \
             || grep -qxF "$RUNNER_KUST_PATH" /tmp/pr/changed-files.txt \
             || grep -qxF "$RUNNER_DEPLOY_POLICY_PATH" /tmp/pr/changed-files.txt; then
            if [[ "$pin_flavor" == "cloud" ]]; then
              # 同一 PR 同时碰 cloud + runner → 非法形状（per-image 分支不应跨目录），fail-closed 进 strict
              #   由 check-pr-shape 拒。这里标 runner，让 strict path 跑起来拒它。
              echo "::warning::PR 同时改 cloud 与 runner 路径（非法 image-pin 形状）→ strict path 将拒"
            fi
            pin_flavor=runner
          fi
          # ★Task A4 Blocker 3 修正：pin 路径被命中（pin_flavor != none）但 base 侧脚本缺失，
          #   曾经直接 no-op success——对永久安全关键 workflow 这是 fail-open（脚本若因任何原因
          #   在 main 上缺失/被删，pin PR 即可不经验签合入）。现在改为：脚本缺失且命中 pin 路径
          #   → 直接失败（非 no-op）；只有真正的非 pin PR（pin_flavor==none）才允许 no-op。
          #   bootstrap 首次引入机制这一特殊场景需要人工例外（跳过分支保护/手动合并），不再由
          #   本 workflow 自动放行。
          if [[ "$pin_flavor" != "none" && "$scripts_present" == "false" ]]; then
            echo "::error::PR 命中 image-pin 受控路径（pin_flavor=$pin_flavor），但 base 侧验签脚本缺失 → fail-closed（非 no-op）。若为首次引入机制的 bootstrap PR，须走人工例外流程，不由本 workflow 自动放行。"
            exit 1
          fi

          # ── lane 分派（完备互斥枚举，Codex 定）：none|cloud-pin|runner-pin|runner-topology|invalid ──
          # detection 只做**粗分**（看 changed-files/status）；精判（pin 数据真不变、闭世界）交对应 lane
          #   校验器兜底（strict 走 check-pr-shape/cosign；topology 走 verify-runner-topology.sh，均从可信
          #   base 独立 fail-closed）。骗进错 lane 都被该 lane 校验器拒。
          lane=none
          if [[ "$pin_flavor" == "cloud" ]]; then
            lane=cloud-pin
          elif [[ "$pin_flavor" == "runner" ]]; then
            # runner 命中：区分 pin（改 image-lock）vs topology（只碰 kustomization/deployment/deploy-policy
            #   三授权文件，不碰 image-lock）。★image-lock touched → 一律 runner-pin（绝不 topology）。
            if grep -qxF "$RUNNER_LOCK_PATH" /tmp/pr/changed-files.txt; then
              lane=runner-pin
            else
              # 候选 topology：本 PR 改动的**全部**文件必须恰在三授权文件集内（不止 runner/ 下——go-live PR
              #   不得夹带任何其它路径：cloud/、docs、.github 等），且无 rename/delete。任何越界即 invalid。
              #   ★这也堵 cloud+runner 混合（touch cloud/kustomization + runner/kustomization → cloud 文件
              #   越界 → invalid），避免混合 PR 误入 topology lane（topology 校验器只看 runner 树，看不到 cloud）。
              topo_ok=true
              # (a) 无 rename/removed（任何路径）。
              if awk -F'\t' '$1 == "renamed" || $1 == "removed"' /tmp/pr/changed-status.txt | grep -q .; then
                echo "::warning::topology 候选含 rename/delete → invalid"
                topo_ok=false
              fi
              # (b) 本 PR 改动的**每个**文件（去重、含 rename previous_filename）都必须是三授权文件之一。
              while IFS= read -r cf; do
                [[ -n "$cf" ]] || continue
                case "$cf" in
                  apps/aster-lang/runner/kustomization.yaml|apps/aster-lang/runner/deployment.yaml|apps/aster-lang/runner/deploy-policy.yaml) : ;;
                  *) echo "::warning::topology 候选夹带非授权文件 ${cf} → invalid"; topo_ok=false ;;
                esac
              done < <(sort -u /tmp/pr/changed-files.txt)
              # (c) 合法 go-live **必须**同时改 kustomization + deployment（加回 resources + replicas 0→1）。
              #   缺其一（如仅改 deploy-policy 加豁免、或仅改 kustomization）→ 非完整 go-live 形状 → invalid。
              #   ★这堵 Codex 抓的 deploy-policy-only 跨 PR 绕过（单独加恶意豁免不能走 no-op/topology 放行）。
              if ! grep -qxF "$RUNNER_KUST_PATH" /tmp/pr/changed-files.txt \
                 || ! grep -qxF "$RUNNER_DEPLOY_PATH" /tmp/pr/changed-files.txt; then
                echo "::warning::topology 候选缺 kustomization 或 deployment（非完整 go-live 形状）→ invalid"
                topo_ok=false
              fi
              if [[ "$topo_ok" == "true" ]]; then
                lane=runner-topology
              else
                lane=invalid
              fi
            fi
          fi

          echo "lane=$lane" >> "$GITHUB_OUTPUT"
          echo ">> 分派 lane=$lane（pin_flavor=$pin_flavor）"
          # 保留 touches_lock/pin_flavor 供既有 strict 步条件复用（strict lane = cloud-pin|runner-pin）。
          if [[ "$lane" == "cloud-pin" || "$lane" == "runner-pin" ]]; then
            echo "touches_lock=true"  >> "$GITHUB_OUTPUT"
          else
            echo "touches_lock=false" >> "$GITHUB_OUTPUT"
          fi
          echo "pin_flavor=$pin_flavor" >> "$GITHUB_OUTPUT"
        id: changed

      # ── invalid lane：命中 runner 受控路径但形状不明（rename/delete/触非授权文件/pin 变但没改 image-lock 的混合）→ explicit failure ──
      - name: Invalid image-pin/topology shape (explicit failure)
        if: steps.changed.outputs.lane == 'invalid'
        run: |
          echo "::error::PR 命中 runner 受控路径但既非合法 image-pin PR（未改 image-lock）亦非合法 topology PR（触及非授权文件/含 rename-delete）→ fail-closed。合法 go-live topology PR 只许改 {kustomization,deployment,deploy-policy}.yaml；合法 pin PR 须由 image-pin bot 双写 image-lock。"
          exit 1

      # ── 分流 A：非 pin/非 topology PR（lane=none）→ no-op（发 success，不做验签）──
      # ★注意：条件用 lane=='none'（非 touches_lock），否则 runner-topology PR 会同时命中 no-op 与 topology lane。
      - name: No-op for non-image-pin PR
        id: noop
        if: steps.changed.outputs.lane == 'none'
        run: echo "本 PR 未改 image-lock/kustomization/topology → verify-image-pin no-op（人工 PR 走其它 review 规则）"

      # ── topology lane：go-live 拓扑迁移 PR（激活已固定 launcher）→ verify-runner-topology.sh ──
      - name: Verify runner go-live topology (lane=runner-topology)
        if: steps.changed.outputs.lane == 'runner-topology'
        id: topology
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # ── 工具就绪：yq（pinned+checksum，同 strict 步）+ kubectl（runner 预装）+ jq/python3（预装）──
          if ! command -v yq >/dev/null; then
            YQ_VER=v4.44.3
            YQ_SHA=a2c097180dd884a8d50c956ee16a9cec070f30a7947cf4ebf87d5f36213e9ed7
            curl -fsSL -o /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VER}/yq_linux_amd64"
            echo "${YQ_SHA}  /tmp/yq" | sha256sum -c - || { echo "::error::yq checksum 校验失败"; exit 1; }
            sudo install -m 0755 /tmp/yq /usr/local/bin/yq
          fi
          for c in yq jq kubectl python3; do command -v "$c" >/dev/null || { echo "::error::topology lane 缺依赖 $c"; exit 1; }; done
          yq --version; kubectl version --client 2>/dev/null | head -1 || true
          # base 树：可信 base checkout 的 workspace runner 目录（脚本只读，复制到 tmp 变换，不改 base）。
          BASE_RUNNER="apps/aster-lang/runner"
          [[ -d "$BASE_RUNNER" ]] || { echo "::error::base runner 目录缺失（异常）"; exit 1; }
          # ★head 树用 GitHub API **受限导出**（非二次 checkout head 代码——安全铁律）：从可信 base 的
          #   文件名集合出发，逐个读 head SHA 的同名 blob。拒缺失/新增/子目录/symlink/非 blob。
          HEAD_RUNNER="$(mktemp -d)"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          # 可信 base 顶层文件名集合。
          base_names="$(find "$BASE_RUNNER" -maxdepth 1 -type f | sed 's#.*/##' | sort)"
          # head 侧 runner/ 顶层内容清单（含 type，拒子目录/非 blob）。
          head_listing="$(gh api "repos/${{ github.repository }}/contents/${BASE_RUNNER}?ref=${HEAD_SHA}" \
            --jq '.[] | "\(.type)\t\(.name)"')" || { echo "::error::取 head runner 目录清单失败"; exit 1; }
          # head 顶层文件名集合（只取 type==file）。
          head_names="$(echo "$head_listing" | awk -F'\t' '$1=="file"{print $2}' | sort)"
          # 拒非 file 条目（dir/submodule/symlink 在 contents API 里 type 非 file）。
          if echo "$head_listing" | awk -F'\t' '$1!="file"' | grep -q .; then
            echo "::error::head runner 目录含非普通文件条目（子目录/submodule/symlink）→ fail-closed"
            echo "$head_listing" | awk -F'\t' '$1!="file"' >&2
            exit 1
          fi
          # 文件集必须与 base 完全一致（无新增/删除——校验器还会再查一次，此为导出前置）。
          if [[ "$base_names" != "$head_names" ]]; then
            echo "::error::head runner 目录文件集 != base（新增/删除文件）→ fail-closed"
            diff <(echo "$base_names") <(echo "$head_names") >&2 || true
            exit 1
          fi
          # 逐文件从 head SHA 取 blob 内容（base64 解码），落 HEAD_RUNNER。
          # ★纵深：显式校验 encoding==base64（>1MB 文件 contents API 返回 encoding=none + 空 content，
          #   须 blob api；runner 文件都小，此处 fail-closed 拒大文件而非静默产空文件绕过）。
          while IFS= read -r name; do
            [[ -n "$name" ]] || continue
            meta="$(gh api "repos/${{ github.repository }}/contents/${BASE_RUNNER}/${name}?ref=${HEAD_SHA}")" \
              || { echo "::error::取 head 文件失败：${name}"; exit 1; }
            enc="$(jq -r '.encoding // ""' <<<"$meta")"
            [[ "$enc" == "base64" ]] \
              || { echo "::error::head 文件 ${name} encoding=${enc}（非 base64，疑 >1MB 大文件）→ fail-closed"; exit 1; }
            jq -r '.content' <<<"$meta" | base64 -d > "${HEAD_RUNNER}/${name}" \
              || { echo "::error::head 文件 ${name} base64 解码失败"; exit 1; }
          done <<< "$base_names"
          echo ">> head runner 树已受限导出到 $HEAD_RUNNER（$(echo "$base_names" | wc -l | tr -d ' ') 文件）"
          # 运行可信 base 侧校验器（闭世界 render-equality + 目录文件集 + pin 不变 + 严格 YAML）。
          # ★kubectl kustomize 不传 --enable-exec/--enable-alpha-plugins/--enable-helm（校验器内部亦然）。
          bash scripts/image-pin/verify-runner-topology.sh "$BASE_RUNNER" "$HEAD_RUNNER"
          echo "topology_verified=true" >> "$GITHUB_OUTPUT"

      # ── 分流 B：改了 image-lock → 严格路径 ──
      - name: Fetch PR-head 数据 (binding-mode aware，不 checkout head 代码)
        if: steps.changed.outputs.touches_lock == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PIN_FLAVOR: ${{ steps.changed.outputs.pin_flavor }}
        run: |
          set -euo pipefail
          # ★按 pin_flavor 选 image-lock 路径（cloud=cloud/image-lock.yaml / runner=runner/image-lock.yaml）。
          #   路径从可信 base 侧 env 常量取，非 PR 供值。
          if [[ "$PIN_FLAVOR" == "runner" ]]; then
            LOCK="$RUNNER_LOCK_PATH"
          else
            LOCK="$CLOUD_LOCK_PATH"
          fi
          # 取 head image-lock（数据）。
          gh api "repos/${{ github.repository }}/contents/${LOCK}?ref=${{ github.event.pull_request.head.sha }}" \
            --jq '.content' | base64 -d > /tmp/pr/head-image-lock.yaml
          echo "PR-head image-lock sha256: $(sha256sum /tmp/pr/head-image-lock.yaml | cut -d' ' -f1)"
          # base（可信 checkout 侧）作为 diff 基线；base 无该文件则空。
          cp "$LOCK" /tmp/pr/base-image-lock.yaml 2>/dev/null || echo 'images: []' > /tmp/pr/base-image-lock.yaml
          if [[ "$PIN_FLAVOR" == "runner" ]]; then
            # runner 目录含两类 pin：aster-replay-runner(env-bound→deployment) 与
            #   aster-runner-launcher(kustomization-bound→runner/kustomization)。按 PR 实际改了哪个
            #   部署载体文件派生（都从可信 base 侧路径取，非 PR 供值）。一个 image-pin PR 只改其一。
            if grep -qxF "$RUNNER_DEPLOY_PATH" /tmp/pr/changed-files.txt; then
              gh api "repos/${{ github.repository }}/contents/${RUNNER_DEPLOY_PATH}?ref=${{ github.event.pull_request.head.sha }}" \
                --jq '.content' | base64 -d > /tmp/pr/head-deployment.yaml
              cp "$RUNNER_DEPLOY_PATH" /tmp/pr/base-deployment.yaml
              echo "runner env-bound：取 deployment 数据"
            fi
            if grep -qxF "$RUNNER_KUST_PATH" /tmp/pr/changed-files.txt; then
              gh api "repos/${{ github.repository }}/contents/${RUNNER_KUST_PATH}?ref=${{ github.event.pull_request.head.sha }}" \
                --jq '.content' | base64 -d > /tmp/pr/head-kustomization.yaml
              cp "$RUNNER_KUST_PATH" /tmp/pr/base-kustomization.yaml
              echo "runner kustomization-bound(launcher)：取 kustomization 数据"
            fi
            # ★render 豁免策略只从**可信 base 侧**读（非 PR head）——deferral 是 main 既定状态，
            #   PR 不得在本次变更中新声明豁免绕过 render。base 无该文件则空列表（无豁免）。
            cp "$RUNNER_DEPLOY_POLICY_PATH" /tmp/pr/base-deploy-policy.yaml 2>/dev/null \
              || echo 'deferredImages: []' > /tmp/pr/base-deploy-policy.yaml
          else
            # kustomization-binding（cloud）：取 head cloud/kustomization.yaml（数据）+ base（可信侧）。
            gh api "repos/${{ github.repository }}/contents/${CLOUD_KUST_PATH}?ref=${{ github.event.pull_request.head.sha }}" \
              --jq '.content' | base64 -d > /tmp/pr/head-kustomization.yaml
            echo "PR-head kustomization sha256: $(sha256sum /tmp/pr/head-kustomization.yaml | cut -d' ' -f1)"
            cp "$CLOUD_KUST_PATH" /tmp/pr/base-kustomization.yaml
            # cloud 树无 deferral（launcher 才有）；render-guard 无条件读该文件，故置空列表兜底。
            echo 'deferredImages: []' > /tmp/pr/base-deploy-policy.yaml
          fi

      - name: Check PR shape (blocker2 纵深，binding-mode aware)
        if: steps.changed.outputs.touches_lock == 'true'
        env:
          IMAGE_PIN_BOT_LOGIN: ${{ vars.IMAGE_PIN_BOT_LOGIN }}
          IMAGE_PIN_BOT_ID: ${{ vars.IMAGE_PIN_BOT_ID }}
          PIN_FLAVOR: ${{ steps.changed.outputs.pin_flavor }}
        run: |
          set -euo pipefail
          # ★按 flavor 传 image-lock 与部署真相 env（路径全来自可信 base 侧 env 常量，非 PR 供值）。
          #   runner 下再按改动集分流：launcher(改 runner/kustomization.yaml) 传 KUSTOMIZATION_PATH；
          #   env-bound runner(改 runner/deployment.yaml) 传 DEPLOYMENT_PATH；cloud 传 KUSTOMIZATION_PATH（不变）。
          if [[ "$PIN_FLAVOR" == "runner" ]]; then
            if grep -qxF "$RUNNER_KUST_PATH" /tmp/pr/changed-files.txt; then
              # launcher（kustomization-bound in runner dir）：whitelist {runner image-lock, runner kustomization}
              IMAGE_LOCK_PATH="$RUNNER_LOCK_PATH" \
              KUSTOMIZATION_PATH="$RUNNER_KUST_PATH" \
                bash scripts/image-pin/check-pr-shape.sh "$GITHUB_EVENT_PATH" /tmp/pr/changed-files.txt
            else
              # runner（env-bound）：whitelist {runner image-lock, runner deployment}
              IMAGE_LOCK_PATH="$RUNNER_LOCK_PATH" \
              DEPLOYMENT_PATH="$RUNNER_DEPLOY_PATH" \
                bash scripts/image-pin/check-pr-shape.sh "$GITHUB_EVENT_PATH" /tmp/pr/changed-files.txt
            fi
          else
            IMAGE_LOCK_PATH="$CLOUD_LOCK_PATH" \
            KUSTOMIZATION_PATH="$CLOUD_KUST_PATH" \
              bash scripts/image-pin/check-pr-shape.sh "$GITHUB_EVENT_PATH" /tmp/pr/changed-files.txt
          fi

      - name: Install cosign
        if: steps.changed.outputs.touches_lock == 'true'
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v3.1.1'

      - name: Install yq (pinned + checksum)
        if: steps.changed.outputs.touches_lock == 'true'
        run: |
          set -euo pipefail
          YQ_VER=v4.44.3
          # 真实 sha256（yq_linux_amd64 v4.44.3，直接对二进制核实）。供应链固定，失败即中止。
          YQ_SHA=a2c097180dd884a8d50c956ee16a9cec070f30a7947cf4ebf87d5f36213e9ed7
          curl -fsSL -o /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VER}/yq_linux_amd64"
          echo "${YQ_SHA}  /tmp/yq" | sha256sum -c - || { echo "::error::yq checksum 校验失败"; exit 1; }
          sudo install -m 0755 /tmp/yq /usr/local/bin/yq
          yq --version

      - name: Verify image-lock (only changed entries; cosign + freshness, binding-mode aware)
        if: steps.changed.outputs.touches_lock == 'true'
        env:
          GH_TOKEN: ${{ github.token }}         # freshness 查源仓 HEAD，只读足够
          IMAGE_PIN_FRESHNESS: latest-only
          PIN_FLAVOR: ${{ steps.changed.outputs.pin_flavor }}
        run: |
          set -euo pipefail
          # ★runner：按上一步实际取到的数据文件传参——env-bound(aster-replay-runner) 传 head/base
          #   deployment(参数 6/7)，launcher(kustomization-bound) 传 head/base kustomization(参数 4/5)。
          #   一个 image-pin PR 只改其一，故两组参数中总有一组为空字符串（verify-image-pin.sh 视为未提供）。
          #   cloud：传 head/base kustomization（参数 4/5，deployment 参数不传），行为不变。
          if [[ "$PIN_FLAVOR" == "runner" ]]; then
            HEAD_KUST_ARG=""; BASE_KUST_ARG=""; HEAD_DEP_ARG=""; BASE_DEP_ARG=""
            [[ -f /tmp/pr/head-kustomization.yaml ]] && { HEAD_KUST_ARG=/tmp/pr/head-kustomization.yaml; BASE_KUST_ARG=/tmp/pr/base-kustomization.yaml; }
            [[ -f /tmp/pr/head-deployment.yaml ]]    && { HEAD_DEP_ARG=/tmp/pr/head-deployment.yaml;    BASE_DEP_ARG=/tmp/pr/base-deployment.yaml; }
            bash scripts/image-pin/verify-image-pin.sh \
              .github/image-pin/allowed-images.yaml \
              /tmp/pr/base-image-lock.yaml \
              /tmp/pr/head-image-lock.yaml \
              "$HEAD_KUST_ARG" "$BASE_KUST_ARG" \
              "$HEAD_DEP_ARG" "$BASE_DEP_ARG"
          else
            bash scripts/image-pin/verify-image-pin.sh \
              .github/image-pin/allowed-images.yaml \
              /tmp/pr/base-image-lock.yaml \
              /tmp/pr/head-image-lock.yaml \
              /tmp/pr/head-kustomization.yaml \
              /tmp/pr/base-kustomization.yaml
          fi

      # ── Phase 3 keystone 渲染层校验：kubectl kustomize 出的每个变更镜像必须是 @sha256 ──
      # 用 base(可信) checkout 的其它 manifest + head 的 kustomization/image-lock（数据）。
      # 只校验渲染结果含 by-digest（image-lock 的 digest 已在上一步验签）。
      - name: Verify kustomize renders by-digest (binding-mode aware)
        id: renderguard
        if: steps.changed.outputs.touches_lock == 'true'
        env:
          PIN_FLAVOR: ${{ steps.changed.outputs.pin_flavor }}
        run: |
          set -euo pipefail
          # render 校验只对 kustomization-bound 镜像有意义（渲染出 name@sha256）。选目标树：
          #   cloud PR → 渲 cloud 树；runner 里的 launcher(kustomization-bound) PR → 渲 runner 树；
          #   runner env-bound PR（只改 deployment，无 head-kustomization）→ 跳过 render（env 无静态渲染，
          #   其部署真相已由 verify 的 env value + deployment semantic-diff 保证）。
          if [[ "$PIN_FLAVOR" == "runner" ]]; then
            if [[ ! -f /tmp/pr/head-kustomization.yaml ]]; then
              echo ">> runner env-bound PR（无 kustomization 变更）→ 跳过 render（env-bound 无静态渲染）"
              exit 0
            fi
            TREE=apps/aster-lang/runner
            cp /tmp/pr/head-kustomization.yaml apps/aster-lang/runner/kustomization.yaml
            cp /tmp/pr/head-image-lock.yaml    apps/aster-lang/runner/image-lock.yaml
          else
            TREE=apps/aster-lang/cloud
            cp /tmp/pr/head-kustomization.yaml apps/aster-lang/cloud/kustomization.yaml
            cp /tmp/pr/head-image-lock.yaml    apps/aster-lang/cloud/image-lock.yaml
          fi
          rendered="$(kubectl kustomize "$TREE")"
          # 只对**在 kustomization.images 里的镜像**做 render 校验（env-bound 的 runner 镜像不在其中，跳过）。
          #   image-lock 转 JSON（数值标量转字符串防精度损坏）。
          lock_json="$(yq -o=json '(.. | select(tag=="!!int" or tag=="!!float"))|=tostring' /tmp/pr/head-image-lock.yaml)"
          kust_json="$(yq -o=json '.' /tmp/pr/head-kustomization.yaml)"
          # ★render 豁免（deferredImages）从**可信 base 侧 deploy-policy.yaml** 读（非 PR head，也非
          #   image-lock）：(1) 从 head 读=PR 可偷加豁免绕 render；(2) 放 image-lock=人工加策略字段被
          #   image-pin shape 门当非法 PR 拒 + 污染 pin 数据模型。deferral 是部署策略事实、是 main 既定
          #   状态，PR 不得在本次变更中新声明豁免。deploy-policy.yaml 不在 pin 门控路径，人工改它走普通
          #   review（pin_flavor=none → no-op）。
          deferred_json="$(yq -o=json '.' /tmp/pr/base-deploy-policy.yaml)"
          n="$(jq '.images | length' <<<"$lock_json")"
          for k in $(seq 0 $((n - 1))); do
            img="$(jq -r ".images[$k].image"  <<<"$lock_json")"
            dig="$(jq -r ".images[$k].digest" <<<"$lock_json")"
            # 该镜像是否在 base deploy-policy 的 deferredImages 显式列出（按镜像名匹配）。
            deferred="$(jq -r --arg img "$img" '([.deferredImages[]? | select(.image == $img)] | length) > 0' <<<"$deferred_json")"
            # 该镜像若不在 kustomization.images（env-bound，如 aster-replay-runner）→ 不参与静态渲染，跳过。
            in_kust="$(jq -r --arg img "$img" '[.images[]? | select(.name == $img)] | length' <<<"$kust_json")"
            [[ "$in_kust" == "1" ]] || { echo ">> ${img} 非 kustomization-bound（不进静态渲染），跳过 render 校验"; continue; }
            # ★显式 deferred（deploy-policy.yaml deferredImages 列出，Codex 审：仅**显式**才豁免）——
            #   镜像 pin 正确但其 Deployment 显式移出 kustomization resources（go-live 门），不被渲染引用、
            #   不出现在 render 输出。故不强制它 render by-digest；其 pin 一致性仍由前面 verify-image-pin.sh
            #   的 kust_digest==image-lock digest 守。★未在 deferredImages 列出的镜像若不渲染 → 下方 grep
            #   失败 fail-closed（防「Deployment 意外移出 resources」被静默放过——不是无条件跳过未渲染镜像）。
            if [[ "$deferred" == "true" ]]; then
              echo ">> ${img} 在 base deploy-policy.deferredImages 显式列出（Deployment deferred 出 kustomization，go-live 门）→ 跳过 render 校验（pin 一致性仍由 kust_digest==digest 守）"
              continue
            fi
            grep -qF "${img}@${dig}" <<<"$rendered" \
              || { echo "::error::kustomize 渲染未见 ${img}@${dig}（部署未 by-digest；若为显式 deferred 须在 deploy-policy.yaml 的 deferredImages 列出该镜像）"; exit 1; }
            echo ">> 渲染校验 OK：${img}@${dig}"
          done

      # ── 恰一 lane 断言（Codex 定，防「条件写错致全 lane skipped 但 job 仍 success」的假绿）──
      # ★用 lane 枚举本身判：lane 必须是 5 合法值之一；且对应 lane 的处置步已跑（none→no-op；
      #   cloud-pin|runner-pin→strict；runner-topology→topology；invalid 已在前面 exit 1 使 job 失败）。
      #   若 lane 是未知值或空 → explicit failure。
      - name: Assert exactly one lane (anti-false-green)
        if: ${{ always() }}
        env:
          LANE: ${{ steps.changed.outputs.lane }}
          CHANGED_OUTCOME: ${{ steps.changed.outcome }}
          NOOP_OUTCOME: ${{ steps.noop.outcome }}
          TOPOLOGY_OUTCOME: ${{ steps.topology.outcome }}
          RENDERGUARD_OUTCOME: ${{ steps.renderguard.outcome }}
        run: |
          set -euo pipefail
          # detection 步本身若失败/跳过 → job 已非正常，交由 job.status 表达；此处只在 detection 成功时校验 lane。
          if [[ "$CHANGED_OUTCOME" != "success" ]]; then
            echo ">> detection 步 outcome=$CHANGED_OUTCOME（非 success）→ 由 job.status 表达，跳过 lane 断言"
            exit 0
          fi
          # ★不止校验枚举合法，还须校验**对应 lane 的处置步真的跑了**（outcome 匹配），防某 lane 条件
          #   写错致全 skip 但 job 仍 success 的假绿（Codex 抓）。sentinel：none→noop；cloud-pin|runner-pin
          #   →renderguard（strict 最终步）；runner-topology→topology；invalid→前面已 exit 1（job 必 fail）。
          echo ">> lane=$LANE noop=$NOOP_OUTCOME topology=$TOPOLOGY_OUTCOME renderguard=$RENDERGUARD_OUTCOME"
          case "$LANE" in
            none)
              [[ "$NOOP_OUTCOME" == "success" ]] \
                || { echo "::error::lane=none 但 no-op 步 outcome=$NOOP_OUTCOME（非 success）→ 条件错配 fail-closed"; exit 1; } ;;
            cloud-pin|runner-pin)
              # strict lane 最终 sentinel = render-guard（touches_lock 全链最后一步；前置任一失败 job 已 fail）。
              [[ "$RENDERGUARD_OUTCOME" == "success" ]] \
                || { echo "::error::lane=$LANE 但 render-guard(strict 最终步) outcome=$RENDERGUARD_OUTCOME（非 success）→ strict 链未完整跑 fail-closed"; exit 1; } ;;
            runner-topology)
              [[ "$TOPOLOGY_OUTCOME" == "success" ]] \
                || { echo "::error::lane=runner-topology 但 topology 校验步 outcome=$TOPOLOGY_OUTCOME（非 success）→ 条件错配 fail-closed"; exit 1; } ;;
            invalid)
              # invalid 步已 exit 1 使 job fail；本断言（always）能到这里说明 job 会以 failure 收尾，不放绿。
              echo ">> lane=invalid（Invalid 步已 fail job）" ;;
            *) echo "::error::lane 枚举非法或空：'$LANE' → fail-closed（防未知 lane 假绿）"; exit 1 ;;
          esac
          echo ">> 恰一 lane 断言通过"

      # ── 发 check run 用 image-pin App token（使 required-check source = App, blocker2 X3）──
      # 无论 no-op 还是严格路径，只要走到这里(前面步骤未失败)即发 success；失败路径由 job 失败
      # 表现为 required check 缺失/红。需仓库配置 vars.IMAGE_PIN_APP_ID + secrets.IMAGE_PIN_APP_PRIVATE_KEY。
      - name: Mint image-pin App token
        id: apptoken
        if: ${{ always() && vars.IMAGE_PIN_APP_ID != '' }}
        uses: actions/create-github-app-token@v3.2.0
        with:
          # client-id 取代已弃用的 app-id（create-github-app-token@v3 弃用警告）。
          client-id: ${{ vars.IMAGE_PIN_APP_CLIENT_ID }}
          private-key: ${{ secrets.IMAGE_PIN_APP_PRIVATE_KEY }}
          permission-checks: write

      - name: Publish verify-image-pin check run (App source)
        if: ${{ always() && vars.IMAGE_PIN_APP_ID != '' }}
        env:
          GH_TOKEN: ${{ steps.apptoken.outputs.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          JOB_STATUS: ${{ job.status }}          # success / failure
          LANE: ${{ steps.changed.outputs.lane }}
        run: |
          set -euo pipefail
          if [[ "$JOB_STATUS" == "success" ]]; then
            conclusion=success
            summary="verify-image-pin 通过（lane=${LANE}；no-op / cosign+freshness / topology 闭世界 全过）"
          else
            conclusion=failure
            summary="verify-image-pin 失败（lane=${LANE}），见 job 日志"
          fi
          gh api -X POST "repos/${{ github.repository }}/check-runs" \
            -f name='verify-image-pin' \
            -f head_sha="$HEAD_SHA" \
            -f status='completed' \
            -f conclusion="$conclusion" \
            -f 'output[title]=verify-image-pin' \
            -f "output[summary]=${summary}" \
            >/dev/null
          echo "已用 image-pin App 身份发 $conclusion check run"
