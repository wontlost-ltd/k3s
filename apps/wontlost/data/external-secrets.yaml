# ExternalSecrets for wontlost-data namespace
# Pulls database and Redis credentials from Vault
---
# PostgreSQL Credentials for Data Service
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: data-service-db-credentials
  namespace: wontlost-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: data-service-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_HOST
      remoteRef:
        key: data-services/postgres
        property: host
    - secretKey: POSTGRES_PORT
      remoteRef:
        key: data-services/postgres
        property: port
    - secretKey: POSTGRES_DB
      remoteRef:
        key: data-services/wontlost-db
        property: database
    - secretKey: POSTGRES_USER
      remoteRef:
        key: data-services/wontlost-db
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: data-services/wontlost-db
        property: password

---
# Redis Credentials for Data Service
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: data-service-redis-credentials
  namespace: wontlost-data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: data-service-redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: REDIS_HOST
      remoteRef:
        key: data-services/redis
        property: host
    - secretKey: REDIS_PORT
      remoteRef:
        key: data-services/redis
        property: port
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: data-services/redis
        property: password
