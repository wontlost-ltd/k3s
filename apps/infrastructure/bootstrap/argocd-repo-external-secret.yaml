# ExternalSecret for ArgoCD Repository Credentials
# Pulls GitHub App credentials from Vault for private repo access
# NOTE: Bootstrap manually first, then this takes over management
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: k3s-repo-creds
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: k3s-repo-creds
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: "{{ .type }}"
        url: "{{ .url }}"
        githubAppID: "{{ .githubAppID }}"
        githubAppInstallationID: "{{ .githubAppInstallationID }}"
        githubAppPrivateKey: "{{ .githubAppPrivateKey }}"
  data:
    - secretKey: type
      remoteRef:
        key: infrastructure/argocd-repo
        property: type
    - secretKey: url
      remoteRef:
        key: infrastructure/argocd-repo
        property: url
    - secretKey: githubAppID
      remoteRef:
        key: infrastructure/argocd-repo
        property: github_app_id
    - secretKey: githubAppInstallationID
      remoteRef:
        key: infrastructure/argocd-repo
        property: github_app_installation_id
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: infrastructure/argocd-repo
        property: github_app_private_key
