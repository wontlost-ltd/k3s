# CloudNativePG Operator
# Kubernetes-native PostgreSQL operator for managing PostgreSQL clusters
# https://cloudnative-pg.io/
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
  annotations:
    # Deploy early - other components depend on PostgreSQL
    argocd.argoproj.io/sync-wave: "-8"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: data-services
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.27.0
    helm:
      releaseName: cloudnative-pg
      valuesObject:
        # Image pull policy
        image:
          pullPolicy: IfNotPresent

        # 单副本，节省资源
        replicaCount: 1

        podDisruptionBudget:
          enabled: false

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

        # Security hardening
        podSecurityContext:
          runAsNonRoot: true
          fsGroup: 65534
          seccompProfile:
            type: RuntimeDefault
        containerSecurityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          runAsGroup: 65534
          capabilities:
            drop:
              - ALL

        # Monitoring
        # NOTE: PodMonitor disabled until monitoring stack is deployed
        # After Prometheus Operator is ready, set podMonitorEnabled: true
        monitoring:
          podMonitorEnabled: false
          # podMonitorAdditionalLabels:
          #   release: prometheus

        # Webhook configuration
        webhook:
          mutating:
            create: true
          validating:
            create: true

        # RBAC
        rbac:
          create: true

        serviceAccount:
          create: true

  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
