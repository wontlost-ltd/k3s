# Infrastructure Project
# Core ArgoCD self-management and shared platform components
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
spec:
  description: "ArgoCD self-management and platform orchestration"
  sourceRepos:
    - 'https://github.com/wontlost-ltd/k3s.git'
    # ArgoCD official repo for self-management
    - 'https://github.com/argoproj/argo-cd.git'
    - 'https://argoproj.github.io/argo-helm'
    # Ingress
    - 'https://traefik.github.io/charts'
    # Monitoring
    - 'https://prometheus-community.github.io/helm-charts'
  destinations:
    # ArgoCD namespace for self-management
    - namespace: argocd
      server: https://kubernetes.default.svc
    # Traefik namespace
    - namespace: traefik
      server: https://kubernetes.default.svc
    # Monitoring namespace
    - namespace: monitoring
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    # ArgoCD CRDs
    - group: argoproj.io
      kind: '*'
    # Prometheus Operator CRDs
    - group: monitoring.coreos.com
      kind: '*'
    # Ingress resources
    - group: networking.k8s.io
      kind: IngressClass
    - group: networking.k8s.io
      kind: Ingress
    # Traefik CRDs
    - group: traefik.io
      kind: '*'
    - group: traefik.containo.us
      kind: '*'
    # Webhook configurations
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    # CRDs
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    # ClusterRoles for RBAC
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  # Explicit namespaced resource allowlist for security
  namespaceResourceWhitelist:
    # Core workloads
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: ''
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: ReplicaSet
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    # Networking
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    # Autoscaling
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    # RBAC (namespaced)
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    # Monitoring
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    # Policy
    - group: policy
      kind: PodDisruptionBudget
