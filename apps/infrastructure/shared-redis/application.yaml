# Shared Redis (Standalone)
# Bitnami Redis standalone mode for single-node deployment
# Used by Authentik, Aster API, and other applications for caching/sessions
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shared-redis
  namespace: argocd
  annotations:
    # Deploy after bootstrap (needs credentials ready first)
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: data-services
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 24.1.0
    helm:
      releaseName: shared-redis
      valuesObject:
        # Global settings
        global:
          imageRegistry: ""
          imagePullSecrets: []

        # Image configuration - Bitnami now only has 'latest' on Docker Hub
        image:
          registry: docker.io
          repository: bitnami/redis
          tag: latest
          pullPolicy: IfNotPresent

        # Standalone 架构，节省资源
        architecture: standalone

        # Authentication
        auth:
          enabled: true
          existingSecret: shared-redis-credentials
          existingSecretPasswordKey: password

        # Master configuration
        master:
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
          persistence:
            enabled: true
            size: 2Gi
          pdb:
            enabled: false
          # Security hardening
          podSecurityContext:
            runAsNonRoot: true
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

        # Metrics
        metrics:
          enabled: true
          image:
            registry: docker.io
            repository: bitnami/redis-exporter
            tag: latest
          serviceMonitor:
            enabled: false
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 50m

        # Network policy
        networkPolicy:
          enabled: false

        # Service account
        serviceAccount:
          create: true

  destination:
    server: https://kubernetes.default.svc
    namespace: data-services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
