# ExternalSecret for PostgreSQL Backup Credentials
# Pulls S3-compatible storage credentials from Vault for PostgreSQL backups
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-backup-credentials
  namespace: data-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-backup-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: data-services/postgres-backup
        property: access_key_id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: data-services/postgres-backup
        property: secret_access_key
