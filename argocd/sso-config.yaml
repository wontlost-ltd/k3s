# ArgoCD SSO Configuration
# Contains ExternalSecret for OIDC credentials
# Note: OIDC config and RBAC are managed in argocd/self/argocd-install.yaml Helm values
#
# PREREQUISITES:
# 1. Authentik is running and accessible
# 2. OAuth2/OIDC Provider created in Authentik (see docs/ARGOCD_SSO_SETUP.md)
# 3. Client ID and Secret stored in Vault at infrastructure/argocd

---
# ArgoCD OIDC Secret (populated by ExternalSecret)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-oidc-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: oidc.authentik.clientSecret
      remoteRef:
        key: infrastructure/argocd
        property: oidc_client_secret
