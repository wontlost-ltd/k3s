# Shared Redis Credentials
# Used by all applications connecting to shared Redis
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: shared-redis-credentials
  namespace: data-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: shared-redis-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: password
      remoteRef:
        key: data-services/redis
        property: password
    - secretKey: host
      remoteRef:
        key: data-services/redis
        property: host
    - secretKey: port
      remoteRef:
        key: data-services/redis
        property: port
