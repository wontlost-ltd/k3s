# ExternalSecrets for aster-cloud namespace
# Pulls database and Redis credentials from Vault
---
# PostgreSQL Credentials for Aster API
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aster-api-db-credentials
  namespace: aster-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aster-api-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        jdbc-url: "jdbc:postgresql://{{ .host }}:{{ .port }}/{{ .database }}"
        reactive-url: "postgresql://{{ .host }}:{{ .port }}/{{ .database }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: host
      remoteRef:
        key: data-services/postgres
        property: host
    - secretKey: port
      remoteRef:
        key: data-services/postgres
        property: port
    - secretKey: database
      remoteRef:
        key: data-services/aster-api-db
        property: database
    - secretKey: username
      remoteRef:
        key: data-services/aster-api-db
        property: username
    - secretKey: password
      remoteRef:
        key: data-services/aster-api-db
        property: password

---
# Redis Standalone Credentials for Aster API
# Quarkus Redis standalone: redis://:password@host:6379
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aster-api-redis-credentials
  namespace: aster-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aster-api-redis-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        redis-hosts: "redis://:{{ .password }}@shared-redis-master.data-services.svc.cluster.local:6379"
  data:
    - secretKey: password
      remoteRef:
        key: data-services/redis
        property: password
