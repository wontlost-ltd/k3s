# CKEditor Builder Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ckeditor-builder
  namespace: wontlost-ckeditor-builder
  labels:
    app: ckeditor-builder
    app.kubernetes.io/name: ckeditor-builder
    app.kubernetes.io/part-of: wontlost
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ckeditor-builder
  template:
    metadata:
      labels:
        app: ckeditor-builder
        app.kubernetes.io/name: ckeditor-builder
    spec:
      automountServiceAccountToken: false
      # R30+ audit P1：Spring Boot Actuator + build pipeline 需要 grace
      # 让 in-flight build 收尾，避免半成品 jar 写入 disk + 用户重试风暴。
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ckeditor-builder
          # image 字段不写 tag，由 kustomization.yaml 的 images: 段统一管理
          # CI (release.yml) 通过 kustomize edit set image 写入 immutable digest
          image: wontlost/ckeditor-builder
          imagePullPolicy: IfNotPresent  # digest 不可变，无需 Always 强制拉
          ports:
            - containerPort: 8082
          envFrom:
            - secretRef:
                name: ckeditor-builder-credentials
          securityContext:
            allowPrivilegeEscalation: false
            # R30+ audit P2：readOnlyRootFilesystem 暂留 false 的原因：
            # Spring Boot 启动期会向 /tmp 写 native-images 缓存 + 解压
            # nested-jar dependency，关掉会导致 boot 失败。下一步是改成
            # readOnly + emptyDir volumeMount on /tmp，但需要先验证
            # Spring Boot 3.x 的 layered-jar 行为。tracked: R31 backlog.
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: oracle-wallet
              mountPath: /app/wallet
              readOnly: true
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 250m
          # 探针走 Spring Boot Actuator，避免触发 Vaadin UI bootstrap
          # liveness: JVM/web 容器存活；readiness: 含数据源等 Spring 组件就绪
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30  # 最长 150s 启动窗口，覆盖 Vaadin 前端预热
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ckeditor-builder-data
        - name: oracle-wallet
          secret:
            secretName: oracle-wallet
