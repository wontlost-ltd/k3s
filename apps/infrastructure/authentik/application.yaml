# Authentik SSO/Identity Provider
# Uses shared PostgreSQL and Redis data layer
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    # Deploy after shared data services are ready (PostgreSQL at wave 4, Redis at wave 4)
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: identity
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2025.2.1
    helm:
      releaseName: authentik
      valuesObject:
        # Authentik configuration
        authentik:
          error_reporting:
            enabled: false

        # Disable bundled PostgreSQL - using shared cluster
        postgresql:
          enabled: false

        # Disable bundled Redis - using shared cluster
        redis:
          enabled: false

        # Global configuration (envFrom, env, and image settings)
        global:
          # Image pull policy
          image:
            pullPolicy: IfNotPresent
          # Load configuration from secret (includes shared DB/Redis connection)
          envFrom:
            - secretRef:
                name: authentik-secrets
          env:
            # Redis host pointing to shared Redis master (Sentinel handles failover)
            - name: AUTHENTIK_REDIS__HOST
              value: shared-redis-master.data-services.svc.cluster.local
            # Redis port (default Redis port, not Sentinel)
            - name: AUTHENTIK_REDIS__PORT
              value: "6379"

        # Server configuration (production HA)
        server:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: authentik
                        app.kubernetes.io/component: server
                    topologyKey: kubernetes.io/hostname
          resources:
            requests:
              memory: 1Gi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: 1000m
          # Security hardening
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - auth.aster-lang.cloud
            tls:
              - secretName: authentik-tls
                hosts:
                  - auth.aster-lang.cloud

        # Worker configuration (production HA)
        worker:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: authentik
                        app.kubernetes.io/component: worker
                    topologyKey: kubernetes.io/hostname
          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m
          # Security hardening
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

        # Service account
        serviceAccount:
          create: true

        # Prometheus metrics
        # NOTE: ServiceMonitor disabled until monitoring stack is deployed
        # After monitoring is ready, set enabled: true and sync again
        prometheus:
          serviceMonitor:
            enabled: false
            # Re-enable after monitoring deployment:
            # enabled: true
            # labels:
            #   release: prometheus
          rules:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
