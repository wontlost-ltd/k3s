# PostgreSQL Superuser Credentials
# Used by CloudNativePG cluster for initialization
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-superuser-credentials
  namespace: data-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-superuser-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: data-services/postgres
        property: superuser_username
    - secretKey: password
      remoteRef:
        key: data-services/postgres
        property: superuser_password

