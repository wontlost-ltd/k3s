# Prometheus Stack Application
# Deploys minimal Prometheus using kube-prometheus-stack (Grafana/Alertmanager disabled)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    # Deploy after core infrastructure is ready
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 80.8.2
    helm:
      releaseName: prometheus
      valuesObject:
        # Global image pull policy
        global:
          imageRegistry: ""
          imagePullSecrets: []

        # Prometheus configuration
        prometheus:
          prometheusSpec:
            # Image pull policy
            image:
              pullPolicy: IfNotPresent
            # 单副本，节省资源
            replicas: 1
            podDisruptionBudget:
              enabled: false
            # Security hardening
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: prometheus
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
              # Security hardening for config-reloader sidecar
              - name: config-reloader
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  runAsUser: 1000
                  runAsGroup: 1000
                  capabilities:
                    drop:
                      - ALL
            # Resource limits
            resources:
              requests:
                memory: 384Mi
                cpu: 100m
              limits:
                memory: 1Gi
                cpu: 500m
            # Retention
            retention: 7d
            retentionSize: 2GB
            # Storage（缩减）
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
            # ServiceMonitor selector - match all
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              # Authentik forward auth protection (SSO)
              traefik.ingress.kubernetes.io/router.middlewares: monitoring-authentik-forward-auth@kubernetescrd
            hosts:
              - prometheus.aster-lang.cloud
            tls:
              - secretName: prometheus-tls
                hosts:
                  - prometheus.aster-lang.cloud

        # Alertmanager - 生产环境必须启用告警
        alertmanager:
          enabled: true
          alertmanagerSpec:
            replicas: 1
            securityContext:
              runAsNonRoot: true
              runAsUser: 65534
              runAsGroup: 65534
              fsGroup: 65534
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 20m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 128Mi
            # 挂载 Slack webhook 密钥（由 ExternalSecret 提供）
            # AlertManager 会以 /etc/alertmanager/secrets/<secretName>/<key> 路径访问
            secrets:
              - alertmanager-slack-webhook
          config:
            global:
              resolve_timeout: 5m
              # slack_api_url 由 ExternalSecret 注入 alertmanager-slack-webhook
              # 通过 alertmanagerSpec.secrets 挂载，模板里用 file 引用
              slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
            route:
              group_by: ['namespace', 'alertname', 'severity']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'slack-default'
              routes:
                - matchers:
                    - alertname = "Watchdog"
                  receiver: 'null'
                - matchers:
                    - severity = "critical"
                  receiver: 'slack-critical'
                  group_wait: 10s
                  repeat_interval: 1h
                - matchers:
                    - severity = "warning"
                  receiver: 'slack-default'
            receivers:
              - name: 'null'
              - name: 'slack-default'
                slack_configs:
                  - channel: '#aster-alerts'
                    send_resolved: true
                    title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
                    text: |-
                      {{ range .Alerts }}
                      *Severity*: {{ .Labels.severity }}
                      *Summary*: {{ .Annotations.summary }}
                      *Description*: {{ .Annotations.description }}
                      *Source*: {{ .GeneratorURL }}
                      {{ end }}
              - name: 'slack-critical'
                slack_configs:
                  - channel: '#aster-alerts-critical'
                    send_resolved: true
                    title: ':rotating_light: [CRITICAL] {{ .CommonLabels.alertname }}'
                    text: |-
                      {{ range .Alerts }}
                      *Summary*: {{ .Annotations.summary }}
                      *Description*: {{ .Annotations.description }}
                      *Labels*: {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}
                      {{ end }}
          # 内置关键告警规则（pod 崩溃、OOM、高错误率）
          additionalRulesForClusterRole: []
        defaultRules:
          create: true
          rules:
            alertmanager: true
            etcd: false
            configReloaders: true
            general: true
            k8s: true
            kubeApiserverAvailability: false
            kubeApiserverBurnrate: false
            kubeApiserverHistogram: false
            kubeApiserverSlos: false
            kubeControllerManager: false
            kubelet: true
            kubeProxy: false
            kubePrometheusGeneral: true
            kubePrometheusNodeRecording: true
            kubernetesApps: true
            kubernetesResources: true
            kubernetesStorage: true
            kubernetesSystem: true
            kubeSchedulerAlerting: false
            kubeSchedulerRecording: false
            kubeStateMetrics: true
            network: true
            node: true
            nodeExporterAlerting: true
            nodeExporterRecording: true
            prometheus: true
            prometheusOperator: true

        # Grafana — 启用并接入 Authentik SSO（generic OAuth2）
        grafana:
          enabled: true
          replicas: 1
          podDisruptionBudget:
            enabled: false
          # 资源限制
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 200m, memory: 384Mi }
          # 持久化数据（dashboard / 本地用户）
          persistence:
            enabled: true
            size: 2Gi
          # Sidecar 自动加载带标签的 ConfigMap dashboard
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              labelValue: "1"
              searchNamespace: ALL
              folderAnnotation: grafana_folder
              provider:
                foldersFromFilesStructure: true
            datasources:
              enabled: true
              label: grafana_datasource
              labelValue: "1"
              searchNamespace: ALL
          # SSO 接入 Authentik（OAuth2 generic）
          # client-id / client-secret 由 Authentik provider 创建后通过 ExternalSecret 注入
          # 详见 aster-deploy/observability/SSO.md
          grafana.ini:
            server:
              root_url: https://grafana.aster-lang.cloud
            auth:
              disable_login_form: false  # 保留本地 admin 兜底
              oauth_auto_login: false
            auth.generic_oauth:
              enabled: true
              name: "Authentik"
              icon: signin
              client_id: "$__file{/etc/secrets/grafana-oauth/client_id}"
              client_secret: "$__file{/etc/secrets/grafana-oauth/client_secret}"
              scopes: openid email profile
              empty_scopes: false
              auth_url: https://auth.aster-lang.cloud/application/o/authorize/
              token_url: https://auth.aster-lang.cloud/application/o/token/
              api_url: https://auth.aster-lang.cloud/application/o/userinfo/
              # Authentik 把 group 放在 ID Token 的 "groups" claim
              role_attribute_path: |
                contains(groups[*], 'aster-admins') && 'GrafanaAdmin' ||
                contains(groups[*], 'aster-editors') && 'Editor' ||
                'Viewer'
              allow_sign_up: true
              use_pkce: true
            users:
              auto_assign_org: true
              auto_assign_org_role: Viewer
            security:
              # cookie_secure 必须 true（Grafana 通过 https 暴露）
              cookie_secure: true
              cookie_samesite: lax
              # disable_initial_admin_creation: false（保留 admin 兜底，Authentik 故障时可登录）
          # 挂载 OAuth secret（来自 ExternalSecret）
          extraSecretMounts:
            - name: grafana-oauth-secret
              mountPath: /etc/secrets/grafana-oauth
              secretName: grafana-oauth
              readOnly: true
          # Ingress 暴露
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - grafana.aster-lang.cloud
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.aster-lang.cloud
          # Security hardening
          securityContext:
            runAsNonRoot: true
            runAsUser: 472
            runAsGroup: 472
            fsGroup: 472
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Grafana 需要写 plugins / data
            capabilities:
              drop:
                - ALL

        # Prometheus Operator - manages CRDs（缩减资源）
        prometheusOperator:
          enabled: true
          image:
            pullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # Node exporter for host metrics（DaemonSet，需要在所有节点运行）
        nodeExporter:
          enabled: true
          image:
            pullPolicy: IfNotPresent
          tolerations:
            - key: node.kubernetes.io/disk-pressure
              operator: Exists
              effect: NoSchedule
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

        # Kube-state-metrics for K8s object metrics
        kube-state-metrics:
          image:
            pullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        kubeStateMetrics:
          enabled: true

        # Disable components not needed in K3s
        kubeEtcd:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false

        # Extra manifests for auth middleware
        extraManifests:
          # ForwardAuth middleware for Prometheus (Authentik SSO)
          # Uses Authentik outpost's forward auth endpoint
          - apiVersion: traefik.io/v1alpha1
            kind: Middleware
            metadata:
              name: authentik-forward-auth
              namespace: monitoring
            spec:
              forwardAuth:
                address: http://ak-outpost-monitor-outpost.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
                trustForwardHeader: true
                authResponseHeaders:
                  - X-authentik-username
                  - X-authentik-groups
                  - X-authentik-email
                  - X-authentik-name
                  - X-authentik-uid
                  - X-authentik-jwt
                  - X-authentik-meta-jwks
                  - X-authentik-meta-outpost
                  - X-authentik-meta-provider
                  - X-authentik-meta-app
                  - X-authentik-meta-version
          # ExternalSecret for monitoring basic auth credentials (fallback)
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: monitoring-auth
              namespace: monitoring
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: monitoring-auth
                creationPolicy: Owner
              data:
                - secretKey: users
                  remoteRef:
                    key: infrastructure/monitoring
                    property: basic_auth_users

          # ExternalSecret for Grafana OAuth (Authentik)
          # Vault path: secret/infrastructure/monitoring/grafana_oauth
          # 需要在 Vault 写入 client_id / client_secret，由 Authentik provider 配置后产生
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: grafana-oauth
              namespace: monitoring
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: grafana-oauth
                creationPolicy: Owner
              data:
                - secretKey: client_id
                  remoteRef:
                    key: infrastructure/monitoring
                    property: grafana_oauth_client_id
                - secretKey: client_secret
                  remoteRef:
                    key: infrastructure/monitoring
                    property: grafana_oauth_client_secret

          # ExternalSecret for AlertManager Slack webhook
          # Vault path: secret/apps/aster-api-plan-gate.slack-webhook
          # AlertManager 通过 alertmanagerSpec.secrets 挂载到
          # /etc/alertmanager/secrets/alertmanager-slack-webhook/url
          # secretKey 直接命名为 "url" 以匹配挂载路径，避免双层模板转义。
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: alertmanager-slack-webhook
              namespace: monitoring
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: alertmanager-slack-webhook
                creationPolicy: Owner
                deletionPolicy: Retain
              data:
                - secretKey: url
                  remoteRef:
                    key: apps/aster-api-plan-gate
                    property: slack-webhook

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
