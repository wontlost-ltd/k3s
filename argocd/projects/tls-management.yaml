# TLS Management Project
# Manages cert-manager and reflector for certificate issuance and replication
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tls-management
  namespace: argocd
spec:
  description: "TLS certificate management - cert-manager and reflector"
  sourceRepos:
    - 'https://github.com/wontlost-ltd/k3s.git'
    - 'https://charts.jetstack.io'
    - 'https://emberstack.github.io/helm-charts'
  destinations:
    # cert-manager namespace
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    # reflector namespace
    - namespace: reflector
      server: https://kubernetes.default.svc
    # ArgoCD namespace for Application resources
    - namespace: argocd
      server: https://kubernetes.default.svc
  # Cluster-scoped resources needed for TLS
  clusterResourceWhitelist:
    # cert-manager CRDs
    - group: cert-manager.io
      kind: '*'
    - group: acme.cert-manager.io
      kind: '*'
    # ClusterIssuers
    - group: cert-manager.io
      kind: ClusterIssuer
    # Reflector needs to watch secrets across namespaces
    - group: ''
      kind: Namespace
    # Webhook configurations
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    # CRDs
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    # ClusterRoles for RBAC
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
