# Vault Configuration Application
# Deploys internal TLS certificates BEFORE vault helm chart
# Uses sync wave to ensure proper ordering

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-config
  namespace: argocd
  annotations:
    # Sync after cert-manager is installed (wave -10) but before vault (wave -2)
    # Uses cert-manager CRDs (Issuer, Certificate) for internal TLS
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: secrets-management
  source:
    repoURL: https://github.com/wontlost-ltd/k3s.git
    targetRevision: main
    path: apps/infrastructure/vault
    directory:
      include: '{internal-tls.yaml,auto-unseal.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
