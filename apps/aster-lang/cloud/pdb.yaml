# PodDisruptionBudget for Aster API
# Ensures at least 1 pod is always available during maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aster-api
  namespace: aster-cloud
  labels:
    app: aster-api
    app.kubernetes.io/name: aster-api
    app.kubernetes.io/part-of: aster-lang
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app: aster-api
