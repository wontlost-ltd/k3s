# ClusterIssuers for Let's Encrypt with Cloudflare DNS-01 challenge
# These are cluster-wide issuers that can be used by any namespace
#
# SECRET MANAGEMENT:
# The cloudflare-api-token secret is automatically created by ExternalSecrets
# from Vault. Store your Cloudflare API token in Vault at:
#   vault kv put secret/infrastructure/cloudflare api_token=YOUR_TOKEN
#
# The ExternalSecret in apps/infrastructure/bootstrap/ will sync it to
# the cert-manager namespace automatically.

---
# Production issuer - use for real certificates
# Rate limits: 50 certificates per domain per week
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Production ACME server
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email for certificate expiry notifications
    email: admin@aster-lang.cloud
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      # DNS-01 challenge using Cloudflare
      # Supports wildcard certificates
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        # Match all domains (can be restricted with selector)
        selector: {}

---
# Staging issuer - use for testing
# No rate limits, but certificates are not trusted
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Staging ACME server (for testing)
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@aster-lang.cloud
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector: {}
