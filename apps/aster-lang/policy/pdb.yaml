# PodDisruptionBudget for Policy API
# Ensures at least 1 pod is always available during maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: policy-api
  namespace: aster-policy
  labels:
    app: policy-api
    app.kubernetes.io/name: policy-api
    app.kubernetes.io/part-of: aster-lang
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: policy-api
