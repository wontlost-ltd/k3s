# Sigstore policy-controller Application（S2-0 cosign-verified digest admission）
#
# 单个 Application，multi-source：
#   source[0] = Helm chart（装 CRD + controller + webhook + config ConfigMap）
#   source[1] = Git policies/（4 个 ClusterImagePolicy，标 sync-wave "2"）
# App 内两阶段 wave：chart 全资源默认 wave 0 → CIP wave 2（CRD established 后才 apply）。
#
# ★S2-0 是 artifact-deployment policy，不解锁签字、非 runtime binding 证明。
# ★信任根单源 .github/image-pin/allowed-images.yaml；CIP 由 verify-cip-sync.sh 守漂移。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policy-controller
  namespace: argocd
  annotations:
    # 早于业务 app、晚于核心 infra
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  sources:
    # ── source[0]：policy-controller Helm chart ──
    - repoURL: https://sigstore.github.io/helm-charts
      chart: policy-controller
      targetRevision: 0.10.6
      helm:
        releaseName: policy-controller
        valuesObject:
          # webhook 故障态放行（首版；达门槛后切 Fail，见 runbook）
          webhookConfig:
            failurePolicy: Ignore
          # ns 内不匹配任何 CIP 的镜像放行（灰度副闸）
          configData:
            no-match-policy: allow
          # leases-cleanup 镜像 digest pin（供应链：默认 latest-dev 可变 tag）
          # ★实测键路径为 leasescleanup.image.{repository,version}（非 brief 猜测的
          #   .name；chart 0.10.6 真实 values 与 webhook.image 同构，version 字段
          #   放 sha256 digest）。digest 取自
          #   `docker manifest inspect cgr.dev/chainguard/kubectl:latest-dev` 的
          #   linux/arm64 manifest（已核对含 linux/arm64，集群为 Ampere A1 arm64）。
          # ★★P0-1 修复（final review 实证）：leases-cleanup 的 image helper 用
          #   `printf "%s:%s" repository version`（冒号拼接，不同于 controller 镜像
          #   helper 的 `@` 拼接）。若 version 直接放 `sha256:<hex>` 会渲染成非法引用
          #   `repo:sha256:<hex>`（双冒号）。正确写法：repository 结尾带 `@sha256`，
          #   version 只放纯 hex，两者冒号拼接后得到合法的 `repo@sha256:<hex>`。
          #   已用 `helm template sigstore/policy-controller --version 0.10.6` 实测
          #   验证渲染结果为 `cgr.dev/chainguard/kubectl@sha256:c4e8204...`。
          leasescleanup:
            image:
              repository: cgr.dev/chainguard/kubectl@sha256
              version: c4e8204aeb70b0f705533119faa264554bce82b9a76af0c78b6798b8971ebcfd
    # ── source[1]：4 个 ClusterImagePolicy ──
    - repoURL: https://github.com/wontlost-ltd/k3s.git
      targetRevision: main
      path: apps/infrastructure/policy-controller/policies
  destination:
    server: https://kubernetes.default.svc
    namespace: cosign-system
  # ★ignoreDifferences：policy-controller 自身的 defaulting/mutating webhook 会给它管理的对象
  #   注入运行时默认字段——ArgoCD git-vs-live 比对因此对**每个** CIP + 两个 webhook config 恒显
  #   OutOfSync（含 S2-0 就有的 aster-api/migrate CIP，非本 slice 引入）。
  # ★★只忽略 controller 注入的**具体元素**，绝不忽略整棵 static/matchExpressions（Codex 抓：
  #   忽略整 static 会遮蔽 reject-tag CIP 的 action:fail/message；忽略整 matchExpressions 会遮蔽
  #   namespace opt-in 主闸 policy.sigstore.dev/include——那样 ArgoCD 不再守这两条安全边界=回归）。
  #   用 jq select() 精确定位 controller 注入项：
  #     - CIP keyless authority 的 name（自动 authority-0）+ keyless.url（Fulcio 默认）——限定 keyless，
  #       不碰 static authority（reject-tag 的 action/message 仍被 ArgoCD 守）。
  #     - webhook namespaceSelector 里 knative 注入的排除项（webhooks.knative.dev/exclude DoesNotExist）——
  #       只忽略这一元素，policy.sigstore.dev/include 主闸仍被守。
  ignoreDifferences:
    - group: policy.sigstore.dev
      kind: ClusterImagePolicy
      jqPathExpressions:
        # controller 给每个 authority（keyless 与 static 皆然）自动命名 authority-0——忽略该 name，
        # 但**只忽略 .name 这一叶字段**，绝不碰 static.action/static.message（reject-tag 安全字段仍被守）。
        - '.spec.authorities[]?.name'
        # 只忽略 keyless authority 的 Fulcio 默认 url（不碰 static authority）。
        - '.spec.authorities[]? | select(.keyless != null) | .keyless.url'
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: policy.sigstore.dev
      jqPathExpressions:
        # 只忽略 knative 注入的排除项，保留 policy.sigstore.dev/include opt-in 主闸的守护。
        - '.webhooks[]?.namespaceSelector.matchExpressions[]? | select(.key == "webhooks.knative.dev/exclude" and .operator == "DoesNotExist")'
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: policy.sigstore.dev
      jqPathExpressions:
        - '.webhooks[]?.namespaceSelector.matchExpressions[]? | select(.key == "webhooks.knative.dev/exclude" and .operator == "DoesNotExist")'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # ★让 ignoreDifferences 在 sync 时也生效（否则 selfHeal 仍会把被忽略字段按 git 值写回 →
      #   与 controller 的 defaulting 拉锯，形成 live-lock）。承 aster-lang App 同款用法。
      - RespectIgnoreDifferences=true
