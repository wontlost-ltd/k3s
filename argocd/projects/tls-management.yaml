# TLS Management Project
# Manages cert-manager and reflector for certificate issuance and replication
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tls-management
  namespace: argocd
spec:
  description: "TLS certificate management - cert-manager and reflector"
  sourceRepos:
    - 'https://github.com/wontlost-ltd/k3s.git'
    - 'https://charts.jetstack.io'
    - 'https://emberstack.github.io/helm-charts'
  destinations:
    # cert-manager namespace
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    # reflector namespace
    - namespace: reflector
      server: https://kubernetes.default.svc
    # ArgoCD namespace for app-of-apps pattern
    - namespace: argocd
      server: https://kubernetes.default.svc
    # kube-system namespace for cert-manager leader election roles
    - namespace: kube-system
      server: https://kubernetes.default.svc
  # Cluster-scoped resources needed for TLS
  clusterResourceWhitelist:
    # cert-manager cluster-scoped resources (specific kinds only)
    # NOTE: acme.cert-manager.io resources (Order, Challenge) are namespaced,
    # not cluster-scoped, and are listed in namespaceResourceWhitelist
    - group: cert-manager.io
      kind: ClusterIssuer
    # Reflector needs to watch secrets across namespaces
    - group: ''
      kind: Namespace
    # Webhook configurations
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    # CRDs
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    # ClusterRoles for RBAC
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  # Explicit namespaced resource allowlist for security
  namespaceResourceWhitelist:
    # Core workloads
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: ''
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: ReplicaSet
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    # Networking
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    # RBAC (namespaced)
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    # Monitoring
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    # cert-manager namespaced resources
    - group: cert-manager.io
      kind: Certificate
    - group: cert-manager.io
      kind: Issuer
    - group: cert-manager.io
      kind: CertificateRequest
    - group: acme.cert-manager.io
      kind: Order
    - group: acme.cert-manager.io
      kind: Challenge
    # Policy
    - group: policy
      kind: PodDisruptionBudget
    # ArgoCD Application for app-of-apps pattern
    - group: argoproj.io
      kind: Application
