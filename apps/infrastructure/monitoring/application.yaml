# Prometheus Stack Application
# Deploys Prometheus, Grafana, and Alertmanager using kube-prometheus-stack
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    # Deploy after core infrastructure is ready
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 80.8.2
    helm:
      releaseName: prometheus
      valuesObject:
        # Global image pull policy
        global:
          imageRegistry: ""
          imagePullSecrets: []

        # Prometheus configuration
        prometheus:
          prometheusSpec:
            # Image pull policy
            image:
              pullPolicy: IfNotPresent
            # HA configuration - 2 replicas
            replicas: 2
            podDisruptionBudget:
              enabled: true
              minAvailable: 1
            # Pod anti-affinity for HA
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app.kubernetes.io/name: prometheus
                      topologyKey: kubernetes.io/hostname
            # Security hardening
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: prometheus
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
              # Security hardening for config-reloader sidecar
              - name: config-reloader
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  runAsUser: 1000
                  runAsGroup: 1000
                  capabilities:
                    drop:
                      - ALL
            # Resource limits
            resources:
              requests:
                memory: 512Mi
                cpu: 250m
              limits:
                memory: 2Gi
                cpu: 1000m
            # Retention
            retention: 15d
            retentionSize: 10GB
            # Storage
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
            # ServiceMonitor selector - match all
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              # Basic auth protection (create secret: htpasswd -nb admin password | base64)
              traefik.ingress.kubernetes.io/router.middlewares: monitoring-monitoring-basic-auth@kubernetescrd
            hosts:
              - prometheus.aster-lang.cloud
            tls:
              - secretName: prometheus-tls
                hosts:
                  - prometheus.aster-lang.cloud

        # Alertmanager configuration
        alertmanager:
          alertmanagerSpec:
            # Image pull policy
            image:
              pullPolicy: IfNotPresent
            # HA configuration - 2 replicas
            replicas: 2
            podDisruptionBudget:
              enabled: true
              minAvailable: 1
            # Pod anti-affinity for HA
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app.kubernetes.io/name: alertmanager
                      topologyKey: kubernetes.io/hostname
            # Security hardening
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: alertmanager
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
              # Security hardening for config-reloader sidecar
              - name: config-reloader
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  runAsUser: 1000
                  runAsGroup: 1000
                  capabilities:
                    drop:
                      - ALL
            resources:
              requests:
                memory: 128Mi
                cpu: 50m
              limits:
                memory: 256Mi
                cpu: 200m
            storage:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              # Basic auth protection (same middleware as Prometheus)
              traefik.ingress.kubernetes.io/router.middlewares: monitoring-monitoring-basic-auth@kubernetescrd
            hosts:
              - alertmanager.aster-lang.cloud
            tls:
              - secretName: alertmanager-tls
                hosts:
                  - alertmanager.aster-lang.cloud

        # Grafana configuration (has built-in auth, no middleware needed)
        grafana:
          # Image pull policy
          image:
            pullPolicy: IfNotPresent
          # HA configuration - 2 replicas
          replicas: 2
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          # Security hardening
          securityContext:
            runAsNonRoot: true
            runAsUser: 472
            runAsGroup: 472
            fsGroup: 472
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: grafana
                    topologyKey: kubernetes.io/hostname
          # Use ExternalSecret for admin credentials from Vault
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          persistence:
            enabled: true
            size: 5Gi
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - grafana.aster-lang.cloud
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.aster-lang.cloud
          # Default dashboards
          defaultDashboardsEnabled: true
          # Sidecar for dashboard discovery
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
            datasources:
              enabled: true

        # Prometheus Operator - manages CRDs
        prometheusOperator:
          enabled: true
          image:
            pullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # Node exporter for host metrics
        nodeExporter:
          enabled: true
          image:
            pullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

        # Kube-state-metrics for K8s object metrics
        kube-state-metrics:
          image:
            pullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        kubeStateMetrics:
          enabled: true

        # Disable components not needed in K3s
        kubeEtcd:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false

        # Extra manifests for auth middleware
        extraManifests:
          # Basic auth middleware for Prometheus/Alertmanager
          # To create credentials: htpasswd -nb admin password | base64
          # Store in monitoring-auth secret with key 'users'
          - apiVersion: traefik.io/v1alpha1
            kind: Middleware
            metadata:
              name: monitoring-basic-auth
              namespace: monitoring
            spec:
              basicAuth:
                secret: monitoring-auth
          # ExternalSecret for monitoring basic auth credentials
          - apiVersion: external-secrets.io/v1beta1
            kind: ExternalSecret
            metadata:
              name: monitoring-auth
              namespace: monitoring
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: monitoring-auth
                creationPolicy: Owner
              data:
                - secretKey: users
                  remoteRef:
                    key: infrastructure/monitoring
                    property: basic_auth_users
          # ExternalSecret for Grafana admin credentials
          - apiVersion: external-secrets.io/v1beta1
            kind: ExternalSecret
            metadata:
              name: grafana-admin
              namespace: monitoring
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: grafana-admin
                creationPolicy: Owner
              data:
                - secretKey: admin-user
                  remoteRef:
                    key: infrastructure/grafana
                    property: admin-user
                - secretKey: admin-password
                  remoteRef:
                    key: infrastructure/grafana
                    property: admin-password

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
