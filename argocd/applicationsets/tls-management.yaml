# TLS Management ApplicationSet
# Manages cert-manager and reflector applications
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tls-management-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: cert-manager
            namespace: cert-manager
          - name: reflector
            namespace: reflector
  template:
    metadata:
      name: 'tls-{{ .name }}'
      namespace: argocd
      labels:
        tier: tls-management
        app.kubernetes.io/part-of: tls-management
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: tls-management
      source:
        repoURL: https://github.com/wontlost-ltd/k3s.git
        targetRevision: main
        path: 'apps/infrastructure/{{ .name }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
