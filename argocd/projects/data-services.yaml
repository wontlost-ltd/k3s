# Data Services Project
# Manages shared PostgreSQL and Redis infrastructure
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: data-services
  namespace: argocd
spec:
  description: "Shared data layer - PostgreSQL (CloudNativePG) and Redis"
  sourceRepos:
    - 'https://github.com/wontlost-ltd/k3s.git'
    # CloudNativePG operator
    - 'https://cloudnative-pg.github.io/charts'
    # Bitnami Redis
    - 'https://charts.bitnami.com/bitnami'
  destinations:
    # CloudNativePG operator namespace
    - namespace: cnpg-system
      server: https://kubernetes.default.svc
    # Shared data services namespace
    - namespace: data-services
      server: https://kubernetes.default.svc
    # NOTE: argocd namespace removed to prevent project boundary escape
    # App-of-apps pattern is managed by infrastructure project only
  clusterResourceWhitelist:
    # Namespace creation
    - group: ''
      kind: Namespace
    # CloudNativePG cluster-scoped resources (for operator installation)
    - group: postgresql.cnpg.io
      kind: ClusterImageCatalog
    # Webhook configurations
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    # CRDs
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    # ClusterRoles for RBAC
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    # Core workloads
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: ''
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: ReplicaSet
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    # Networking
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    # RBAC (namespaced)
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    # Monitoring
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule
    # Policy
    - group: policy
      kind: PodDisruptionBudget
    # CloudNativePG resources
    - group: postgresql.cnpg.io
      kind: Cluster
    - group: postgresql.cnpg.io
      kind: Backup
    - group: postgresql.cnpg.io
      kind: ScheduledBackup
    - group: postgresql.cnpg.io
      kind: Pooler
    # External Secrets
    - group: external-secrets.io
      kind: ExternalSecret
    # NOTE: argoproj.io/Application removed to prevent project boundary escape
    # App-of-apps pattern is managed by infrastructure project only
