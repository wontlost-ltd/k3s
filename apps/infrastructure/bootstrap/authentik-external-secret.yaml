# ExternalSecret for Authentik Secrets
# Pulls all Authentik configuration from Vault
# Now uses shared PostgreSQL and Redis data layer
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: authentik-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Authentik secret key for signing cookies and tokens
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: infrastructure/authentik
        property: secret_key
    # PostgreSQL connection settings (pointing to shared cluster)
    - secretKey: AUTHENTIK_POSTGRESQL__HOST
      remoteRef:
        key: data-services/postgres
        property: host
    - secretKey: AUTHENTIK_POSTGRESQL__PORT
      remoteRef:
        key: data-services/postgres
        property: port
    - secretKey: AUTHENTIK_POSTGRESQL__NAME
      remoteRef:
        key: data-services/authentik-db
        property: database
    - secretKey: AUTHENTIK_POSTGRESQL__USER
      remoteRef:
        key: data-services/authentik-db
        property: username
    - secretKey: AUTHENTIK_POSTGRESQL__PASSWORD
      remoteRef:
        key: data-services/authentik-db
        property: password
    # Redis password (pointing to shared Redis)
    - secretKey: AUTHENTIK_REDIS__PASSWORD
      remoteRef:
        key: data-services/redis
        property: password
    # Bootstrap admin credentials (initial setup only)
    - secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      remoteRef:
        key: infrastructure/authentik
        property: bootstrap_password
    - secretKey: AUTHENTIK_BOOTSTRAP_EMAIL
      remoteRef:
        key: infrastructure/authentik
        property: bootstrap_email
