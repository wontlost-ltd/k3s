apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: aster-lang
  namespace: argocd
spec:
  description: "aster-lang.cloud and aster-lang.dev domain applications"
  sourceRepos:
    # Only allow specific repositories (no wildcards for security)
    - 'https://github.com/wontlost-ltd/k3s.git'
    - 'https://github.com/aster-cloud/policy-api.git'
  destinations:
    # Only allow aster-* namespaces (no default namespace)
    - namespace: 'aster-*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  # Explicit namespaced resource allowlist for security
  namespaceResourceWhitelist:
    # Core workloads
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: ''
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: ReplicaSet
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    # Networking
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    # RBAC (namespaced)
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    # Monitoring
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    # Policy
    - group: policy
      kind: PodDisruptionBudget
    # Autoscaling
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    # External Secrets
    - group: external-secrets.io
      kind: ExternalSecret
    # NOTE: argoproj.io/Application removed to prevent project boundary escape
    # App-of-apps pattern is managed by infrastructure project only
