---
# Backup credentials (S3)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-backup-credentials
  namespace: data-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-backup-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
