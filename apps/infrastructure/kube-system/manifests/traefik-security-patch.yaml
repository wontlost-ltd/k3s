# Traefik Security Hardening Patch
# Applied via strategic merge to the K3s-managed Traefik deployment
# Security best practices: drop capabilities, read-only rootfs, resource limits
# NOTE: Do NOT modify args - K3s manages Traefik entrypoints and configuration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: kube-system
spec:
  template:
    spec:
      # Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: traefik
          # Update to Traefik 3.6.6 (latest stable)
          image: traefik:v3.6.6
          # Container-level security context hardening
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          # Resource limits (adjust based on your traffic)
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
