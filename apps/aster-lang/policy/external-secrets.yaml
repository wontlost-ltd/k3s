# ExternalSecrets for aster-policy namespace
# Pulls database and Redis credentials from Vault
---
# PostgreSQL Credentials for Policy API
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: policy-api-db-credentials
  namespace: aster-policy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: policy-api-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        jdbc-url: "jdbc:postgresql://{{ .host }}:{{ .port }}/{{ .database }}"
        reactive-url: "postgresql://{{ .host }}:{{ .port }}/{{ .database }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: host
      remoteRef:
        key: data-services/postgres
        property: host
    - secretKey: port
      remoteRef:
        key: data-services/postgres
        property: port
    - secretKey: database
      remoteRef:
        key: data-services/policy-api-db
        property: database
    - secretKey: username
      remoteRef:
        key: data-services/policy-api-db
        property: username
    - secretKey: password
      remoteRef:
        key: data-services/policy-api-db
        property: password

---
# Redis Sentinel Credentials for Policy API
# Quarkus Redis requires: client-type=sentinel, master-name, and hosts as redis:// URLs
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: policy-api-redis-credentials
  namespace: aster-policy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: policy-api-redis-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        # Quarkus Redis Sentinel hosts format: redis://:password@sentinel1:26379,redis://:password@sentinel2:26379
        redis-hosts: "redis://:{{ .password }}@{{ .sentinelHost1 }}:26379,redis://:{{ .password }}@{{ .sentinelHost2 }}:26379"
        master-name: "{{ .masterName }}"
  data:
    - secretKey: sentinelHost1
      remoteRef:
        key: data-services/redis
        property: sentinel-host-1
    - secretKey: sentinelHost2
      remoteRef:
        key: data-services/redis
        property: sentinel-host-2
    - secretKey: masterName
      remoteRef:
        key: data-services/redis
        property: master-name
    - secretKey: password
      remoteRef:
        key: data-services/redis
        property: password
