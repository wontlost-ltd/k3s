# CKEditor Builder 凭证 — 从 Vault 拉取
# Vault path: secret/wontlost/ckeditor-builder
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ckeditor-builder-credentials
  namespace: wontlost-ckeditor-builder
  labels:
    app: ckeditor-builder
    app.kubernetes.io/name: ckeditor-builder
    app.kubernetes.io/part-of: wontlost
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ckeditor-builder-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ADMIN_USERNAME
      remoteRef:
        key: wontlost/ckeditor-builder
        property: admin-username
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: wontlost/ckeditor-builder
        property: admin-password
    - secretKey: ORACLE_USERNAME
      remoteRef:
        key: wontlost/ckeditor-builder
        property: oracle-username
    - secretKey: ORACLE_PASSWORD
      remoteRef:
        key: wontlost/ckeditor-builder
        property: oracle-password
    - secretKey: ORACLE_TNS_ALIAS
      remoteRef:
        key: wontlost/ckeditor-builder
        property: oracle-tns-alias
    - secretKey: ORACLE_WALLET_PATH
      remoteRef:
        key: wontlost/ckeditor-builder
        property: oracle-wallet-path
    - secretKey: ORACLE_ENABLED
      remoteRef:
        key: wontlost/ckeditor-builder
        property: oracle-enabled
    - secretKey: SYNC_MODE
      remoteRef:
        key: wontlost/ckeditor-builder
        property: sync-mode
    - secretKey: CKEDITOR_LICENSE_KEY
      remoteRef:
        key: wontlost/ckeditor-builder
        property: ckeditor-license-key
