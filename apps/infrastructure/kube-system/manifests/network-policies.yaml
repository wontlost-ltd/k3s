# Network Policies for kube-system
# NOTE: default-deny-all REMOVED - it blocks DNS resolution for the entire cluster
# CoreDNS must be accessible without restrictions for cluster DNS to function
# Individual service policies below provide defense-in-depth without breaking DNS
---
# NOTE: CoreDNS Network Policy REMOVED
# CoreDNS is critical cluster infrastructure and must be unrestricted
# Restricting CoreDNS egress breaks cluster DNS resolution
# The restrictive egress rules were blocking CoreDNS from functioning properly

---
# Traefik Ingress Controller Network Policy
# Must accept external traffic and route to backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: traefik-network-policy
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow external HTTP/HTTPS traffic (ingress controller purpose)
    # No 'from' selector = allows from anywhere including external
    - ports:
        - protocol: TCP
          port: 8000  # web entrypoint
        - protocol: TCP
          port: 8443  # websecure entrypoint
    # Allow metrics/dashboard from Prometheus
    - ports:
        - protocol: TCP
          port: 9000
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
  egress:
    # Allow routing to backend services in application namespaces
    # Each destination requires both namespaceSelector AND podSelector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
          podSelector:
            matchLabels:
              app.kubernetes.io/name: authentik
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 3000
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
      ports:
        - protocol: TCP
          port: 9093
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-server
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
      ports:
        - protocol: TCP
          port: 8200
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wontlost-data
          podSelector:
            matchLabels:
              app.kubernetes.io/name: wontlost-data
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aster-policy
          podSelector:
            matchLabels:
              app.kubernetes.io/name: policy-api
      ports:
        - protocol: TCP
          port: 8080
    # Allow API server communication (kubernetes service ClusterIP)
    - to:
        - ipBlock:
            cidr: 10.43.0.1/32
      ports:
        - protocol: TCP
          port: 443
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns

---
# Metrics Server Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: metrics-server-network-policy
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      k8s-app: metrics-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from Prometheus for metrics scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 10250
    # Allow from kube-system (API server aggregation layer)
    # DOCUMENTED EXCEPTION: API server runs on control plane nodes, not as pods.
    # Metrics server aggregation requires this access pattern for HPA to work.
    # Using namespaceSelector with podSelector: {} is the most restrictive option
    # that still allows API server aggregation to function properly.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector: {}
      ports:
        - protocol: TCP
          port: 10250
  egress:
    # Allow kubelet metrics collection on nodes
    - ports:
        - protocol: TCP
          port: 10250
    # Allow API server (kubernetes service ClusterIP)
    - to:
        - ipBlock:
            cidr: 10.43.0.1/32
      ports:
        - protocol: TCP
          port: 443
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns

---
# Local Path Provisioner Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: local-path-provisioner-network-policy
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      app: local-path-provisioner
  policyTypes:
    - Ingress
    - Egress
  egress:
    # Allow API server communication (kubernetes service ClusterIP)
    - to:
        - ipBlock:
            cidr: 10.43.0.1/32
      ports:
        - protocol: TCP
          port: 443
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
