# NetworkPolicies for reflector namespace
# Default-deny with specific allow rules for reflector operations
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reflector-network-policies
  namespace: argocd
  annotations:
    # Deploy BEFORE reflector (sync-wave -6) to ensure network isolation from start
    argocd.argoproj.io/sync-wave: "-7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tls-management
  source:
    repoURL: https://github.com/wontlost-ltd/k3s.git
    path: apps/infrastructure/reflector-network-policies/manifests
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: reflector
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
