# ExternalSecrets for aster-policy namespace
# Pulls database and Redis credentials from Vault
---
# PostgreSQL Credentials for Policy API
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: policy-api-db-credentials
  namespace: aster-policy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: policy-api-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        jdbc-url: "jdbc:postgresql://{{ .host }}:{{ .port }}/{{ .database }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: host
      remoteRef:
        key: data-services/postgres
        property: host
    - secretKey: port
      remoteRef:
        key: data-services/postgres
        property: port
    - secretKey: database
      remoteRef:
        key: data-services/policy-api-db
        property: database
    - secretKey: username
      remoteRef:
        key: data-services/policy-api-db
        property: username
    - secretKey: password
      remoteRef:
        key: data-services/policy-api-db
        property: password

---
# Redis Credentials for Policy API
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: policy-api-redis-credentials
  namespace: aster-policy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: policy-api-redis-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        redis-url: "redis://:{{ .password }}@{{ .host }}:{{ .port }}"
  data:
    - secretKey: host
      remoteRef:
        key: data-services/redis
        property: host
    - secretKey: port
      remoteRef:
        key: data-services/redis
        property: port
    - secretKey: password
      remoteRef:
        key: data-services/redis
        property: password
