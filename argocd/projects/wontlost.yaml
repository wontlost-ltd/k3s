apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: wontlost
  namespace: argocd
spec:
  description: "wontlost.com domain applications"
  sourceRepos:
    - 'https://github.com/wontlost-ltd/k3s.git'
    - 'https://github.com/wontlost-ltd/*'
  destinations:
    - namespace: 'wontlost-*'
      server: https://kubernetes.default.svc
    - namespace: 'default'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  # Explicit namespaced resource allowlist for security
  namespaceResourceWhitelist:
    # Core workloads
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: ''
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: ReplicaSet
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    # Networking
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    # RBAC (namespaced)
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    # Monitoring
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    # Policy
    - group: policy
      kind: PodDisruptionBudget
