# Shared Redis Cluster
# Bitnami Redis with Sentinel for HA
# Used by Authentik, Policy API, and other applications for caching/sessions
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shared-redis
  namespace: argocd
  annotations:
    # Deploy after bootstrap (needs credentials ready first)
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: data-services
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 19.6.4
    helm:
      releaseName: shared-redis
      valuesObject:
        # Global settings
        global:
          imageRegistry: ""
          imagePullSecrets: []

        # Image configuration - Bitnami now only has 'latest' on Docker Hub
        image:
          registry: docker.io
          repository: bitnami/redis
          tag: latest
          pullPolicy: IfNotPresent

        # Sentinel HA architecture
        architecture: replication

        # Authentication
        auth:
          enabled: true
          existingSecret: shared-redis-credentials
          existingSecretPasswordKey: password

        # Master configuration
        master:
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          persistence:
            enabled: true
            size: 2Gi
          pdb:
            enabled: true
            minAvailable: 1
          # Security hardening
          podSecurityContext:
            runAsNonRoot: true
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # Anti-affinity to spread master away from replicas
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: redis
                    topologyKey: kubernetes.io/hostname

        # Replica configuration
        replica:
          replicaCount: 2
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          persistence:
            enabled: true
            size: 2Gi
          pdb:
            enabled: true
            minAvailable: 1
          # Security hardening
          podSecurityContext:
            runAsNonRoot: true
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: redis
                        app.kubernetes.io/component: replica
                    topologyKey: kubernetes.io/hostname

        # Sentinel configuration for automatic failover
        sentinel:
          enabled: true
          image:
            registry: docker.io
            repository: bitnami/redis-sentinel
            tag: latest
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
          # Security hardening (inherited from master/replica but explicit)
          containerSecurityContext:
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

        # Metrics
        metrics:
          enabled: true
          image:
            registry: docker.io
            repository: bitnami/redis-exporter
            tag: latest
          # NOTE: ServiceMonitor disabled until monitoring stack is deployed
          # After monitoring is ready, set enabled: true and sync again
          serviceMonitor:
            enabled: false
            # Re-enable after monitoring deployment:
            # enabled: true
            # labels:
            #   release: prometheus
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 50m

        # Network policy
        networkPolicy:
          enabled: false  # Enable if you need strict network isolation

        # Service account
        serviceAccount:
          create: true

  destination:
    server: https://kubernetes.default.svc
    namespace: data-services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
