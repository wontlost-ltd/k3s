# Secrets Management Project
# Manages Vault and External Secrets Operator
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: secrets-management
  namespace: argocd
spec:
  description: "Secrets management - Vault and External Secrets Operator"
  sourceRepos:
    - 'https://github.com/wontlost-ltd/k3s.git'
    - 'https://helm.releases.hashicorp.com'
    - 'https://charts.external-secrets.io'
  destinations:
    # Vault namespace (core secrets infrastructure)
    - namespace: vault
      server: https://kubernetes.default.svc
    # External Secrets namespace (core secrets infrastructure)
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    # NOTE: argocd namespace removed to prevent project boundary escape
    # App-of-apps pattern is managed by infrastructure project only
    # cert-manager namespace (for cloudflare-api-token ExternalSecret only)
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    # Authentik namespace (for authentik-secrets ExternalSecret only)
    - namespace: authentik
      server: https://kubernetes.default.svc
    # Monitoring namespace (for grafana-admin ExternalSecret only)
    - namespace: monitoring
      server: https://kubernetes.default.svc
    # Data Services namespace (for postgres/redis credentials only)
    - namespace: data-services
      server: https://kubernetes.default.svc
    # Business namespaces (for application secrets only)
    - namespace: aster-policy
      server: https://kubernetes.default.svc
    - namespace: wontlost-data
      server: https://kubernetes.default.svc
  # Cluster-scoped resources needed for secrets
  clusterResourceWhitelist:
    # Namespace creation (for CreateNamespace=true)
    - group: ''
      kind: Namespace
    # External Secrets CRDs
    - group: external-secrets.io
      kind: '*'
    # ClusterSecretStore
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: external-secrets.io
      kind: ClusterExternalSecret
    # cert-manager resources for Vault TLS
    - group: cert-manager.io
      kind: Issuer
    - group: cert-manager.io
      kind: Certificate
    # Webhook configurations
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    # CRDs
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    # ClusterRoles for RBAC
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  # Restricted namespaced resource allowlist for security
  # Only allow secrets-related resources in target namespaces
  # Full workload management belongs to infrastructure project
  namespaceResourceWhitelist:
    # Vault/ESO core infrastructure (vault and external-secrets namespaces only)
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: ''
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: ReplicaSet
    - group: batch
      kind: Job
    # Networking (for vault/external-secrets only)
    - group: networking.k8s.io
      kind: Ingress
    - group: networking.k8s.io
      kind: NetworkPolicy
    # RBAC (for vault/external-secrets only)
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    # Monitoring
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    # External Secrets - the main purpose of this project
    - group: external-secrets.io
      kind: ExternalSecret
    - group: external-secrets.io
      kind: SecretStore
    # cert-manager namespaced resources (for Vault TLS only)
    - group: cert-manager.io
      kind: Certificate
    - group: cert-manager.io
      kind: Issuer
    # Policy
    - group: policy
      kind: PodDisruptionBudget
    # NOTE: argoproj.io/Application removed to prevent project boundary escape
    # App-of-apps pattern is managed by infrastructure project only
