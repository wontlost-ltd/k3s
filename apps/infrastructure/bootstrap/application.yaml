# Bootstrap Application
# Deploys ExternalSecrets for automated secret management
# Depends on External Secrets Operator being ready
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-secrets
  namespace: argocd
  annotations:
    # Deploy after external-secrets-config (ClusterSecretStore must be ready)
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # NOTE: Using infrastructure project as bootstrap deploys secrets to many namespaces
  # This avoids giving secrets-management project access to argocd namespace
  project: infrastructure
  source:
    repoURL: https://github.com/wontlost-ltd/k3s.git
    targetRevision: main
    path: apps/infrastructure/bootstrap
    directory:
      include: '*-external-secret.yaml'
  destination:
    server: https://kubernetes.default.svc
    # Resources are cluster-scoped or specify their own namespace
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
