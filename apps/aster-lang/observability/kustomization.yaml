# Aster 可观测性配置
# 由 ApplicationSet aster-lang-apps 自动发现并部署
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aster-observability

resources:
  - namespace.yaml
  - prometheus-rule.yaml
  - slo-burn-rate.yaml
  - service-monitor.yaml

# Grafana dashboard ConfigMap
# monitoring 栈（kube-prometheus-stack）已启用 Grafana，
# sidecar 自动发现带 grafana_dashboard=1 标签的 ConfigMap 并挂载到 Grafana。
configMapGenerator:
  - name: aster-nsm-dashboard
    files:
      - aster-nsm-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: aster-lang
      disableNameSuffixHash: true
  - name: aster-api-dashboard
    files:
      - aster-api-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: aster-lang
      disableNameSuffixHash: true
