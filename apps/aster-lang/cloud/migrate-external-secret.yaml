# DB credentials for aster-cloud drizzle migration Job.
#
# 复用 data-services/postgres 的 host/port + data-services/aster-api-db 的
# user/password（aster-cloud 与 aster-api 共用 aster_api_user 但使用不同
# database "aster_cloud"，因此 db 名在模板里硬编码）。
#
# 这样避免给 aster-cloud 单独建 Vault path —— 现状是同 user 跨 db。
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aster-cloud-db-credentials
  namespace: aster-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aster-cloud-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        database-url: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/aster_cloud?sslmode=disable"
  data:
    - secretKey: host
      remoteRef:
        key: data-services/postgres
        property: host
    - secretKey: port
      remoteRef:
        key: data-services/postgres
        property: port
    - secretKey: username
      remoteRef:
        key: data-services/aster-api-db
        property: username
    - secretKey: password
      remoteRef:
        key: data-services/aster-api-db
        property: password
