    - "wontlost.com"
    - "*.wontlost.com"
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "wontlost-data,wontlost-ckeditor-builder"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"

