# Secrets Management ApplicationSet
# Manages Vault and External Secrets applications
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: secrets-management-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: vault
            namespace: vault
          - name: external-secrets
            namespace: external-secrets
          # NOTE: bootstrap moved to infrastructure project
          # It deploys secrets to many namespaces and shouldn't be in secrets-management
  template:
    metadata:
      name: 'secrets-{{ .name }}'
      namespace: argocd
      labels:
        tier: secrets-management
        app.kubernetes.io/part-of: secrets-management
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: secrets-management
      source:
        repoURL: https://github.com/wontlost-ltd/k3s.git
        targetRevision: main
        path: 'apps/infrastructure/{{ .name }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
