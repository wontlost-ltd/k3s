# Vault Network Policies Application
# Deploys NetworkPolicies for Vault namespace
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-network-policies
  namespace: argocd
  annotations:
    # Deploy BEFORE Vault (sync-wave -2) to ensure network isolation from start
    argocd.argoproj.io/sync-wave: "-3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: secrets-management
  source:
    repoURL: https://github.com/wontlost-ltd/k3s.git
    targetRevision: main
    path: apps/infrastructure/vault/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
