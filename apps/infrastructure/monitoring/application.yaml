# Prometheus Stack Application
# Deploys Prometheus, Grafana, and Alertmanager using kube-prometheus-stack
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    # Deploy after core infrastructure is ready
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 80.8.2
    helm:
      releaseName: prometheus
      valuesObject:
        # Global image pull policy
        global:
          imageRegistry: ""
          imagePullSecrets: []

        # Prometheus configuration
        prometheus:
          prometheusSpec:
            # Image pull policy
            image:
              pullPolicy: IfNotPresent
            # HA configuration - 2 replicas
            replicas: 2
            podDisruptionBudget:
              enabled: true
              minAvailable: 1
            # Pod anti-affinity for HA
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app.kubernetes.io/name: prometheus
                      topologyKey: kubernetes.io/hostname
            # Security hardening
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: prometheus
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
              # Security hardening for config-reloader sidecar
              - name: config-reloader
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  runAsUser: 1000
                  runAsGroup: 1000
                  capabilities:
                    drop:
                      - ALL
            # Resource limits
            resources:
              requests:
                memory: 512Mi
                cpu: 250m
              limits:
                memory: 2Gi
                cpu: 1000m
            # Retention
            retention: 15d
            retentionSize: 10GB
            # Storage
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
            # ServiceMonitor selector - match all
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              # Authentik forward auth protection (SSO)
              traefik.ingress.kubernetes.io/router.middlewares: monitoring-authentik-forward-auth@kubernetescrd
            hosts:
              - prometheus.aster-lang.cloud
            tls:
              - secretName: prometheus-tls
                hosts:
                  - prometheus.aster-lang.cloud

        # Alertmanager configuration
        alertmanager:
          alertmanagerSpec:
            # Image pull policy
            image:
              pullPolicy: IfNotPresent
            # HA configuration - 2 replicas
            replicas: 2
            podDisruptionBudget:
              enabled: true
              minAvailable: 1
            # Pod anti-affinity for HA
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app.kubernetes.io/name: alertmanager
                      topologyKey: kubernetes.io/hostname
            # Security hardening
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: alertmanager
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
              # Security hardening for config-reloader sidecar
              - name: config-reloader
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  runAsUser: 1000
                  runAsGroup: 1000
                  capabilities:
                    drop:
                      - ALL
            resources:
              requests:
                memory: 128Mi
                cpu: 50m
              limits:
                memory: 256Mi
                cpu: 200m
            storage:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              # Authentik forward auth protection (SSO)
              traefik.ingress.kubernetes.io/router.middlewares: monitoring-authentik-forward-auth@kubernetescrd
            hosts:
              - alertmanager.aster-lang.cloud
            tls:
              - secretName: alertmanager-tls
                hosts:
                  - alertmanager.aster-lang.cloud

        # Grafana configuration (SSO via Authentik OIDC)
        grafana:
          # Image pull policy
          image:
            pullPolicy: IfNotPresent
          # HA configuration - 2 replicas
          replicas: 2
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          # Disable initChownData - fsGroup handles permissions via securityContext
          initChownData:
            enabled: false
          # Security hardening
          securityContext:
            runAsNonRoot: true
            runAsUser: 472
            runAsGroup: 472
            fsGroup: 472
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: grafana
                    topologyKey: kubernetes.io/hostname
          # Use ExternalSecret for admin credentials from Vault (fallback)
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          # Environment variables for OIDC configuration
          envFromSecrets:
            - name: grafana-oidc
              optional: false
          # Grafana OIDC configuration via grafana.ini
          grafana.ini:
            server:
              root_url: https://grafana.aster-lang.cloud
            auth:
              # Disable login form for SSO-only access
              disable_login_form: false
              # Allow signout redirect to Authentik
              signout_redirect_url: https://auth.aster-lang.cloud/application/o/grafana/end-session/
            auth.generic_oauth:
              enabled: true
              name: Authentik
              allow_sign_up: true
              client_id: grafana
              client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
              scopes: openid profile email groups
              auth_url: https://auth.aster-lang.cloud/application/o/authorize/
              token_url: https://auth.aster-lang.cloud/application/o/token/
              api_url: https://auth.aster-lang.cloud/application/o/userinfo/
              # Map Authentik groups to Grafana roles
              role_attribute_path: contains(groups, 'grafana-admins') && 'Admin' || contains(groups, 'grafana-editors') && 'Editor' || 'Viewer'
              # Auto-login with OIDC (optional - uncomment to skip login page)
              # auto_login: true
          persistence:
            enabled: true
            size: 5Gi
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - grafana.aster-lang.cloud
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.aster-lang.cloud
          # Default dashboards
          defaultDashboardsEnabled: true
          # Sidecar for dashboard discovery
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
            datasources:
              enabled: true

        # Prometheus Operator - manages CRDs
        prometheusOperator:
          enabled: true
          image:
            pullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # Node exporter for host metrics
        nodeExporter:
          enabled: true
          image:
            pullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

        # Kube-state-metrics for K8s object metrics
        kube-state-metrics:
          image:
            pullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        kubeStateMetrics:
          enabled: true

        # Disable components not needed in K3s
        kubeEtcd:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false

        # Extra manifests for auth middleware
        extraManifests:
          # ForwardAuth middleware for Prometheus/Alertmanager (Authentik SSO)
          # Uses Authentik's forward auth endpoint for transparent SSO
          - apiVersion: traefik.io/v1alpha1
            kind: Middleware
            metadata:
              name: authentik-forward-auth
              namespace: monitoring
            spec:
              forwardAuth:
                address: http://authentik-server.authentik.svc.cluster.local/outpost.goauthentik.io/auth/traefik
                trustForwardHeader: true
                authResponseHeaders:
                  - X-authentik-username
                  - X-authentik-groups
                  - X-authentik-email
                  - X-authentik-name
                  - X-authentik-uid
                  - X-authentik-jwt
                  - X-authentik-meta-jwks
                  - X-authentik-meta-outpost
                  - X-authentik-meta-provider
                  - X-authentik-meta-app
                  - X-authentik-meta-version
          # Keep basic auth as fallback (can be removed after SSO is verified working)
          - apiVersion: traefik.io/v1alpha1
            kind: Middleware
            metadata:
              name: monitoring-basic-auth
              namespace: monitoring
            spec:
              basicAuth:
                secret: monitoring-auth
          # ExternalSecret for monitoring basic auth credentials (fallback)
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: monitoring-auth
              namespace: monitoring
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: monitoring-auth
                creationPolicy: Owner
              data:
                - secretKey: users
                  remoteRef:
                    key: infrastructure/monitoring
                    property: basic_auth_users
          # ExternalSecret for Grafana admin credentials (fallback)
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: grafana-admin
              namespace: monitoring
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: grafana-admin
                creationPolicy: Owner
              data:
                - secretKey: admin-user
                  remoteRef:
                    key: infrastructure/grafana
                    property: admin-user
                - secretKey: admin-password
                  remoteRef:
                    key: infrastructure/grafana
                    property: admin-password
          # ExternalSecret for Grafana OIDC credentials
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: grafana-oidc
              namespace: monitoring
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: grafana-oidc
                creationPolicy: Owner
              data:
                - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                  remoteRef:
                    key: infrastructure/grafana-oidc
                    property: client_secret

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
