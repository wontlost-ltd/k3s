apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    # Deploy after vault is ready
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: secrets-management
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.12.1
    helm:
      releaseName: external-secrets
      values: |
        # Install CRDs
        installCRDs: true

        # Replicas for HA (2 for production resilience)
        replicaCount: 2
        podDisruptionBudget:
          enabled: true
          minAvailable: 1

        # Resource limits (production values)
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Security hardening
        podSecurityContext:
          runAsNonRoot: true
          fsGroup: 65534
          seccompProfile:
            type: RuntimeDefault
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsUser: 65534
          runAsGroup: 65534
          capabilities:
            drop:
              - ALL

        # Webhook configuration (2 for HA)
        webhook:
          replicaCount: 2
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          # Security hardening
          podSecurityContext:
            runAsNonRoot: true
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop:
                - ALL

        # Cert controller for webhook certificates
        certController:
          replicaCount: 2
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          # Security hardening
          podSecurityContext:
            runAsNonRoot: true
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop:
                - ALL

        # Service account
        serviceAccount:
          create: true
          name: external-secrets

        # Metrics for observability
        metrics:
          service:
            enabled: true
            port: 8080
          serviceMonitor:
            enabled: true
            labels:
              release: prometheus

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
