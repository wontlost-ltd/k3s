apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    # Deploy after vault is ready
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: secrets-management
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 1.2.0
    helm:
      releaseName: external-secrets
      skipCrds: false
      values: |
        # Image pull policy
        image:
          pullPolicy: IfNotPresent

        # Install CRDs
        installCRDs: true

        # 单副本，节省资源
        replicaCount: 1
        podDisruptionBudget:
          enabled: false

        # Resource limits（缩减）
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

        # Security hardening
        podSecurityContext:
          runAsNonRoot: true
          fsGroup: 65534
          seccompProfile:
            type: RuntimeDefault
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsUser: 65534
          runAsGroup: 65534
          capabilities:
            drop:
              - ALL

        # Webhook configuration（单副本）
        webhook:
          replicaCount: 1
          podDisruptionBudget:
            enabled: false
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          # Security hardening
          podSecurityContext:
            runAsNonRoot: true
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop:
                - ALL

        # Cert controller（单副本）
        certController:
          replicaCount: 1
          podDisruptionBudget:
            enabled: false
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          # Security hardening
          podSecurityContext:
            runAsNonRoot: true
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop:
                - ALL

        # Service account
        serviceAccount:
          create: true
          name: external-secrets

        # Metrics for observability
        metrics:
          service:
            enabled: true
            port: 8080
          serviceMonitor:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
