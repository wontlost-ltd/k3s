# Aster API Deployment
# Aster API - Aster Lang CNL Evaluation Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aster-api
  namespace: aster-cloud
  labels:
    app: aster-api
    app.kubernetes.io/name: aster-api
    app.kubernetes.io/part-of: aster-lang
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aster-api
  template:
    metadata:
      labels:
        app: aster-api
        app.kubernetes.io/name: aster-api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aster-api
          image: docker.io/wontlost/aster-api:jvm-latest  # managed by ArgoCD + imagePullPolicy:Always ensures freshness
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            # OTel tracing → otel-collector → tempo（SNAP-10）
            # 'cdi' = Quarkus' built-in CDI-managed OTLP exporter. Reads
            # quarkus.otel.exporter.otlp.endpoint (mapped from
            # OTEL_EXPORTER_OTLP_ENDPOINT below). Do NOT use 'otlp' — that
            # goes through OTel SDK autoconfigure SPI which Quarkus' Fast-Jar
            # classloader doesn't expose, causing ConfigurationException at
            # startup.
            - name: OTEL_TRACES_EXPORTER
              value: "cdi"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              # Helm chart 给 Service 加了 chart-name 前缀：otel-collector-opentelemetry-collector
              value: "http://otel-collector-opentelemetry-collector.otel-system.svc:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.1"  # 10% 采样
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=aster-policy-api,service.version=jvm-latest,deployment.environment=prod"
            # 数据库连接（从 ExternalSecret 注入）
            - name: QUARKUS_DATASOURCE_JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: jdbc-url
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: username
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: password
            # Reactive datasource URL (for Flyway/Hibernate)
            - name: QUARKUS_DATASOURCE_REACTIVE_URL
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: reactive-url
            # Redis Standalone 连接配置
            - name: QUARKUS_REDIS_HOSTS
              valueFrom:
                secretKeyRef:
                  name: aster-api-redis-credentials
                  key: redis-hosts
            - name: QUARKUS_REDIS_CLIENT_TYPE
              value: "standalone"
            # CORS 配置
            - name: QUARKUS_HTTP_CORS_ORIGINS
              value: "https://aster-lang.cloud,https://www.aster-lang.cloud,https://policy.aster-lang.dev,https://aster-lang.dev"
            # LLM AI Assistant（从 Vault 注入）
            - name: ASTER_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aster-api-llm-credentials
                  key: api-key
            - name: ASTER_LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: aster-api-llm-credentials
                  key: base-url
            - name: ASTER_LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: aster-api-llm-credentials
                  key: provider
            - name: ASTER_LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: aster-api-llm-credentials
                  key: model
            # 安全配置：禁用 HMAC 签名验证（内部网络访问）
            - name: ASTER_SECURITY_SIGNATURE_ENABLED
              value: "false"
            # NSM 埋点 — Mixpanel HTTP 投递（详见 aster-deploy/docs/pm/03-telemetry-spec.md）
            # Optional：Vault path secret/apps/aster-api-mixpanel 未配置时 pod 仍可启动，
            # 但 telemetry 不会生效（ASTER_MIXPANEL_TOKEN 为空时客户端自动禁用）。
            - name: ASTER_MIXPANEL_ENABLED
              value: "true"
            - name: ASTER_MIXPANEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aster-api-mixpanel-credentials
                  key: token
                  optional: true
            # 跨服务 PlanGate — aster-api → aster-cloud /api/internal/tenant/{id}/plan
            # 详见 aster-deploy/docs/pm/06-cross-service-plan-gate.md
            # Optional：Vault path secret/apps/aster-api-plan-gate 未配置时 fail-open，
            # plan 升级生效会延迟到 cache TTL 兜底（5min）。
            - name: ASTER_PLAN_GATE_ENABLED
              value: "true"
            - name: ASTER_CLOUD_INTERNAL_URL
              value: "http://aster-cloud.aster-cloud.svc.cluster.local:3000"
            - name: ASTER_PLAN_GATE_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: aster-api-plan-gate-credentials
                  key: hmac-key
                  optional: true
            # Staging 工具端点 — 生产显式禁用（防御深度）
            - name: ASTER_STAGING_TELEMETRY_ENABLED
              value: "false"
            # JVM 调优（缩减堆内存）
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # R16-Major-1: 给 hot-plug 语言包 admin 上传一个可写挂载点。
            # readOnlyRootFilesystem=true 让 /var/aster/* 默认不可写 ——
            # HotPlugLexiconLoader 默认路径 /var/aster/lexicons/jars 无 emptyDir
            # 时启动期 createDirectories 失败，admin upload 全部 IO error。
            # emptyDir 是 ephemeral —— jar 在 pod 重启时丢失，operator 需重新
            # POST /api/v1/admin/lexicons 上传。需要持久化时换 PVC（详见
            # docs/runbooks/lexicon-recovery.md "Multi-replica + shared PVC"）。
            - name: lexicon-hotplug
              mountPath: /var/aster/lexicons/jars
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
              # R17-Suggestion-4 + R18-Minor-2：声明 ephemeral-storage request/limit。
              # R18 把 request 从 1Gi 提到 3Gi —— 与 lexicon-hotplug emptyDir.sizeLimit 对齐，
              # 确保 scheduler 在 admission 时就为 hot-plug 用量留出节点磁盘配额，
              # 避免 pod 落到磁盘紧张的 node 上后 emptyDir 写满 → kubelet 立刻 evict。
              # 4Gi limit = 3Gi hot-plug + 512MiB tmp（R18-Minor-3）+ headroom（日志 / writable layer）。
              ephemeral-storage: 3Gi
            limits:
              memory: 512Mi
              cpu: 500m
              ephemeral-storage: 4Gi
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /q/health/started
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: tmp
          # R18-Minor-3：tmp 不设 sizeLimit 时默认是节点 ephemeral 的 50%，可能在
          # lexicon-hotplug 触到自己的 3Gi 上限之前先吃掉 pod 4Gi 总 limit → kubelet
          # 因 tmp 涨而 evict。给 tmp 显式 512MiB 上限，让两个 volume 的预算可预测。
          emptyDir:
            sizeLimit: 512Mi
        # R16-Major-1: hot-plug 语言包目录。
        # sizeLimit 限制 50 个语言包 jar * 50 MiB max + headroom；超过会让 Kubernetes
        # evict pod 而非让 admin upload 写满 node 磁盘。
        - name: lexicon-hotplug
          emptyDir:
            sizeLimit: 3Gi
