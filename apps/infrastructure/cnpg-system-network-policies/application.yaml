# NetworkPolicies for cnpg-system namespace
# Default-deny with specific allow rules for CloudNativePG operator
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-system-network-policies
  namespace: argocd
  annotations:
    # Deploy after cloudnative-pg is installed
    argocd.argoproj.io/sync-wave: "-7"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: data-services
  source:
    repoURL: https://github.com/wontlost-ltd/k3s.git
    path: apps/infrastructure/cnpg-system-network-policies/manifests
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
