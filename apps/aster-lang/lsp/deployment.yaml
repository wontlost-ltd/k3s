# Aster LSP WebSocket Server Deployment
# Language Server Protocol proxy for Monaco editor integration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aster-lsp
  namespace: aster-lsp
  labels:
    app: aster-lsp
    app.kubernetes.io/name: aster-lsp
    app.kubernetes.io/part-of: aster-lang
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aster-lsp
  template:
    metadata:
      labels:
        app: aster-lsp
        app.kubernetes.io/name: aster-lsp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aster-lsp
          image: docker.io/wontlost/aster-lsp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          env:
            # Server configuration
            - name: PORT
              value: "3001"
            - name: HOSTNAME
              value: "0.0.0.0"
            # CORS - allowed origins for WebSocket connections
            - name: ALLOWED_ORIGINS
              value: "https://aster-lang.cloud,https://www.aster-lang.cloud,http://localhost:3000"
            # Node.js tuning
            - name: NODE_OPTIONS
              value: "--max-old-space-size=256"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 10
      volumes:
        - name: tmp
          emptyDir: {}
