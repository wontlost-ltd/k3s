# ExternalSecrets for aster-policy namespace
# Pulls database and Redis credentials from Vault
---
# PostgreSQL Credentials for Policy API
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: policy-api-db-credentials
  namespace: aster-policy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: policy-api-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        jdbc-url: "jdbc:postgresql://{{ .host }}:{{ .port }}/{{ .database }}"
        reactive-url: "postgresql://{{ .host }}:{{ .port }}/{{ .database }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: host
      remoteRef:
        key: data-services/postgres
        property: host
    - secretKey: port
      remoteRef:
        key: data-services/postgres
        property: port
    - secretKey: database
      remoteRef:
        key: data-services/policy-api-db
        property: database
    - secretKey: username
      remoteRef:
        key: data-services/policy-api-db
        property: username
    - secretKey: password
      remoteRef:
        key: data-services/policy-api-db
        property: password

---
# Redis Credentials for Policy API (Sentinel Mode)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: policy-api-redis-credentials
  namespace: aster-policy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: policy-api-redis-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        # Sentinel URL format: redis-sentinel://:password@host1:port,host2:port/masterName
        redis-url: "redis-sentinel://:{{ .password }}@{{ .sentinelHosts }}/{{ .masterName }}"
  data:
    - secretKey: sentinelHosts
      remoteRef:
        key: data-services/redis
        property: sentinel-hosts
    - secretKey: masterName
      remoteRef:
        key: data-services/redis
        property: master-name
    - secretKey: password
      remoteRef:
        key: data-services/redis
        property: password
