# DB credentials for aster-cloud drizzle migration Job
# Vault paths:
#   data-services/postgres → host, port
#   data-services/aster-cloud-db → database, username, password
#
# 注意：与 aster-api 共用 PG 实例但使用不同 database (aster_cloud)
# 如果 Vault 中没有 data-services/aster-cloud-db，先写入：
#   vault kv put secret/data-services/aster-cloud-db \
#     database=aster_cloud username=aster password=<pwd>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aster-cloud-db-credentials
  namespace: aster-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aster-cloud-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        database-url: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .database }}?sslmode=disable"
  data:
    - secretKey: host
      remoteRef:
        key: data-services/postgres
        property: host
    - secretKey: port
      remoteRef:
        key: data-services/postgres
        property: port
    - secretKey: database
      remoteRef:
        key: data-services/aster-cloud-db
        property: database
    - secretKey: username
      remoteRef:
        key: data-services/aster-cloud-db
        property: username
    - secretKey: password
      remoteRef:
        key: data-services/aster-cloud-db
        property: password
