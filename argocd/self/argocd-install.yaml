apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 7.9.0
    helm:
      releaseName: argocd
      valuesObject:
        # Global settings
        global:
          domain: argocd.aster-lang.cloud
          # Image pull policy for all components
          image:
            imagePullPolicy: IfNotPresent
          # Pod security context for all components
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            seccompProfile:
              type: RuntimeDefault

        # Server configuration (2 replicas for HA)
        server:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: argocd-server
                    topologyKey: kubernetes.io/hostname
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL

        # Repo server (2 replicas for HA)
        repoServer:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: argocd-repo-server
                    topologyKey: kubernetes.io/hostname
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL

        # Application controller (HA with sharding)
        controller:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: argocd-application-controller
                    topologyKey: kubernetes.io/hostname
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL

        # Redis HA
        redis:
          enabled: false  # Disable standalone redis
        redis-ha:
          enabled: true
          haproxy:
            enabled: true
            replicas: 3
            securityContext:
              runAsNonRoot: true
              runAsUser: 99
              runAsGroup: 99
              fsGroup: 99
              seccompProfile:
                type: RuntimeDefault
            containerSecurityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
          redis:
            replicas: 3
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
          hardAntiAffinity: true
          pdb:
            enabled: true
            minAvailable: 2

        # Notifications controller (2 replicas for HA)
        notifications:
          enabled: true
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: argocd-notifications-controller
                    topologyKey: kubernetes.io/hostname
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL

        # ApplicationSet controller
        applicationSet:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: argocd-applicationset-controller
                    topologyKey: kubernetes.io/hostname
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL

        # Dex (OIDC)
        dex:
          enabled: false  # Using Authentik instead

        # Configs
        configs:
          cm:
            # Admin account DISABLED - all authentication via OIDC (Authentik)
            # If emergency access is needed, temporarily re-enable and use
            # argocd-initial-admin-secret (requires kubectl access to cluster)
            admin.enabled: "false"
            # ArgoCD URL
            url: https://argocd.aster-lang.cloud
            # OIDC Configuration (Authentik)
            # Multi-domain support per DOMAIN_STRATEGY.md
            oidc.config: |
              name: Authentik
              issuer: https://auth.aster-lang.cloud/application/o/argocd/
              clientID: argocd
              clientSecret: $argocd-oidc-secret:oidc.authentik.clientSecret
              requestedScopes:
                - openid
                - profile
                - email
              allowedRedirectURLs:
                - https://argocd.aster-lang.cloud/auth/callback
                - https://argocd.aster-lang.dev/auth/callback
                - https://argocd.ezymeta.com/auth/callback
          rbac:
            # Map Authentik groups to ArgoCD roles
            policy.csv: |
              # Admins group gets full access
              g, argocd-admins, role:admin
              # Readonly group gets read-only access
              g, argocd-readonly, role:readonly
              # Local admin account has full access (emergency fallback)
              g, admin, role:admin
              # Default policy for authenticated users
              p, role:readonly, applications, get, */*, allow
              p, role:readonly, certificates, get, *, allow
              p, role:readonly, clusters, get, *, allow
              p, role:readonly, repositories, get, *, allow
              p, role:readonly, projects, get, *, allow
              p, role:readonly, accounts, get, *, allow
              p, role:readonly, gpgkeys, get, *, allow
              p, role:readonly, logs, get, */*, allow
            policy.default: role:readonly
            scopes: "[email]"
          params:
            # Run ArgoCD server without TLS (Traefik terminates TLS)
            server.insecure: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false  # Don't prune ArgoCD resources automatically (safety)
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
