# ArgoCD Self-Management Application
# Deploys ArgoCD via Helm chart - managed by root-app
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    # Deploy first - ArgoCD must be running before other apps
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 9.2.3
    helm:
      releaseName: argocd
      valuesObject:
        # Global settings
        global:
          domain: argocd.aster-lang.cloud
          # Image pull policy for all components
          image:
            imagePullPolicy: IfNotPresent
          # Pod security context for all components
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            seccompProfile:
              type: RuntimeDefault

        # Server（单副本模式）
        server:
          replicas: 1
          pdb:
            enabled: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 150m
              memory: 384Mi
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL

        # Repo server（单副本模式，需要足够内存渲染 Helm charts）
        repoServer:
          replicas: 1
          pdb:
            enabled: false
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 768Mi
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL

        # Application controller（单副本模式）
        controller:
          replicas: 1
          pdb:
            enabled: false
          # NOTE: reconciler concurrency caps are configured via
          # configs.params (controller.* keys) further down in this file —
          # not via direct env injection here, which would duplicate the
          # Helm chart's own envFrom references to argocd-cmd-params-cm.
          # 内存上限从 768Mi 提到 2Gi：application-controller 在 768Mi 下被
          # OOMKilled（exit137），重启后长期贴着上限（756/768Mi，98%），就绪探针
          # 持续超时、全集群 reconcile 停滞。随被管资源/Application 数量增长，
          # controller 的内存占用线性上升，768Mi 已不够。request 同步提到 512Mi
          # 让调度器按真实占用预留，避免在紧张节点上被驱逐。
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 300m
              memory: 2Gi
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL

        # Redis Standalone（单副本模式，替代 HA）
        redis:
          enabled: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        redis-ha:
          enabled: false

        # Notifications controller（单副本模式）
        notifications:
          enabled: true
          replicas: 1
          pdb:
            enabled: false
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 75m
              memory: 128Mi
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL

        # ApplicationSet controller（单副本模式）
        applicationSet:
          replicas: 1
          pdb:
            enabled: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 192Mi
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL

        # Dex (OIDC)
        dex:
          enabled: false  # Using Authentik instead

        # Configs
        configs:
          cm:
            # Custom health checks for CRDs without built-in support
            resource.customizations.health.postgresql.cnpg.io_Cluster: |
              hs = {}
              if obj.status == nil then
                hs.status = "Progressing"
                hs.message = "Waiting for cluster status"
                return hs
              end
              if obj.status.phase == "Cluster in healthy state" then
                hs.status = "Healthy"
                hs.message = obj.status.phase
              elseif obj.status.phase == "Setting up primary" or obj.status.phase == "Creating a new replica" or obj.status.phase == "Waiting for the instances to become active" then
                hs.status = "Progressing"
                hs.message = obj.status.phase
              else
                hs.status = "Degraded"
                hs.message = obj.status.phase or "Unknown phase"
              end
              return hs
            resource.customizations.health.postgresql.cnpg.io_ScheduledBackup: |
              hs = {}
              if obj.status == nil then
                hs.status = "Progressing"
                hs.message = "Waiting for backup status"
                return hs
              end
              if obj.status.lastScheduleTime ~= nil then
                hs.status = "Healthy"
                hs.message = "Last backup: " .. obj.status.lastScheduleTime
              else
                hs.status = "Progressing"
                hs.message = "Waiting for first backup"
              end
              return hs
            resource.customizations.health.external-secrets.io_ExternalSecret: |
              hs = {}
              if obj.status == nil or obj.status.conditions == nil then
                hs.status = "Progressing"
                hs.message = "Waiting for sync"
                return hs
              end
              for i, condition in ipairs(obj.status.conditions) do
                if condition.type == "Ready" then
                  if condition.status == "True" then
                    hs.status = "Healthy"
                    hs.message = condition.reason or "SecretSynced"
                  else
                    hs.status = "Degraded"
                    hs.message = condition.message or "Not ready"
                  end
                  return hs
                end
              end
              hs.status = "Progressing"
              hs.message = "Waiting for Ready condition"
              return hs
            # Admin account DISABLED - all authentication via OIDC (Authentik)
            # If emergency access is needed, temporarily re-enable and use
            # argocd-initial-admin-secret (requires kubectl access to cluster)
            admin.enabled: "false"
            # 专用 CI 账号（仅 apiKey，无 login/密码）——供 aster-cloud CI 触发 DB 迁移 sync。
            # 权限见 rbac.policy.csv 的 ci-migrate（最小化：仅 aster-cloud app 的 get+sync）。
            # 生成 token：argocd account generate-token --account ci-migrate
            accounts.ci-migrate: apiKey
            # 硬化（ArgoCD 官方强烈建议，v3.2+）：sync 到与 Application targetRevision 不同的
            # revision 需要 override 权限。ci-migrate 只有 sync 无 override → 只能同步到 app 自身
            # 声明的 revision，无法被滥用同步到任意 commit。CI 不再传 revision（走 app 的 main）。
            application.sync.requireOverridePrivilegeForRevisionSync: "true"
            # ArgoCD URLs - Multi-domain access per DOMAIN_STRATEGY.md
            url: https://argocd.aster-lang.cloud
            additionalUrls: |
              - https://argocd.aster-lang.dev
              - https://argocd.ezymeta.com
            # OIDC Configuration (Authentik)
            # Multi-domain support per DOMAIN_STRATEGY.md
            oidc.config: |
              name: Authentik
              issuer: https://auth.aster-lang.cloud/application/o/argocd/
              clientID: argocd
              clientSecret: $argocd-oidc-secret:oidc.authentik.clientSecret
              requestedScopes:
                - openid
                - profile
                - email
                - groups
              usernameClaim: preferred_username
              groupsClaim: groups
              allowedRedirectURLs:
                - https://argocd.aster-lang.cloud/auth/callback
                - https://argocd.aster-lang.dev/auth/callback
                - https://argocd.ezymeta.com/auth/callback
          rbac:
            # Map Authentik groups to ArgoCD roles
            # Group membership is determined by Authentik OIDC groups claim
            # VISIBILITY: Users only see applications in their assigned project(s)
            policy.csv: |
              # ===========================================
              # GROUP MAPPINGS (Authentik groups -> roles)
              # ===========================================
              # Admins: Full access to all projects
              g, argocd-admins, role:admin

              # Developers: Access to aster-lang project only
              g, argocd-devs, role:developer

              # Product team: Access to wontlost project only
              g, argocd-product, role:product

              # Local admin (emergency fallback)
              g, admin, role:admin

              # ===========================================
              # ROLE DEFINITIONS
              # ===========================================
              # role:admin - built-in, full access to everything

              # ci-migrate 本地账号：仅 aster-cloud 一个 app 的 get + sync（CI 触发 DB 迁移）。
              # ★ 直接绑到 subject（p, ci-migrate, ...）而非 g 组映射——ArgoCD 官方硬化建议：
              #   本地账号用 g 绑角色会被同名 Authentik group/scope 继承（SSO 歧义）。
              # 不给 delete/override/action，也不涉及其它 app、repo、cluster。
              p, ci-migrate, applications, get, aster-lang/aster-cloud, allow
              p, ci-migrate, applications, sync, aster-lang/aster-cloud, allow

              # role:developer - aster-lang project ONLY (view + manage)
              p, role:developer, applications, *, aster-lang/*, allow
              p, role:developer, logs, get, aster-lang/*, allow
              p, role:developer, projects, get, aster-lang, allow
              p, role:developer, repositories, get, *, allow
              p, role:developer, clusters, get, *, allow

              # role:product - wontlost project ONLY (view + manage)
              p, role:product, applications, *, wontlost/*, allow
              p, role:product, logs, get, wontlost/*, allow
              p, role:product, projects, get, wontlost, allow
              p, role:product, repositories, get, *, allow
              p, role:product, clusters, get, *, allow

            # No default role - users without group mapping have NO access
            policy.default: ""
            scopes: "[groups]"
          params:
            # Run ArgoCD server without TLS (Traefik terminates TLS)
            server.insecure: "true"
            # Reconciler concurrency caps (Level 1 perf tuning).
            # Default scales with CPU count → bursts ~700MiB on 1 vCPU.
            controller.status.processors: "5"
            controller.operation.processors: "2"
            controller.kubectl.parallelism.limit: "10"

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false  # Don't prune ArgoCD resources automatically (safety)
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
