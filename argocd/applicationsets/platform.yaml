# Platform ApplicationSet
# Manages core platform services (monitoring, logging, etc.)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: cloudflare-tunnel
            namespace: cloudflare
          # SNAP-10: tempo + otel-collector 一并部署
          - name: tempo
            namespace: argocd  # 自身 Application 在 argocd ns，目标 ns 由其内部决定
          - name: otel-collector
            namespace: argocd
  template:
    metadata:
      name: 'platform-{{ .name }}'
      namespace: argocd
      labels:
        tier: platform
        app.kubernetes.io/part-of: platform
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: infrastructure
      source:
        repoURL: https://github.com/wontlost-ltd/k3s.git
        targetRevision: main
        path: 'apps/infrastructure/{{ .name }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.data[].remoteRef.conversionStrategy
            - .spec.data[].remoteRef.decodingStrategy
            - .spec.data[].remoteRef.metadataPolicy
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
