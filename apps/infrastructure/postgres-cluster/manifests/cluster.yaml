# Shared PostgreSQL Cluster
# CloudNativePG managed PostgreSQL cluster for all applications
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shared-postgres
  namespace: data-services
  labels:
    argocd.argoproj.io/instance: postgres-cluster
  annotations:
    # Ignore extra fields added by CNPG operator during comparison
    argocd.argoproj.io/compare-options: IgnoreExtraneous
spec:
  # 单实例，节省资源
  instances: 1

  # PostgreSQL version
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4

  # Primary update strategy
  primaryUpdateStrategy: unsupervised

  # PostgreSQL configuration
  postgresql:
    parameters:
      # Connection settings
      max_connections: "100"
      shared_buffers: "128MB"
      effective_cache_size: "384MB"
      maintenance_work_mem: "128MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "6553kB"
      huge_pages: "off"
      min_wal_size: "1GB"
      max_wal_size: "4GB"
      max_worker_processes: "4"
      max_parallel_workers_per_gather: "2"
      max_parallel_workers: "4"
      max_parallel_maintenance_workers: "2"
      # Logging
      log_statement: "ddl"
      log_min_duration_statement: "1000"
    pg_hba:
      # Allow connections from cluster pod network
      # NetworkPolicy provides additional namespace-level isolation
      # Adjust CIDR to match your cluster's pod network if different
      - host all all 10.42.0.0/16 scram-sha-256

  # Bootstrap configuration
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: postgres-superuser-credentials
      postInitApplicationSQL:
        # Create application databases
        # Ownership will be handled via managed.roles after bootstrap
        - CREATE DATABASE authentik;
        - CREATE DATABASE grafana;
        - CREATE DATABASE aster_api;

  # Managed credentials - CloudNativePG will manage these users
  # Users are created after bootstrap and can connect to the databases
  managed:
    roles:
      - name: authentik_user
        ensure: present
        login: true
        inherit: true
        connectionLimit: 50
        passwordSecret:
          name: authentik-postgres-credentials
      - name: grafana_user
        ensure: present
        login: true
        inherit: true
        connectionLimit: 50
        passwordSecret:
          name: grafana-postgres-credentials
      - name: aster_api_user
        ensure: present
        login: true
        inherit: true
        connectionLimit: 50
        passwordSecret:
          name: aster-api-postgres-credentials

  # Superuser secret
  superuserSecret:
    name: postgres-superuser-credentials

  # Storage configuration
  storage:
    size: 20Gi
    storageClass: local-path

  # Separate WAL storage for better performance (optional but recommended)
  # walStorage:
  #   size: 5Gi
  #   storageClass: local-path

  # Resource limits
  resources:
    requests:
      memory: "384Mi"
      cpu: "150m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  # NOTE: CNPG operator manages container security internally
  # PostgreSQL requires write access to data directory, so readOnlyRootFilesystem
  # is not applicable. The operator enforces allowPrivilegeEscalation: false by default.
  # See: https://cloudnative-pg.io/documentation/current/security/

  # Additional hardening via ephemeralVolumesSizeLimit to restrict tmpfs usage
  ephemeralVolumesSizeLimit:
    shm: 256Mi
    temporaryData: 1Gi

  # 单实例无需 anti-affinity

  # Monitoring
  monitoring:
    enablePodMonitor: true
    podMonitorMetricRelabelings:
      - sourceLabels: [__name__]
        regex: "cnpg_.*"
        action: keep
    podMonitorRelabelings:
      - sourceLabels: [__meta_kubernetes_pod_name]
        targetLabel: instance

  # Backup configuration - OCI Object Storage (S3-compatible)
  # Requires postgres-backup-credentials secret with ACCESS_KEY_ID and SECRET_ACCESS_KEY
  # See apps/infrastructure/bootstrap/postgres-backup-external-secret.yaml
  backup:
    barmanObjectStore:
      destinationPath: s3://bucket-backup/shared-postgres/
      endpointURL: https://axuwdowxwpud.compat.objectstorage.ap-melbourne-1.oraclecloud.com
      s3Credentials:
        accessKeyId:
          name: postgres-backup-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: postgres-backup-credentials
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
    retentionPolicy: "30d"

---
# Scheduled Backup - daily full backup at 2 AM UTC
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: shared-postgres-daily-backup
  namespace: data-services
  labels:
    argocd.argoproj.io/instance: postgres-cluster
spec:
  schedule: "0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: shared-postgres
  immediate: false
  suspend: false

