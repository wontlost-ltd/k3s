# ExternalSecret for Authentik Secrets
# Pulls all Authentik configuration from Vault with explicit key mapping
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: authentik-secrets
    creationPolicy: Owner
  data:
    # Authentik secret key for signing cookies and tokens
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: infrastructure/authentik
        property: secret_key
    # PostgreSQL password for database connection
    - secretKey: AUTHENTIK_POSTGRESQL__PASSWORD
      remoteRef:
        key: infrastructure/authentik
        property: postgresql_password
    # Redis password for cache/session store
    - secretKey: AUTHENTIK_REDIS__PASSWORD
      remoteRef:
        key: infrastructure/authentik
        property: redis_password
    # Bootstrap admin password (initial setup only)
    - secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      remoteRef:
        key: infrastructure/authentik
        property: bootstrap_password
    # Bootstrap admin token for API access
    - secretKey: AUTHENTIK_BOOTSTRAP_TOKEN
      remoteRef:
        key: infrastructure/authentik
        property: bootstrap_token
