# Prometheus Stack Application
# Deploys minimal Prometheus using kube-prometheus-stack (Grafana/Alertmanager disabled)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    # Deploy after core infrastructure is ready
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 80.8.2
    helm:
      releaseName: prometheus
      valuesObject:
        # Global image pull policy
        global:
          imageRegistry: ""
          imagePullSecrets: []

        # Prometheus configuration
        prometheus:
          prometheusSpec:
            # Image pull policy
            image:
              pullPolicy: IfNotPresent
            # 单副本，节省资源
            replicas: 1
            podDisruptionBudget:
              enabled: false
            # Security hardening
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: prometheus
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
              # Security hardening for config-reloader sidecar
              - name: config-reloader
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                  runAsUser: 1000
                  runAsGroup: 1000
                  capabilities:
                    drop:
                      - ALL
            # Resource limits
            resources:
              requests:
                memory: 384Mi
                cpu: 100m
              limits:
                memory: 1Gi
                cpu: 500m
            # Retention
            retention: 7d
            retentionSize: 2GB
            # Storage（缩减）
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
            # ServiceMonitor selector - match all
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              # Authentik forward auth protection (SSO)
              traefik.ingress.kubernetes.io/router.middlewares: monitoring-authentik-forward-auth@kubernetescrd
            hosts:
              - prometheus.aster-lang.cloud
            tls:
              - secretName: prometheus-tls
                hosts:
                  - prometheus.aster-lang.cloud

        # 禁用 Alertmanager
        alertmanager:
          enabled: false

        # 禁用 Grafana
        grafana:
          enabled: false

        # Prometheus Operator - manages CRDs（缩减资源）
        prometheusOperator:
          enabled: true
          image:
            pullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # Node exporter for host metrics（DaemonSet，需要在所有节点运行）
        nodeExporter:
          enabled: true
          image:
            pullPolicy: IfNotPresent
          tolerations:
            - key: node.kubernetes.io/disk-pressure
              operator: Exists
              effect: NoSchedule
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

        # Kube-state-metrics for K8s object metrics
        kube-state-metrics:
          image:
            pullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containerSecurityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

        kubeStateMetrics:
          enabled: true

        # Disable components not needed in K3s
        kubeEtcd:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false

        # Extra manifests for auth middleware
        extraManifests:
          # ForwardAuth middleware for Prometheus (Authentik SSO)
          # Uses Authentik outpost's forward auth endpoint
          - apiVersion: traefik.io/v1alpha1
            kind: Middleware
            metadata:
              name: authentik-forward-auth
              namespace: monitoring
            spec:
              forwardAuth:
                address: http://ak-outpost-monitor-outpost.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/traefik
                trustForwardHeader: true
                authResponseHeaders:
                  - X-authentik-username
                  - X-authentik-groups
                  - X-authentik-email
                  - X-authentik-name
                  - X-authentik-uid
                  - X-authentik-jwt
                  - X-authentik-meta-jwks
                  - X-authentik-meta-outpost
                  - X-authentik-meta-provider
                  - X-authentik-meta-app
                  - X-authentik-meta-version
          # ExternalSecret for monitoring basic auth credentials (fallback)
          - apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: monitoring-auth
              namespace: monitoring
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault-backend
                kind: ClusterSecretStore
              target:
                name: monitoring-auth
                creationPolicy: Owner
              data:
                - secretKey: users
                  remoteRef:
                    key: infrastructure/monitoring
                    property: basic_auth_users

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
