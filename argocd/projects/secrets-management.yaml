# Secrets Management Project
# Manages Vault and External Secrets Operator
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: secrets-management
  namespace: argocd
spec:
  description: "Secrets management - Vault and External Secrets Operator"
  sourceRepos:
    - 'https://github.com/wontlost-ltd/k3s.git'
    - 'https://helm.releases.hashicorp.com'
    - 'https://charts.external-secrets.io'
  destinations:
    # Vault namespace
    - namespace: vault
      server: https://kubernetes.default.svc
    # External Secrets namespace
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    # ArgoCD namespace for Application resources
    - namespace: argocd
      server: https://kubernetes.default.svc
  # Cluster-scoped resources needed for secrets
  clusterResourceWhitelist:
    # Namespace creation (for CreateNamespace=true)
    - group: ''
      kind: Namespace
    # External Secrets CRDs
    - group: external-secrets.io
      kind: '*'
    # ClusterSecretStore
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: external-secrets.io
      kind: ClusterExternalSecret
    # cert-manager resources for Vault TLS
    - group: cert-manager.io
      kind: Issuer
    - group: cert-manager.io
      kind: Certificate
    # Webhook configurations
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    # CRDs
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    # ClusterRoles for RBAC
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
