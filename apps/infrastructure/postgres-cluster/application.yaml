# Shared PostgreSQL Cluster Application
# Deploys the CloudNativePG cluster configuration
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-cluster
  namespace: argocd
  annotations:
    # Deploy after CNPG operator and bootstrap (needs credentials ready first)
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: data-services
  source:
    repoURL: https://github.com/wontlost-ltd/k3s.git
    path: apps/infrastructure/postgres-cluster/manifests
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: data-services
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
    - group: postgresql.cnpg.io
      kind: Cluster
      managedFieldsManagers:
        - cnpg-controller-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
