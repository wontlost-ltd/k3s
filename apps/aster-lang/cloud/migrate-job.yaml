# Aster Cloud Drizzle Migration Job
#
# 触发方式：
#   1. ArgoCD **PostSync** hook（每次 app sync 完成后自动跑；见下 annotations，非 PreSync）
#   2. 手动：kubectl create job aster-cloud-migrate-$(date +%s) --from=cronjob/aster-cloud-migrate -n aster-cloud
#   3. 统一 digest pin（k3s#4）：aster-cloud CI 的 image-pin PR 改 migrate digest → app sync →
#      本 PostSync hook 按新 digest 跑；CI 的「Wait for migration applied」轮询 fail-loud（#187）
#
# 幂等性：drizzle-kit migrate 通过 __drizzle_migrations 表跟踪已应用的迁移，
# 重复运行只会跳过已应用的。
#
# 镜像构建：见 aster-cloud/Dockerfile.migrate，CI 推到 docker.io/wontlost/aster-cloud-migrate:<sha>
apiVersion: batch/v1
kind: Job
metadata:
  name: aster-cloud-migrate
  namespace: aster-cloud
  annotations:
    # PostSync hook: 主应用 sync 完成后跑迁移
    # 这样 ExternalSecret 已 reconcile 完毕，aster-cloud-db-credentials 必然存在。
    # 迁移失败不阻塞 deployment（aster-cloud 跑在 CF，K8s 里也没 cloud deployment 要更新）
    # 但迁移失败会让 ArgoCD app 标 Degraded，足够触发关注。
    argocd.argoproj.io/hook: PostSync
    # 仅在成功时删除；失败时保留以便 kubectl logs 调试
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 86400  # 24h 后自动清理
  # 给瞬时失败（DB 连接抖动、ExternalSecret 尚未 reconcile）2 次重试余地，
  # 避免一击即 BackoffLimitExceeded → ArgoCD Failed Sync。migrate 本身幂等
  # （__drizzle_migrations 追踪 + 所有迁移用 IF NOT EXISTS），重试安全。
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: aster-cloud-migrate
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          # P1-R21 (audit): floating `:latest` for migrate Job.
          # 同 deployment.yaml：`:latest` 只是模板占位,kustomization images transformer
          # rewrite 成 @sha256:<image-lock migrate digest>。部署真相在 kustomization。
          # imagePullPolicy: IfNotPresent 安全因渲染出的是不可变 @digest（transformer 失效的
          # 静默回落由 verify-rendered-by-digest.yml 持续断言防护）。
          image: docker.io/wontlost/aster-cloud-migrate:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aster-cloud-db-credentials
                  key: database-url
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # tmpfs for node tmp/cache
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
