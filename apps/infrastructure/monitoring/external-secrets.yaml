# AlertManager Slack Webhook
# Vault 路径：secret/apps/aster-api-plan-gate（与 aster-api 共用 secret tree）
# Key: slack-webhook
#
# AlertManager 通过 alertmanagerSpec.secrets 挂载该 Secret 到
# /etc/alertmanager/secrets/alertmanager-slack-webhook/url
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-slack-webhook
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-slack-webhook
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        url: "{{ .webhook }}"
  data:
    - secretKey: webhook
      remoteRef:
        key: apps/aster-api-plan-gate
        property: slack-webhook
