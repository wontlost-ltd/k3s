# Aster API Service
# Aster API - Aster Lang CNL Evaluation Engine
apiVersion: v1
kind: Service
metadata:
  name: aster-api
  namespace: aster-cloud
  labels:
    app: aster-api
    app.kubernetes.io/name: aster-api
    app.kubernetes.io/part-of: aster-lang
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: aster-api
