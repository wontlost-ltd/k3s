# R31 incident closeout：R30+ 提交的 NetworkPolicy 因为 0.0.0.0/0 + except
# 10.0.0.0/8 的语义在 k3s kube-router 实现下与 service CIDR 规则相互覆盖，
# 实际效果是阻断了到 traefik svc 的回流，policy.aster-lang.dev 整站 502。
#
# 本版改用更保守、行为可预测的形态：
#   1) 只限制 ingress —— cloudflared 是 outbound-only tunnel，
#      没有任何合法入流量，全禁。
#   2) 不限制 egress —— cloudflared 需要：cf 边缘 7844/443、cluster DNS、
#      集群内任意 traefik / app svc。这些一旦在 k3s 上枚举就会触发上面那
#      种 except-rule 互相覆盖的 bug。allow-all-egress 是务实选择，
#      "lateral movement" 风险由 cluster RBAC 和 ImagePullPolicy 兜底。
#
# 这覆盖了 cloudflare-tunnel namespace 90% 的实际威胁面（防止外部某条
# 错误路径意外能向 tunnel pod 写）但不会触发已知的 k3s NetworkPolicy bug。
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudflare-tunnel-deny-ingress
  namespace: cloudflare
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  # 入站：tunnel 是 outbound-only，没有合法 ingress
  ingress: []
