apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-server
  namespace: system-upgrade
  labels:
    k3s-upgrade: server
spec:
  # Target version - update this to trigger upgrades
  version: v1.31.14+k3s1

  # Upgrade one server at a time for HA safety
  concurrency: 1

  # Select control-plane nodes
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists

  # Tolerate control-plane taints
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/etcd
      operator: Exists
      effect: NoExecute

  # Service account for the upgrade job
  serviceAccountName: system-upgrade

  # Cordon node before upgrade
  cordon: true

  # Drain settings
  drain:
    force: true
    skipWaitForDeleteTimeout: 60
    ignoreDaemonSets: true

  # Upgrade container
  upgrade:
    image: rancher/k3s-upgrade
