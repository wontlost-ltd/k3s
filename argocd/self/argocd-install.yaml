apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/argoproj/argo-cd.git
    targetRevision: v3.2.1  # Pin to specific version
    path: manifests/cluster-install
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false  # Don't prune ArgoCD resources automatically (safety)
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
