# NetworkPolicies for cloudflare namespace
# Default-deny with specific allow rules for tunnel operations
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-tunnel-network-policies
  namespace: argocd
  annotations:
    # Deploy BEFORE cloudflare-tunnel (sync-wave 4) to ensure network isolation from start
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/wontlost-ltd/k3s.git
    path: apps/infrastructure/cloudflare-tunnel-network-policies/manifests
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflare
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
