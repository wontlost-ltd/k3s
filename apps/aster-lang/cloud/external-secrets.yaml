# ExternalSecrets for aster-cloud namespace
# Pulls database and Redis credentials from Vault
---
# PostgreSQL Credentials for Aster API
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aster-api-db-credentials
  namespace: aster-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aster-api-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        jdbc-url: "jdbc:postgresql://{{ .host }}:{{ .port }}/{{ .database }}"
        reactive-url: "postgresql://{{ .host }}:{{ .port }}/{{ .database }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: host
      remoteRef:
        key: data-services/postgres
        property: host
    - secretKey: port
      remoteRef:
        key: data-services/postgres
        property: port
    - secretKey: database
      remoteRef:
        key: data-services/aster-api-db
        property: database
    - secretKey: username
      remoteRef:
        key: data-services/aster-api-db
        property: username
    - secretKey: password
      remoteRef:
        key: data-services/aster-api-db
        property: password

---
# Redis Standalone Credentials for Aster API
# Quarkus Redis standalone: redis://:password@host:6379
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aster-api-redis-credentials
  namespace: aster-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aster-api-redis-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        redis-hosts: "redis://:{{ .password }}@shared-redis-master.data-services.svc.cluster.local:6379"
  data:
    - secretKey: password
      remoteRef:
        key: data-services/redis
        property: password

---
# LLM API Credentials for Aster API AI Assistant
# Vault path: secret/apps/aster-api-llm
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aster-api-llm-credentials
  namespace: aster-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aster-api-llm-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: api-key
      remoteRef:
        key: apps/aster-api-llm
        property: api-key
    - secretKey: base-url
      remoteRef:
        key: apps/aster-api-llm
        property: base-url
    - secretKey: provider
      remoteRef:
        key: apps/aster-api-llm
        property: provider
    - secretKey: model
      remoteRef:
        key: apps/aster-api-llm
        property: model
---
# Mixpanel NSM 事件投递凭证
# Vault path：secret/apps/aster-api-mixpanel
# 需要先在 Mixpanel 创建 project 后将 project token 写入 Vault：
#   vault kv put secret/apps/aster-api-mixpanel token="..."
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aster-api-mixpanel-credentials
  namespace: aster-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aster-api-mixpanel-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: apps/aster-api-mixpanel
        property: token
---
# 跨服务 PlanGate HMAC 共享密钥
# Vault path：secret/apps/aster-api-plan-gate
# 同一个 hmac-key 也需写入 aster-cloud env（让 cloud → api invalidatePlanCache 双向验签一致）
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aster-api-plan-gate-credentials
  namespace: aster-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aster-api-plan-gate-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: hmac-key
      remoteRef:
        key: apps/aster-api-plan-gate
        property: hmac-key
---
# AI BYOK 加密主密钥（v1.0 详见 aster-deploy/docs/pm/07-ai-billing.md）
# Vault path：secret/apps/aster-cloud-ai
# 写入：vault kv put secret/apps/aster-cloud-ai \
#   ai-key-encryption-secret="$(openssl rand -base64 32)" \
#   cron-secret="$(openssl rand -hex 24)" \
#   slack-ai-abuse-webhook="https://hooks.slack.com/services/..."
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aster-cloud-ai-secrets
  namespace: aster-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aster-cloud-ai-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # BYOK 加密主密钥（AES-256，pgcrypto pgp_sym_encrypt 用）
    - secretKey: ai-key-encryption-secret
      remoteRef:
        key: apps/aster-cloud-ai
        property: ai-key-encryption-secret
    # cron 路由认证（异常扫描 / BYOK 健康检查）
    - secretKey: cron-secret
      remoteRef:
        key: apps/aster-cloud-ai
        property: cron-secret
    # AI 滥用告警 Slack webhook
    - secretKey: slack-ai-abuse-webhook
      remoteRef:
        key: apps/aster-cloud-ai
        property: slack-ai-abuse-webhook


---
# R31-4：Cloudflare Turnstile secret for trial endpoint anti-abuse (ADR-0012).
# Vault path: secret/apps/aster-api-trial-turnstile
#   - secret  → Turnstile secret key (write-only, never returned to clients)
#   - site-key → public, can also be hard-coded in the frontend env
# Consumed by aster-api deployment via secretKeyRef.
# Default ASTER_SECURITY_TRIAL_TURNSTILE_ENABLED=false so missing secret
# is safe; flip to true after Vault is populated.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aster-api-trial-turnstile
  namespace: aster-cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aster-api-trial-turnstile
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: secret
      remoteRef:
        key: apps/aster-api-trial-turnstile
        property: secret
    - secretKey: site-key
      remoteRef:
        key: apps/aster-api-trial-turnstile
        property: site-key
