# Shared Redis Cluster
# Bitnami Redis with Sentinel for HA
# Used by Authentik, Policy API, and other applications for caching/sessions
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shared-redis
  namespace: argocd
  annotations:
    # Deploy after bootstrap (needs credentials ready first)
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: data-services
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: redis
    targetRevision: 20.3.0
    helm:
      releaseName: shared-redis
      valuesObject:
        # Sentinel HA architecture
        architecture: replication

        # Authentication
        auth:
          enabled: true
          existingSecret: shared-redis-credentials
          existingSecretPasswordKey: password

        # Master configuration
        master:
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          persistence:
            enabled: true
            size: 2Gi
          pdb:
            enabled: true
            minAvailable: 1
          # Anti-affinity to spread master away from replicas
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: redis
                    topologyKey: kubernetes.io/hostname

        # Replica configuration
        replica:
          replicaCount: 2
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          persistence:
            enabled: true
            size: 2Gi
          pdb:
            enabled: true
            minAvailable: 1
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: redis
                        app.kubernetes.io/component: replica
                    topologyKey: kubernetes.io/hostname

        # Sentinel configuration for automatic failover
        sentinel:
          enabled: true
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m

        # Metrics
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            labels:
              release: prometheus
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 50m

        # Network policy
        networkPolicy:
          enabled: false  # Enable if you need strict network isolation

        # Service account
        serviceAccount:
          create: true

  destination:
    server: https://kubernetes.default.svc
    namespace: data-services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
