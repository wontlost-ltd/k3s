# ExternalSecret for Cloudflare API Token
# Pulls the Cloudflare API token from Vault and creates the Secret needed by cert-manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: infrastructure/cloudflare
        property: api_token
