# ExternalSecret for Authentik Secrets
# Pulls all Authentik configuration from Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: authentik-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: infrastructure/authentik
