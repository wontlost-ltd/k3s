apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: aster-lang-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    # Use git files generator to only include directories with kustomization.yaml
    - git:
        repoURL: https://github.com/wontlost-ltd/k3s.git
        revision: main
        files:
          - path: apps/aster-lang/*/kustomization.yaml
  template:
    metadata:
      name: 'aster-{{ index .path.segments 2 }}'
      namespace: argocd
      labels:
        domain: aster-lang.cloud
        app.kubernetes.io/part-of: aster-lang
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: aster-lang
      source:
        repoURL: https://github.com/wontlost-ltd/k3s.git
        targetRevision: main
        path: 'apps/aster-lang/{{ index .path.segments 2 }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'aster-{{ index .path.segments 2 }}'
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.data[].remoteRef.conversionStrategy
            - .spec.data[].remoteRef.decodingStrategy
            - .spec.data[].remoteRef.metadataPolicy
        # aster-api 的副本数由 HorizontalPodAutoscaler（apps/aster-lang/cloud/
        # hpa.yaml，min2/max6）独占。git manifest 里的 replicas:2 只作为初始值/
        # 占位，HPA 扩容后若不忽略此字段，ArgoCD 会持续判定 OutOfSync 且 selfHeal
        # 会把副本缩回 2 与 HPA 拉锯。仅精确忽略 aster-api 这一个 Deployment 的
        # /spec/replicas，不影响同模板生成的其它 app（如 observability，其 Deployment
        # 名不同且无 HPA）。
        - kind: Deployment
          name: aster-api
          jsonPointers:
            - /spec/replicas
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          # 让上面的 ignoreDifferences 在 sync 时也生效：默认 selfHeal 仍会把
          # 被忽略的字段（如 aster-api 的 /spec/replicas）按 git 值写回，与 HPA
          # 形成 live-lock（selfHeal 写 2 → HPA 扩到 N → 再次判漂移 → 重试不止）。
          # RespectIgnoreDifferences 让 sync 从应用清单中剔除被忽略字段，HPA 真正独占。
          - RespectIgnoreDifferences=true
