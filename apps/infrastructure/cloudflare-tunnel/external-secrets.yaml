# ExternalSecret for Cloudflare Tunnel Token
# Pulls the tunnel token from Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel-token
  namespace: cloudflare
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/part-of: cloudflare-tunnel
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-tunnel-token
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: cloudflared
          app.kubernetes.io/component: tunnel
  data:
    - secretKey: token
      remoteRef:
        key: infrastructure/cloudflare-tunnel
        property: token
