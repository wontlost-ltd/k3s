# Identity ApplicationSet
# Manages Authentik SSO application
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: identity-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - name: authentik
            namespace: authentik
  template:
    metadata:
      name: 'identity-{{ .name }}'
      namespace: argocd
      labels:
        tier: identity
        app.kubernetes.io/part-of: identity
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: identity
      source:
        repoURL: https://github.com/wontlost-ltd/k3s.git
        targetRevision: main
        path: 'apps/infrastructure/{{ .name }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.data[].remoteRef.conversionStrategy
            - .spec.data[].remoteRef.decodingStrategy
            - .spec.data[].remoteRef.metadataPolicy
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
