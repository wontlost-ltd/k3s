# Aster API Application
# Sample application for aster-lang.dev domain
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: aster-cloud
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  # R21-Major-3: ingress-deny-evaluate-source.yaml 永久下线（不只是 TODO）。
  # 决策理由：aster-cloud 部署在 Cloudflare Workers 上，不在同 k8s 集群内，
  # 因此基于 ingress source IP 的 deny 中间件无法覆盖正确的 caller 集合。
  # 替代方案：aster-api 应用层 InternalCallerFilter + HMAC（深度防御已足）。
  # 详见 deployment.yaml 上 ASTER_SECURITY_SIGNATURE_ENABLED 注释。
  # - ingress-deny-evaluate-source.yaml
  - pdb.yaml
  - hpa.yaml
  # R21-Major-3: network-policy.yaml 因 k3s 上游 bug 暂停启用，**不是**未完成的安全姿态。
  # 阻塞：https://github.com/k3s-io/k3s/issues - kube-router 处理跨节点
  # combined namespaceSelector + podSelector 的 NetworkPolicy 有 deny-all
  # 兜底变成"deny-all-including-traefik"的 bug（实测过，会让 ingress 全黑）。
  # 当前替代防御层：应用层 RBAC + TenantFilter + ApiKeyAuthFilter + HMAC 多层鉴权。
  # 升级条件：(a) k3s 升级到包含 kube-router patch 的版本，或 (b) 集群换 Calico CNI。
  # 已就绪：network-policy.yaml 现已全改 **namespace-only** peer 选择器（去掉所有
  # peer 内的 podSelector，只保留 spec.podSelector 选目标 pod），不再触发上述 bug。
  # 待 CNI 满足升级条件后，**直接取消下一行注释即可启用**，无需再改写策略。
  # - network-policy.yaml
  - external-secrets.yaml
  # aster-cloud drizzle migration (PreSync hook + standalone runs)
  - migrate-external-secret.yaml
  - migrate-job.yaml
# 统一镜像 digest pin 设计 A′ Phase 3（keystone）：把 image-lock 的 digest 接进 kustomize
# 原生 images transformer，让 Deployment/Job 渲染 image@sha256:<digest> 而非浮动 tag。
# 这是**部署真相**；验签/溯源真相在 image-lock.yaml（含 sourceSha/runId）。二者由 Phase 2 CI
# 同一 PR 双写，k3s verify-image-pin 校验两文件 digest 一致。
# ⚠️ 初值 = 2026-07-09 三方核实的当前生产 digest（registry jvm-latest == 运行 pod imageID ==
# image-lock 种子）＝等价渲染，上线零部署变化。真实值由后续 image-pin PR 更新。
images:
  - name: docker.io/wontlost/aster-api
    digest: sha256:5ad6940dc3c2b45babe8252969f2d8109024caab6fff74d778dfcbd0fc163f53
  - name: docker.io/wontlost/aster-cloud-migrate
    digest: sha256:b0a44fc89cfde925386633ad38d72996845394315b6dc3a760fd280dd87fb9cb
