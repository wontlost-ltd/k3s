# External Secrets Network Policies Application
# Deploys NetworkPolicies for external-secrets namespace
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-network-policies
  namespace: argocd
  annotations:
    # Deploy BEFORE External Secrets (sync-wave 0) to ensure network isolation from start
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: secrets-management
  source:
    repoURL: https://github.com/wontlost-ltd/k3s.git
    targetRevision: main
    path: apps/infrastructure/external-secrets-network-policies/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
