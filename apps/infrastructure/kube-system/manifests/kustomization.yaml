apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system

# Security resources for kube-system
resources:
  - network-policies.yaml

# Strategic merge patches for existing K3s resources
patches:
  - path: traefik-security-patch.yaml
    target:
      kind: Deployment
      name: traefik
      namespace: kube-system
