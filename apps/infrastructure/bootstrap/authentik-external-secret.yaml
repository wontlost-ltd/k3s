# ExternalSecret for Authentik Secrets
# Pulls all Authentik configuration from Vault with explicit key mapping
# Required Vault keys: secret_key, postgresql_host, postgresql_port,
#   postgresql_name, postgresql_user, postgresql_password,
#   bootstrap_password, bootstrap_email
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: authentik-secrets
    creationPolicy: Owner
  data:
    # Authentik secret key for signing cookies and tokens
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: infrastructure/authentik
        property: secret_key
    # PostgreSQL connection settings
    - secretKey: AUTHENTIK_POSTGRESQL__HOST
      remoteRef:
        key: infrastructure/authentik
        property: postgresql_host
    - secretKey: AUTHENTIK_POSTGRESQL__PORT
      remoteRef:
        key: infrastructure/authentik
        property: postgresql_port
    - secretKey: AUTHENTIK_POSTGRESQL__NAME
      remoteRef:
        key: infrastructure/authentik
        property: postgresql_name
    - secretKey: AUTHENTIK_POSTGRESQL__USER
      remoteRef:
        key: infrastructure/authentik
        property: postgresql_user
    - secretKey: AUTHENTIK_POSTGRESQL__PASSWORD
      remoteRef:
        key: infrastructure/authentik
        property: postgresql_password
    # Bootstrap admin credentials (initial setup only)
    - secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      remoteRef:
        key: infrastructure/authentik
        property: bootstrap_password
    - secretKey: AUTHENTIK_BOOTSTRAP_EMAIL
      remoteRef:
        key: infrastructure/authentik
        property: bootstrap_email
