# NetworkPolicy for PostgreSQL Cluster
# Restricts access to PostgreSQL to only authorized namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-cluster-network-policy
  namespace: data-services
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: shared-postgres
  policyTypes:
    - Ingress
  ingress:
    # Allow PostgreSQL connections from authentik (server and worker)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik
          podSelector:
            matchLabels:
              app.kubernetes.io/name: authentik
      ports:
        - protocol: TCP
          port: 5432
    # Allow PostgreSQL connections from Grafana
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - protocol: TCP
          port: 5432
    # Allow PostgreSQL connections from policy-api
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aster-policy
          podSelector:
            matchLabels:
              app: policy-api
      ports:
        - protocol: TCP
          port: 5432
    # Allow PostgreSQL connections from data-service
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wontlost-data
          podSelector:
            matchLabels:
              app: data-service
      ports:
        - protocol: TCP
          port: 5432
    # Allow metrics scraping from Prometheus
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9187  # PostgreSQL exporter metrics
    # Allow intra-cluster replication between PostgreSQL pods
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: shared-postgres
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 8008  # Patroni REST API
    # Allow CNPG operator to manage cluster
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudnative-pg
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 8008
