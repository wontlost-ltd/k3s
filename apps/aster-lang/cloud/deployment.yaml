# Aster API Deployment
# Aster API - Aster Lang CNL Evaluation Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aster-api
  namespace: aster-cloud
  labels:
    app: aster-api
    app.kubernetes.io/name: aster-api
    app.kubernetes.io/part-of: aster-lang
spec:
  # P1-R21 (audit): scaled 1 → 2 for HA. aster-api is stateless (Redis +
  # Postgres external; Caffeine cache + striped locks tolerate 2 replicas).
  # Known caveat: lexicon-hotplug emptyDir is per-pod; uploads must be
  # repeated against each replica OR replaced with shared PVC (see
  # docs/runbooks/lexicon-recovery.md). For now operator workflow already
  # documented, so 2 replicas with rolling-update is acceptable.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # zero-downtime: never below replicas during rollout
  selector:
    matchLabels:
      app: aster-api
  template:
    metadata:
      labels:
        app: aster-api
        app.kubernetes.io/name: aster-api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aster-api
          # P1-R21 (audit): `:jvm-latest` is the floating staging tag.
          # ArgoCD Image Updater (configured in argocd/applicationset.yaml)
          # pins each ApplicationSet revision to a content digest at sync time;
          # the YAML here is the template, not the runtime truth.
          # Operators rolling back must use the digest from the ArgoCD UI,
          # not this file. Audit-trail of "which image actually ran" comes
          # from the Application's last-synced revision, not git.
          image: docker.io/wontlost/aster-api:jvm-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            # OTel tracing → otel-collector → tempo（SNAP-10）
            # 'cdi' = Quarkus' built-in CDI-managed OTLP exporter. Reads
            # quarkus.otel.exporter.otlp.endpoint (mapped from
            # OTEL_EXPORTER_OTLP_ENDPOINT below). Do NOT use 'otlp' — that
            # goes through OTel SDK autoconfigure SPI which Quarkus' Fast-Jar
            # classloader doesn't expose, causing ConfigurationException at
            # startup.
            - name: OTEL_TRACES_EXPORTER
              value: "cdi"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              # Helm chart 给 Service 加了 chart-name 前缀：otel-collector-opentelemetry-collector
              value: "http://otel-collector-opentelemetry-collector.otel-system.svc:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.1"  # 10% 采样
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=aster-policy-api,service.version=jvm-latest,deployment.environment=prod"
            # 数据库连接（从 ExternalSecret 注入）
            - name: QUARKUS_DATASOURCE_JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: jdbc-url
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: username
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: password
            # Reactive datasource URL (for Flyway/Hibernate)
            - name: QUARKUS_DATASOURCE_REACTIVE_URL
              valueFrom:
                secretKeyRef:
                  name: aster-api-db-credentials
                  key: reactive-url
            # Redis Standalone 连接配置
            - name: QUARKUS_REDIS_HOSTS
              valueFrom:
                secretKeyRef:
                  name: aster-api-redis-credentials
                  key: redis-hosts
            - name: QUARKUS_REDIS_CLIENT_TYPE
              value: "standalone"
            # CORS 配置
            - name: QUARKUS_HTTP_CORS_ORIGINS
              value: "https://aster-lang.cloud,https://www.aster-lang.cloud,https://policy.aster-lang.dev,https://aster-lang.dev"
            # LLM AI Assistant（从 Vault 注入）
            - name: ASTER_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aster-api-llm-credentials
                  key: api-key
            - name: ASTER_LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: aster-api-llm-credentials
                  key: base-url
            - name: ASTER_LLM_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: aster-api-llm-credentials
                  key: provider
            - name: ASTER_LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: aster-api-llm-credentials
                  key: model
            # R21-Critical-1：禁用全局 HMAC 签名 filter，并由各端点专用 filter 兜底：
            #   /api/v1/policies/evaluate{,-json,/batch} → ApiKeyAuthFilter（API key 必填）
            #   /api/v1/policies/{id}/rollback|versions  → ApiKeyAuthFilter（突变/历史鉴权）
            #   /api/v1/policies/cache                  → ApiKeyAuthFilter（缓存清理鉴权）
            #   /api/v1/policies/evaluate-source        → InternalCallerFilter（SSE 浏览器）
            #   /api/v1/admin/lexicons*                 → LexiconAdminResource.verifyHmac
            #   /api/v1/lexicons*                       → 匿名读（路径白名单豁免）
            # 原因：浏览器 Monaco/AI complete/lexicon SSE 直连本服务无法持有 HMAC 密钥；
            # 让全局 filter 失效不等于裸奔 —— 每个突变/付费端点都有独立 filter。
            - name: ASTER_SECURITY_SIGNATURE_ENABLED
              value: "false"
            # 限流可信 IP 源：本集群是 Cloudflare Tunnel-only（cloudflared 出站
            # 连接，无公网 ingress IP，外部无法绕过 Cloudflare 直连 Traefik）。
            # 真正可信的客户端 IP 源是边缘写入、单值、不可伪造的 CF-Connecting-IP
            #（Cloudflare 对客户端自带的 X-Forwarded-For 是追加而非覆盖，XFF 首段
            # 可伪造）——应用层已优先采用 CF-Connecting-IP。置 true 后匿名限流按
            # 真实客户端 IP 计，而非折叠到 Traefik/tunnel 的内网 IP。默认 false
            # 是为非 tunnel 部署（如 on-prem 直连）保守起见。
            - name: ASTER_RATELIMIT_TRUST_FORWARDED_HEADERS
              value: "true"
            # 与上面同一信任边界，但作用于 trial 端点（/evaluate-source）的 per-IP
            # 限流。TrialEndpointGuard 读独立的 trust 开关，且 RateLimitFilter 对
            # guarded trial 路径直接旁路 —— 若此处不打开，trial 的 minute/hour/
            # concurrent per-IP 配额会全部折叠到 Traefik/tunnel 内网 IP，退化为
            # 全站级限流。tunnel-only 拓扑下 CF-Connecting-IP 不可伪造，可信。
            - name: ASTER_SECURITY_TRIAL_TRUST_XFF
              value: "true"
            # 开启 trial endpoint guard（/evaluate-source 匿名访客）。默认 false →
            # TrialEndpointGuard 启动即 return，从不设 TRIAL_GUARD_PASSED_PROP，
            # TenantFilter 不会把 tenant 设为 "trial"，于是经 aster-cloud playground
            # BFF（X-Tenant-Id: trial-playground）进来的请求落到 PlanGate → Free 计划
            # → api_access_denied（playground Run 报错）。打开后 guard 通过 Origin/
            # IP/body 三重校验即旁路 PlanGate，playground 可匿名执行。
            # allowed-origins 默认已含 aster-lang.dev/.cloud（见 TrialEndpointGuard），
            # 无需额外配。
            # 注意 env 名是 ASTER_SECURITY_EVALUATE_SOURCE_TRIAL（非 ..._ENABLED）：
            # application.properties 显式绑
            #   aster.security.evaluate-source.trial.enabled=${ASTER_SECURITY_EVALUATE_SOURCE_TRIAL:false}
            - name: ASTER_SECURITY_EVALUATE_SOURCE_TRIAL
              value: "true"
            # NSM 埋点 — Mixpanel HTTP 投递（详见 aster-deploy/docs/pm/03-telemetry-spec.md）
            # Optional：Vault path secret/apps/aster-api-mixpanel 未配置时 pod 仍可启动，
            # 但 telemetry 不会生效（ASTER_MIXPANEL_TOKEN 为空时客户端自动禁用）。
            - name: ASTER_MIXPANEL_ENABLED
              value: "true"
            - name: ASTER_MIXPANEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aster-api-mixpanel-credentials
                  key: token
                  optional: true
            # 跨服务 PlanGate — aster-api → aster-cloud /api/internal/tenant/{id}/plan
            # 详见 aster-deploy/docs/pm/06-cross-service-plan-gate.md
            # Optional：Vault path secret/apps/aster-api-plan-gate 未配置时 fail-open，
            # plan 升级生效会延迟到 cache TTL 兜底（5min）。
            - name: ASTER_PLAN_GATE_ENABLED
              value: "true"
            # R32 hotfix：aster-cloud BFF 部署在 Cloudflare Pages，不在
            # k3s 集群内。原值 http://aster-cloud.aster-cloud.svc.cluster.local:3000
            # 指向一个不存在的 Service，DNS NXDOMAIN 让 api-key verify
            # 全部失败（reason=verify_unavailable），用户拿到的 ak_xxx
            # 在 redis snapshot 没 hit 时无法回源核对。
            #
            # 真实 URL 走 cf 边缘。cloud-side 仍验 HMAC + X-Internal-Caller
            # header，所以经 Internet 一段不影响安全契约。性能代价：
            # 一次 cache-miss verify 多 ~50-100ms 边缘往返；后续命中
            # Caffeine cache（TTL 5min）零开销。
            - name: ASTER_CLOUD_INTERNAL_URL
              value: "https://aster-lang.cloud"
            - name: ASTER_PLAN_GATE_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: aster-api-plan-gate-credentials
                  key: hmac-key
                  optional: true
            # R31-4 Cloudflare Turnstile（per ADR-0012）。
            # ENABLED=false 时 verifier 直接放行，零开销 —— 这就是默认状态。
            # frontend 端 widget 完成 + Vault populated 后，把 ENABLED 改
            # "true"。secretKeyRef.optional=true：缺 secret 时不挂 pod 启动，
            # 启动期 fail-fast 由 TurnstileVerifier 内部处理（enabled+缺
            # secret → 全部 reject）。
            - name: ASTER_SECURITY_TRIAL_TURNSTILE_ENABLED
              value: "false"
            - name: ASTER_SECURITY_TRIAL_TURNSTILE_SECRET
              valueFrom:
                secretKeyRef:
                  name: aster-api-trial-turnstile
                  key: secret
                  optional: true
            - name: ASTER_SECURITY_TRIAL_TURNSTILE_TIMEOUT_MS
              value: "3000"
            # Staging 工具端点 — 生产显式禁用（防御深度）
            - name: ASTER_STAGING_TELEMETRY_ENABLED
              value: "false"
            # JVM 调优（缩减堆内存）
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # R16-Major-1: 给 hot-plug 语言包 admin 上传一个可写挂载点。
            # readOnlyRootFilesystem=true 让 /var/aster/* 默认不可写 ——
            # HotPlugLexiconLoader 默认路径 /var/aster/lexicons/jars 无 emptyDir
            # 时启动期 createDirectories 失败，admin upload 全部 IO error。
            # emptyDir 是 ephemeral —— jar 在 pod 重启时丢失，operator 需重新
            # POST /api/v1/admin/lexicons 上传。需要持久化时换 PVC（详见
            # docs/runbooks/lexicon-recovery.md "Multi-replica + shared PVC"）。
            - name: lexicon-hotplug
              mountPath: /var/aster/lexicons/jars
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
              # R17-Suggestion-4 + R18-Minor-2：声明 ephemeral-storage request/limit。
              # R18 把 request 从 1Gi 提到 3Gi —— 与 lexicon-hotplug emptyDir.sizeLimit 对齐，
              # 确保 scheduler 在 admission 时就为 hot-plug 用量留出节点磁盘配额，
              # 避免 pod 落到磁盘紧张的 node 上后 emptyDir 写满 → kubelet 立刻 evict。
              # 4Gi limit = 3Gi hot-plug + 512MiB tmp（R18-Minor-3）+ headroom（日志 / writable layer）。
              ephemeral-storage: 3Gi
            limits:
              memory: 512Mi
              cpu: 500m
              ephemeral-storage: 4Gi
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /q/health/started
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: tmp
          # R18-Minor-3：tmp 不设 sizeLimit 时默认是节点 ephemeral 的 50%，可能在
          # lexicon-hotplug 触到自己的 3Gi 上限之前先吃掉 pod 4Gi 总 limit → kubelet
          # 因 tmp 涨而 evict。给 tmp 显式 512MiB 上限，让两个 volume 的预算可预测。
          emptyDir:
            sizeLimit: 512Mi
        # R16-Major-1: hot-plug 语言包目录。
        # sizeLimit 限制 50 个语言包 jar * 50 MiB max + headroom；超过会让 Kubernetes
        # evict pod 而非让 admin upload 写满 node 磁盘。
        - name: lexicon-hotplug
          emptyDir:
            sizeLimit: 3Gi
