# Default Deny All for data-services namespace
# All pods must have explicit NetworkPolicy to communicate
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: data-services
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow egress for PostgreSQL cluster
# Required for: DNS, API server, S3 backup, replication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-cluster-egress
  namespace: data-services
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: shared-postgres
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
    # Allow API server communication
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # Allow S3 backup (HTTPS)
    - ports:
        - protocol: TCP
          port: 443
    # Allow intra-cluster replication
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: shared-postgres
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 8008

---
# Allow egress for Redis cluster
# Required for: DNS, intra-cluster communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-cluster-egress
  namespace: data-services
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
    # Allow intra-cluster communication
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
