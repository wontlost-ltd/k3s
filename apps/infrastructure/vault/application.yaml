apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  annotations:
    # Deploy after vault-config (TLS certs must be ready)
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: secrets-management
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.30.0
    helm:
      releaseName: vault
      values: |
        global:
          enabled: true
          tlsDisable: false

        injector:
          enabled: true
          replicas: 2
          podDisruptionBudget:
            minAvailable: 1
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m

        server:
          enabled: true
          image:
            repository: hashicorp/vault
            tag: "1.19.0"

          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m

          # Development mode (for testing - uses in-memory storage)
          dev:
            enabled: false

          # Disable standalone mode - using HA mode
          standalone:
            enabled: false

          # PDB for Vault server
          podDisruptionBudget:
            enabled: true
            minAvailable: 2

          # HA mode with Raft storage
          ha:
            enabled: true
            replicas: 3
            raft:
              enabled: true
              setNodeId: true
              config: |
                ui = true

                listener "tcp" {
                  address = "[::]:8200"
                  cluster_address = "[::]:8201"
                  tls_cert_file = "/vault/tls/tls.crt"
                  tls_key_file = "/vault/tls/tls.key"
                  telemetry {
                    unauthenticated_metrics_access = false
                  }
                }

                storage "raft" {
                  path = "/vault/data"
                  retry_join {
                    leader_api_addr = "https://vault-0.vault-internal:8200"
                    leader_ca_cert_file = "/vault/tls/tls.crt"
                    leader_client_cert_file = "/vault/tls/tls.crt"
                    leader_client_key_file = "/vault/tls/tls.key"
                  }
                  retry_join {
                    leader_api_addr = "https://vault-1.vault-internal:8200"
                    leader_ca_cert_file = "/vault/tls/tls.crt"
                    leader_client_cert_file = "/vault/tls/tls.crt"
                    leader_client_key_file = "/vault/tls/tls.key"
                  }
                  retry_join {
                    leader_api_addr = "https://vault-2.vault-internal:8200"
                    leader_ca_cert_file = "/vault/tls/tls.crt"
                    leader_client_cert_file = "/vault/tls/tls.crt"
                    leader_client_key_file = "/vault/tls/tls.key"
                  }
                }

                service_registration "kubernetes" {}

                telemetry {
                  prometheus_retention_time = "30s"
                  disable_hostname = true
                }

                # Auto-unseal configuration (uncomment when KMS is available)
                # seal "gcpckms" {
                #   project     = "your-project"
                #   region      = "global"
                #   key_ring    = "vault-keyring"
                #   crypto_key  = "vault-unseal-key"
                # }

          # Mount TLS certificate from cert-manager
          volumes:
            - name: vault-tls-internal
              secret:
                secretName: vault-internal-tls

          volumeMounts:
            - name: vault-tls-internal
              mountPath: /vault/tls
              readOnly: true

          dataStorage:
            enabled: true
            size: 10Gi
            storageClass: null

          auditStorage:
            enabled: true
            size: 5Gi
            storageClass: null

          # External ingress (uses Let's Encrypt wildcard cert)
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - host: vault.aster-lang.cloud
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - secretName: vault-ingress-tls
                hosts:
                  - vault.aster-lang.cloud

        ui:
          enabled: true
          serviceType: ClusterIP

        # Prometheus metrics
        serverTelemetry:
          serviceMonitor:
            enabled: true
            selectors:
              release: prometheus

  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
