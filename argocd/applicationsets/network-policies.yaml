# Network Policies ApplicationSet
# Manages network isolation policies for various namespaces
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: network-policies
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          # kube-system network policies are managed by kube-system-config Application
          - name: data-services-network-policies
            namespace: data-services
          - name: argocd-network-policies
            namespace: argocd
          - name: external-secrets-network-policies
            namespace: external-secrets
          - name: monitoring-network-policies
            namespace: monitoring
          - name: cloudflare-tunnel-network-policies
            namespace: cloudflare
          - name: cert-manager-network-policies
            namespace: cert-manager
          - name: cnpg-system-network-policies
            namespace: cnpg-system
          - name: reflector-network-policies
            namespace: reflector
  template:
    metadata:
      name: '{{ .name }}'
      namespace: argocd
      labels:
        tier: security
        app.kubernetes.io/part-of: network-policies
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: infrastructure
      source:
        repoURL: https://github.com/wontlost-ltd/k3s.git
        targetRevision: main
        path: 'apps/infrastructure/{{ .name }}/manifests'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
