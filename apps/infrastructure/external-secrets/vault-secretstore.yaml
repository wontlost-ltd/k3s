# ClusterSecretStore for HashiCorp Vault
# This connects External Secrets Operator to Vault using TLS
#
# PREREQUISITE: Vault must be initialized, unsealed, and configured with:
# 1. Kubernetes auth enabled
# 2. KV-v2 secrets engine at "secret/"
# 3. Policy and role for external-secrets service account
# 4. TLS enabled with cert-manager certificates
#
# See README.md for Vault configuration steps

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      # Vault server address with HTTPS (internal K8s service)
      server: "https://vault.vault.svc.cluster.local:8200"

      # Path to KV-v2 secrets engine
      path: "secret"

      # KV version (v2 is recommended)
      version: "v2"

      # CA certificate for TLS verification
      # References the CA certificate from Vault's internal CA
      caProvider:
        type: Secret
        name: vault-internal-ca
        namespace: vault
        key: ca.crt

      # Authentication using Kubernetes service account
      auth:
        kubernetes:
          # Mount path for Kubernetes auth in Vault
          mountPath: "kubernetes"

          # Role configured in Vault for external-secrets
          role: "external-secrets"

          # Service account used by external-secrets operator
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
